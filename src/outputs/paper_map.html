ern vision pipelines increasingly rely on pretrained image encoders whose representations are reused across tasks and models, yet these representations are often overcomplete and model-specific. We propose a simple, training-free method to improve the efficiency of image representations via a post-hoc canonical correlation analysis (CCA) operator. By leveraging the shared structure between representations produced by two pre-trained image encoders, our method finds linear projections that serve as a principled form of representation selection and dimensionality reduction, retaining shared semantic content while discarding redundant dimensions. Unlike standard dimensionality reduction techniques such as PCA, which operate on a single embedding space, our approach leverages cross-model agreement to guide representation distillation and refinement. The technique allows representations to be reduced by more than 75% in dimensionality with improved downstream performance, or enhanced at fixed dimensionality via post-hoc representation transfer from larger or fine-tuned models. Empirical results on ImageNet-1k, CIFAR-100, MNIST, and additional benchmarks show consistent improvements over both baseline and PCA-projected representations, with accuracy gains of up to 12.6%.", "published": "2026-04-01T14:01:41Z", "authors": ["Dylan B. Lewis", "Jens Gregor", "Hector Santos-Villalobos"], "abs_url": "https://arxiv.org/abs/2604.00921v1", "pdf_url": "https://arxiv.org/pdf/2604.00921v1", "x": 5.598748207092285, "y": 7.0971808433532715, "similar_indices": [136, 57, 113, 196, 45]}, {"index": 42, "arxiv_id": "2604.00917v1", "title": "Investigating Autonomous Agent Contributions in the Wild: Activity Patterns and Code Change over Time", "summary": "The rise of large language models for code has reshaped software development. Autonomous coding agents, able to create branches, open pull requests, and perform code reviews, now actively contribute to real-world projects. Their growing role offers a unique and timely opportunity to investigate AI-driven contributions and their effects on code quality, team dynamics, and software maintainability. In this work, we construct a novel dataset of approximately $110,000$ open-source pull requests, including associated commits, comments, reviews, issues, and file changes, collectively representing millions of lines of source code. We compare five popular coding agents, including OpenAI Codex, Claude Code, GitHub Copilot, Google Jules, and Devin, examining how their usage differs in various development aspects such as merge frequency, edited file types, and developer interaction signals, including comments and reviews. Furthermore, we emphasize that code authoring and review are only a small part of the larger software engineering process, as the resulting code must also be maintained and updated over time. Hence, we offer several longitudinal estimates of survival and churn rates for agent-generated versus human-authored code. Ultimately, our findings indicate an increasing agent activity in open-source projects, although their contributions are associated with more churn over time compared to human-authored code.", "published": "2026-04-01T13:58:30Z", "authors": ["Razvan Mihai Popescu", "David Gros", "Andrei Botocan", "Rahul Pandita", "Prem Devanbu", "Maliheh Izadi"], "abs_url": "https://arxiv.org/abs/2604.00917v1", "pdf_url": "https://arxiv.org/pdf/2604.00917v1", "x": -1.8997441530227661, "y": -9.730565071105957, "similar_indices": [133, 69, 99, 197, 54]}, {"index": 43, "arxiv_id": "2604.00901v1", "title": "Experience as a Compass: Multi-agent RAG with Evolving Orchestration and Agent Prompts", "summary": "Multi-agent Retrieval-Augmented Generation (RAG), wherein each agent takes on a specific role, supports hard queries that require multiple steps and sources, or complex reasoning. Existing approaches, however, rely on static agent behaviors and fixed orchestration strategies, leading to brittle performance on diverse, multi-hop tasks. We identify two key limitations: the lack of continuously adaptive orchestration mechanisms and the absence of behavior-level learning for individual agents. To this end, we propose HERA, a hierarchical framework that jointly evolves multi-agent orchestration and role-specific agent prompts. At the global level, HERA optimizes query-specific agent topologies through reward-guided sampling and experience accumulation. At the local level, Role-Aware Prompt Evolution refines agent behaviors via credit assignment and dual-axes adaptation along operational and behavioral principles, enabling targeted, role-conditioned improvements. On six knowledge-intensive benchmarks, HERA achieves an average improvement of 38.69\\% over recent baselines while maintaining robust generalization and token efficiency. Topological analyses reveal emergent self-organization, where sparse exploration yields compact, high-utility multi-agent networks, demonstrating both efficient coordination and robust reasoning.", "published": "2026-04-01T13:45:52Z", "authors": ["Sha Li", "Naren Ramakrishnan"], "abs_url": "https://arxiv.org/abs/2604.00901v1", "pdf_url": "https://arxiv.org/pdf/2604.00901v1", "x": -3.2643189430236816, "y": -3.6914217472076416, "similar_indices": [197, 194, 39, 69, 71]}, {"index": 44, "arxiv_id": "2604.00890v1", "title": "Beyond Symbolic Solving: Multi Chain-of-Thought Voting for Geometric Reasoning in Large Language Models", "summary": "Geometric Problem Solving (GPS) remains at the heart of enhancing mathematical reasoning in large language models because it requires the combination of diagrammatic understanding, symbolic manipulation and logical inference. In existing literature, researchers have chiefly focused on synchronising the diagram descriptions with text literals and solving the problem. In this vein, they have either taken a neural, symbolic or neuro-symbolic approach. But this solves only the first two of the requirements, namely diagrammatic understanding and symbolic manipulation, while leaving logical inference underdeveloped. The logical inference is often limited to one chain-of-thought (CoT). To address this weakness in hitherto existing models, this paper proposes MARS-GPS, that generates multiple parallel reasoning rollouts augmented with Python code execution for numerical verification, ranks them using token-level entropy as a confidence signal, and aggregates answers through a multi-stage voting and self-verification pipeline. Empirical results show that MARS-GPS with 8 parallel rollouts achieves 88.8% on Geometry3K, a nearly +11% improvement over the prior state-of-the-art, with accuracy scaling consistently as the number of rollouts increases from 1 to 16 (+6.0% on ablation subset). We provide our code and data in an anonymous repository: https://anonymous.4open.science/r/MARS-GPS-DE55.", "published": "2026-04-01T13:37:06Z", "authors": ["Md. Abu Bakor Siddique", "Shahrin Hossain", "Sadman Ahmed Siam", "Syed Rifat Raiyan", "Hasan Mahmud", "Md Kamrul Hasan"], "abs_url": "https://arxiv.org/abs/2604.00890v1", "pdf_url": "https://arxiv.org/pdf/2604.00890v1", "x": -4.515681743621826, "y": 3.8094868659973145, "similar_indices": [10, 6, 147, 7, 162]}, {"index": 45, "arxiv_id": "2604.00886v1", "title": "PixelPrune: Pixel-Level Adaptive Visual Token Reduction via Predictive Coding", "summary": "Document understanding and GUI interaction are among the highest-value applications of Vision-Language Models (VLMs), yet they impose exceptionally heavy computational burden: fine-grained text and small UI elements demand high-resolution inputs that produce tens of thousands of visual tokens. We observe that this cost is largely wasteful -- across document and GUI benchmarks, only 22--71\\% of image patches are pixel-unique, the rest being exact duplicates of another patch in the same image. We propose \\textbf{PixelPrune}, which exploits this pixel-level redundancy through predictive-coding-based compression, pruning redundant patches \\emph{before} the Vision Transformer (ViT) encoder. Because it operates in pixel space prior to any neural computation, PixelPrune accelerates both the ViT encoder and the downstream LLM, covering the full inference pipeline. The method is training-free, requires no learnable parameters, and supports pixel-lossless compression ($τ{=}0$) as well as controlled lossy compression ($τ{>}0$). Experiments across three model scales and document and GUI benchmarks show that PixelPrune maintains competitive task accuracy while delivering up to 4.2$\\times$ inference speedup and 1.9$\\times$ training acceleration. Code is available at https://github.com/OPPO-Mente-Lab/PixelPrune.", "published": "2026-04-01T13:33:27Z", "authors": ["Nan Wang", "Zhiwei Jin", "Chen Chen", "Haonan Lu"], "abs_url": "https://arxiv.org/abs/2604.00886v1", "pdf_url": "https://arxiv.org/pdf/2604.00886v1", "x": 6.081446170806885, "y": 5.706142902374268, "similar_indices": [106, 88, 57, 196, 136]}, {"index": 46, "arxiv_id": "2604.00878v1", "title": "KUET at StanceNakba Shared Task: StanceMoE: Mixture-of-Experts Architecture for Stance Detection", "summary": "Actor-level stance detection aims to determine an author expressed position toward specific geopolitical actors mentioned or implicated in a text. Although transformer-based models have achieved relatively good performance in stance classification, they typically rely on unified representations that may not sufficiently capture heterogeneous linguistic signals, such as contrastive discourse structures, framing cues, and salient lexical indicators. This motivates the need for adaptive architectures that explicitly model diverse stance-expressive patterns. In this paper, we propose StanceMoE, a context-enhanced Mixture-of-Experts (MoE) architecture built upon a fine-tuned BERT encoder for actor-level stance detection. Our model integrates six expert modules designed to capture complementary linguistic signals, including global semantic orientation, salient lexical cues, clause-level focus, phrase-level patterns, framing indicators, and contrast-driven discourse shifts. A context-aware gating mechanism dynamically weights expert contributions, enabling adaptive routing based on input characteristics. Experiments are conducted on the StanceNakba 2026 Subtask A dataset, comprising 1,401 annotated English texts where the target actor is implicit in the text. StanceMoE achieves a macro-F1 score of 94.26%, outperforming traditional baselines, and alternative BERT-based variants.", "published": "2026-04-01T13:24:03Z", "authors": ["Abdullah Al Shafi", "Md. Milon Islam", "Sk. Imran Hossain", "K. M. Azharul Hasan"], "abs_url": "https://arxiv.org/abs/2604.00878v1", "pdf_url": "https://arxiv.org/pdf/2604.00878v1", "x": 0.9974330067634583, "y": 9.086824417114258, "similar_indices": [189, 49, 33, 31, 108]}, {"index": 47, "arxiv_id": "2604.00842v1", "title": "Proactive Agent Research Environment: Simulating Active Users to Evaluate Proactive Assistants", "summary": "Proactive agents that anticipate user needs and autonomously execute tasks hold great promise as digital assistants, yet the lack of realistic user simulation frameworks hinders their development. Existing approaches model apps as flat tool-calling APIs, failing to capture the stateful and sequential nature of user interaction in digital environments and making realistic user simulation infeasible. We introduce Proactive Agent Research Environment (Pare), a framework for building and evaluating proactive agents in digital environments. Pare models applications as finite state machines with stateful navigation and state-dependent action space for the user simulator, enabling active user simulation. Building on this foundation, we present Pare-Bench, a benchmark of 143 diverse tasks spanning communication, productivity, scheduling, and lifestyle apps, designed to test context observation, goal inference, intervention timing, and multi-app orchestration.", "published": "2026-04-01T12:53:01Z", "authors": ["Deepak Nathani", "Cheng Zhang", "Chang Huan", "Jiaming Shan", "Yinfei Yang", "Alkesh Patel", "Zhe Gan", "William Yang Wang", "Michael Saxon", "Xin Eric Wang"], "abs_url": "https://arxiv.org/abs/2604.00842v1", "pdf_url": "https://arxiv.org/pdf/2604.00842v1", "x": 0.09612199664115906, "y": -6.740701675415039, "similar_indices": [102, 171, 177, 0, 133]}, {"index": 48, "arxiv_id": "2604.00830v1", "title": "Learning to Learn-at-Test-Time: Language Agents with Learnable Adaptation Policies", "summary": "Test-Time Learning (TTL) enables language agents to iteratively refine their performance through repeated interactions with the environment at inference time. At the core of TTL is an adaptation policy that updates the actor policy based on experience from previous episodes, thereby improving future behavior. Existing methods rely on fixed, hand-crafted adaptation policies rather than optimizing them for downstream improvement. We argue that optimal adaptation policies should be learned from task environments, not hand-engineered based on human intuition. To achieve this, we introduce Meta-TTL, a framework that formulates the discovery of effective adaptation policies as a bi-level optimization problem. Within this framework, the inner loop executes the standard TTL process, measuring how effectively a candidate adaptation policy helps an agent correct errors across sequential episodes. Guided by the agent's performance, the outer loop employs evolutionary search over a diverse distribution of training tasks to iteratively refine the adaptation policy. We evaluate Meta-TTL on Jericho and WebArena-Lite across both in-distribution (ID) and out-of-distribution (OOD) settings, using multiple meta-agent backbones. Results on both benchmarks show that Meta-TTL consistently outperforms hand-crafted baselines, suggesting that the optimized adaptation policy encodes transferable strategies that generalize beyond the training task distribution.", "published": "2026-04-01T12:41:01Z", "authors": ["Zhanzhi Lou", "Hui Chen", "Yibo Li", "Qian Wang", "Bryan Hooi"], "abs_url": "https://arxiv.org/abs/2604.00830v1", "pdf_url": "https://arxiv.org/pdf/2604.00830v1", "x": -5.395084857940674, "y": -2.1363954544067383, "similar_indices": [194, 108, 53, 27, 190]}, {"index": 49, "arxiv_id": "2604.00819v1", "title": "Emotion Entanglement and Bayesian Inference for Multi-Dimensional Emotion Understanding", "summary": "Understanding emotions in natural language is inherently a multi-dimensional reasoning problem, where multiple affective signals interact through context, interpersonal relations, and situational cues. However, most existing emotion understanding benchmarks rely on short texts and predefined emotion labels, reducing this process to independent label prediction and ignoring the structured dependencies among emotions. To address this limitation, we introduce Emotional Scenarios (EmoScene), a theory-grounded benchmark of 4,731 context-rich scenarios annotated with an 8-dimensional emotion vector derived from Plutchik's basic emotions. We evaluate six instruction-tuned large language models in a zero-shot setting and observe modest performance, with the best model achieving a Macro F1 of 0.501, highlighting the difficulty of context-aware multi-label emotion prediction. Motivated by the observation that emotions rarely occur independently, we further propose an entanglement-aware Bayesian inference framework that incorporates emotion co-occurrence statistics to perform joint posterior inference over the emotion vector. This lightweight post-processing improves structural consistency of predictions and yields notable gains for weaker models (e.g., +0.051 Macro F1 for Qwen2.5-7B). EmoScene therefore provides a challenging benchmark for studying multi-dimensional emotion understanding and the limitations of current language models.", "published": "2026-04-01T12:27:04Z", "authors": ["Hemanth Kotaprolu", "Kishan Maharaj", "Raey Zhao", "Abhijit Mishra", "Pushpak Bhattacharyya"], "abs_url": "https://arxiv.org/abs/2604.00819v1", "pdf_url": "https://arxiv.org/pdf/2604.00819v1", "x": 1.3481225967407227, "y": 8.47188949584961, "similar_indices": [46, 31, 191, 80, 108]}, {"index": 50, "arxiv_id": "2604.00813v1", "title": "DVGT-2: Vision-Geometry-Action Model for Autonomous Driving at Scale", "summary": "End-to-end autonomous driving has evolved from the conventional paradigm based on sparse perception into vision-language-action (VLA) models, which focus on learning language descriptions as an auxiliary task to facilitate planning. In this paper, we propose an alternative Vision-Geometry-Action (VGA) paradigm that advocates dense 3D geometry as the critical cue for autonomous driving. As vehicles operate in a 3D world, we think dense 3D geometry provides the most comprehensive information for decision-making. However, most existing geometry reconstruction methods (e.g., DVGT) rely on computationally expensive batch processing of multi-frame inputs and cannot be applied to online planning. To address this, we introduce a streaming Driving Visual Geometry Transformer (DVGT-2), which processes inputs in an online manner and jointly outputs dense geometry and trajectory planning for the current frame. We employ temporal causal attention and cache historical features to support on-the-fly inference. To further enhance efficiency, we propose a sliding-window streaming strategy and use historical caches within a certain interval to avoid repetitive computations. Despite the faster speed, DVGT-2 achieves superior geometry reconstruction performance on various datasets. The same trained DVGT-2 can be directly applied to planning across diverse camera configurations without fine-tuning, including closed-loop NAVSIM and open-loop nuScenes benchmarks.", "published": "2026-04-01T12:21:26Z", "authors": ["Sicheng Zuo", "Zixun Xie", "Wenzhao Zheng", "Shaoqing Xu", "Fang Li", "Hanbing Li", "Long Chen", "Zhi-Xin Yang", "Jiwen Lu"], "abs_url": "https://arxiv.org/abs/2604.00813v1", "pdf_url": "https://arxiv.org/pdf/2604.00813v1", "x": 5.599822044372559, "y": 2.8920931816101074, "similar_indices": [77, 166, 32, 16, 31]}, {"index": 51, "arxiv_id": "2604.00801v1", "title": "Routing-Free Mixture-of-Experts", "summary": "Standard Mixture-of-Experts (MoE) models rely on centralized routing mechanisms that introduce rigid inductive biases. We propose Routing-Free MoE which eliminates any hard-coded centralized designs including external routers, Softmax, Top-K and load balancing, instead encapsulating all activation functionalities within individual experts and directly optimized through continuous gradient flow, enabling each expert to determine its activation entirely on its own. We introduce a unified adaptive load-balancing framework to simultaneously optimize both expert-balancing and token-balancing objectives through a configurable interpolation, allowing flexible and customizable resource allocation. Extensive experiments show that Routing-Free MoE can consistently outperform baselines with better scalability and robustness. We analyze its behavior in detail and offer insights that may facilitate future MoE design ad optimization.", "published": "2026-04-01T12:07:20Z", "authors": ["Yilun Liu", "Jinru Han", "Sikuan Yan", "Volker Tresp", "Yunpu Ma"], "abs_url": "https://arxiv.org/abs/2604.00801v1", "pdf_url": "https://arxiv.org/pdf/2604.00801v1", "x": 8.932754516601562, "y": -0.8941912651062012, "similar_indices": [92, 12, 70, 52, 43]}, {"index": 52, "arxiv_id": "2604.00795v1", "title": "Preference Guided Iterated Pareto Referent Optimisation for Accessible Route Planning", "summary": "We propose the Preference Guided Iterated Pareto Referent Optimisation (PG-IPRO) for urban route planning for people with different accessibility requirements and preferences. With this algorithm the user can interact with the system by giving feedback on a route, i.e., the user can say which objective should be further minimized, or conversely can be relaxed. This leads to intuitive user interaction, that is especially effective during early iterations compared to information-gain-based interaction. Furthermore, due to PG-IPRO's iterative nature, the full set of alternative, possibly optimal policies (the Pareto front), is never computed, leading to higher computational efficiency and shorter waiting times for users.", "published": "2026-04-01T12:05:48Z", "authors": ["Paolo Speziali", "Arno De Greef", "Mehrdad Asadi", "Willem Röpke", "Ann Nowé", "Diederik M. Roijers"], "abs_url": "https://arxiv.org/abs/2604.00795v1", "pdf_url": "https://arxiv.org/pdf/2604.00795v1", "x": 9.17540454864502, "y": -2.0229105949401855, "similar_indices": [51, 19, 92, 71, 193]}, {"index": 53, "arxiv_id": "2604.00790v1", "title": "RefineRL: Advancing Competitive Programming with Self-Refinement Reinforcement Learning", "summary": "While large language models (LLMs) have demonstrated strong performance on complex reasoning tasks such as competitive programming (CP), existing methods predominantly focus on single-attempt settings, overlooking their capacity for iterative refinement. In this paper, we present RefineRL, a novel approach designed to unleash the self-refinement capabilities of LLMs for CP problem solving. RefineRL introduces two key innovations: (1) Skeptical-Agent, an iterative self-refinement agent equipped with local execution tools to validate generated solutions against public test cases of CP problems. This agent always maintains a skeptical attitude towards its own outputs and thereby enforces rigorous self-refinement even when validation suggests correctness. (2) A reinforcement learning (RL) solution to incentivize LLMs to self-refine with only standard RLVR data (i.e., problems paired with their verifiable answers). Extensive experiments on Qwen3-4B and Qwen3-4B-2507 demonstrate that our method yields substantial gains: after our RL training, these compact 4B models integrated with the Skeptical-Agent not only outperform much larger 32B models but also approach the single-attempt performance of 235B models. These findings suggest that self-refinement holds considerable promise for scaling LLM reasoning, with significant potential for further advancement.", "published": "2026-04-01T11:54:57Z", "authors": ["Shaopeng Fu", "Xingxing Zhang", "Li Dong", "Di Wang", "Furu Wei"], "abs_url": "https://arxiv.org/abs/2604.00790v1", "pdf_url": "https://arxiv.org/pdf/2604.00790v1", "x": -7.149765968322754, "y": -2.3810439109802246, "similar_indices": [91, 48, 10, 7, 65]}, {"index": 54, "arxiv_id": "2604.00788v1", "title": "UK AISI Alignment Evaluation Case-Study", "summary": "This technical report presents methods developed by the UK AI Security Institute for assessing whether advanced AI systems reliably follow intended goals. Specifically, we evaluate whether frontier models sabotage safety research when deployed as coding assistants within an AI lab. Applying our methods to four frontier models, we find no confirmed instances of research sabotage. However, we observe that Claude Opus 4.5 Preview (a pre-release snapshot of Opus 4.5) and Sonnet 4.5 frequently refuse to engage with safety-relevant research tasks, citing concerns about research direction, involvement in self-training, and research scope. We additionally find that Opus 4.5 Preview shows reduced unprompted evaluation awareness compared to Sonnet 4.5, while both models can distinguish evaluation from deployment scenarios when prompted. Our evaluation framework builds on Petri, an open-source LLM auditing tool, with a custom scaffold designed to simulate realistic internal deployment of a coding agent. We validate that this scaffold produces trajectories that all tested models fail to reliably distinguish from real deployment data. We test models across scenarios varying in research motivation, activity type, replacement threat, and model autonomy. Finally, we discuss limitations including scenario coverage and evaluation awareness.", "published": "2026-04-01T11:53:25Z", "authors": ["Alexandra Souly", "Robert Kirk", "Jacob Merizian", "Abby D'Cruz", "Xander Davies"], "abs_url": "https://arxiv.org/abs/2604.00788v1", "pdf_url": "https://arxiv.org/pdf/2604.00788v1", "x": 4.643832683563232, "y": -6.1128764152526855, "similar_indices": [104, 22, 144, 24, 74]}, {"index": 55, "arxiv_id": "2604.00785v1", "title": "Scalable Pretraining of Large Mixture of Experts Language Models on Aurora Super Computer", "summary": "Pretraining Large Language Models (LLMs) from scratch requires massive amount of compute. Aurora super computer is an ExaScale machine with 127,488 Intel PVC (Ponte Vechio) GPU tiles. In this work, we showcase LLM pretraining on Aurora at the scale of 1000s of GPU tiles. Towards this effort, we developed Optimus, an inhouse training library with support for standard large model training techniques. Using Optimus, we first pretrained Mula-1B, a 1 Billion dense model and Mula-7B-A1B, a 7 Billion Mixture of Experts (MoE) model from scratch on 3072 GPU tiles for the full 4 trillion tokens of the OLMoE-mix-0924 dataset. We then demonstrated model scaling by pretraining three large MoE models Mula-20B-A2B, Mula-100B-A7B, and Mula-220B-A10B till 100 Billion tokens on the same dataset. On our largest model Mula-220B-A10B, we pushed the compute scaling from 384 to 12288 GPU tiles and observed scaling efficiency of around 90% at 12288 GPU tiles. We significantly improved the runtime performance of MoE models using custom GPU kernels for expert computation, and a novel EP-Aware sharded optimizer resulting in training speedups up to 1.71x. As part of the Optimus library, we also developed a robust set of reliability and fault tolerant features to improve training stability and continuity at scale.", "published": "2026-04-01T11:46:17Z", "authors": ["Dharma Teja Vooturi", "Dhiraj Kalamkar", "Dipankar Das", "Bharat Kaul"], "abs_url": "https://arxiv.org/abs/2604.00785v1", "pdf_url": "https://arxiv.org/pdf/2604.00785v1", "x": -2.892174005508423, "y": 5.902315139770508, "similar_indices": [59, 27, 160, 62, 63]}, {"index": 56, "arxiv_id": "2604.00770v1", "title": "Thinking Wrong in Silence: Backdoor Attacks on Continuous Latent Reasoning", "summary": "A new generation of language models reasons entirely in continuous hidden states, producing no tokens and leaving   no audit trail. We show that this silence creates a fundamentally new attack surface. ThoughtSteer perturbs a   single embedding vector at the input layer; the model's own multi-pass reasoning amplifies this perturbation into a   hijacked latent trajectory that reliably produces the attacker's chosen answer, while remaining structurally   invisible to every token-level defense. Across two architectures (Coconut and SimCoT), three reasoning benchmarks,   and model scales from 124M to 3B parameters, ThoughtSteer achieves >=99% attack success rate with near-baseline   clean accuracy, transfers to held-out benchmarks without retraining (94-100%), evades all five evaluated active   defenses, and survives 25 epochs of clean fine-tuning. We trace these results to a unifying mechanism: Neural   Collapse in the latent space pulls triggered representations onto a tight geometric attractor, explaining both why   defenses fail and why any effective backdoor must leave a linearly separable signature (probe AUC>=0.999). Yet a   striking paradox emerges: individual latent vectors still encode the correct answer even as the model outputs the   wrong one. The adversarial information is not in any single vector but in the collective trajectory, establishing   backdoor perturbations as a new lens for mechanistic interpretability of continuous reasoning. Code and checkpoints   are available.", "published": "2026-04-01T11:34:55Z", "authors": ["Swapnil Parekh"], "abs_url": "https://arxiv.org/abs/2604.00770v1", "pdf_url": "https://arxiv.org/pdf/2604.00770v1", "x": -4.195403099060059, "y": 2.365877389907837, "similar_indices": [6, 144, 85, 24, 104]}, {"index": 57, "arxiv_id": "2604.00757v1", "title": "IWP: Token Pruning as Implicit Weight Pruning in Large Vision Language Models", "summary": "Large Vision Language Models show impressive performance across image and video understanding tasks, yet their computational cost grows rapidly with the number of visual tokens. Existing token pruning methods mitigate this issue through empirical approaches while overlooking the internal mechanism of attention. In this paper, we propose a novel training free token pruning framework grounded in the dual form perspective of attention. We reformulate attention as an implicit linear layer whose weight matrix is the sum of rank 1 outer products, each generated by a single token's key value pair. Token pruning thus reduces to selecting an optimal subset of these rank 1 updates that best approximates the original dual weight matrix. Extending this perspective to standard softmax attention in LVLMs, we derive a novel metric quantifying both a token's information magnitude and information duplication. To efficiently select the subset with the proposed metric, we introduce Progressive Chunked Maximal Marginal Relevance. Extensive experiments demonstrate that our method achieves a better trade off between performance and efficiency, while providing another perspective on existing pruning approaches.", "published": "2026-04-01T11:23:16Z", "authors": ["Dong-Jae Lee", "Sunghyun Baek", "Junmo Kim"], "abs_url": "https://arxiv.org/abs/2604.00757v1", "pdf_url": "https://arxiv.org/pdf/2604.00757v1", "x": 4.056327819824219, "y": 5.7858428955078125, "similar_indices": [136, 124, 45, 88, 41]}, {"index": 58, "arxiv_id": "2604.00739v1", "title": "BioCOMPASS: Integrating Biomarkers into Transformer-Based Immunotherapy Response Prediction", "summary": "Datasets used in immunotherapy response prediction are typically small in size, as well as diverse in cancer type, drug administered, and sequencer used. Models often drop in performance when tested on patient cohorts that are not included in the training process. Recent work has shown that transformer-based models along with self-supervised learning show better generalisation performance than threshold-based biomarkers, but is still suboptimal. We present BioCOMPASS, an extension of a transformer-based model called COMPASS, that integrates biomarkers and treatment information to further improve its generalisability. Instead of feeding biomarker data as input, we built loss components to align them with the model's intermediate representations. We found that components such as treatment gating and pathway consistency loss improved generalisability when evaluated with Leave-one-cohort-out, Leave-one-cancer-type-out and Leave-one-treatment-out strategies. Results show that building components that exploit biomarker and treatment information can help in generalisability of immunotherapy response prediction. Careful curation of additional components that leverage complementary clinical information and domain knowledge represents a promising direction for future research.", "published": "2026-04-01T11:06:29Z", "authors": ["Sayed Hashim", "Frank Soboczenski", "Paul Cairns"], "abs_url": "https://arxiv.org/abs/2604.00739v1", "pdf_url": "https://arxiv.org/pdf/2604.00739v1", "x": 8.446137428283691, "y": 11.285526275634766, "similar_indices": [149, 150, 97, 11, 79]}, {"index": 59, "arxiv_id": "2604.00733v1", "title": "Spectral Compact Training: Pre-Training Large Language Models via Permanent Truncated SVD and Stiefel QR Retraction", "summary": "The memory wall remains the primary bottleneck for training large language models on consumer hardware. We introduce Spectral Compact Training (SCT), a method that replaces dense weight matrices with permanent truncated SVD factors W = U diag(s) V^T, where the full dense matrix is never materialized during training or inference. Gradients flow through the compact spectral factors via standard backpropagation, and U, V are retracted to the Stiefel manifold via QR decomposition after each optimizer step. SCT achieves up to 199x memory reduction per MLP layer at rank 32, enabling full training steps of 70B-parameter architectures on a Steam Deck handheld (7.2 GB peak memory vs. 1,245 GB for dense FP32 training with Adam). Rank-sweep experiments on SmolLM2-1.7B (ranks 32-256, 2000 steps, NVIDIA A100) show that all tested ranks converge to the same loss floor (~4.2-4.5), identifying the learning rate schedule -- not MLP rank -- as the primary bottleneck. Rank 128 emerges as the efficiency sweet spot at 11.7x MLP compression with the lowest perplexity. GPU memory drops 46% at rank 32 while training throughput doubles.", "published": "2026-04-01T10:53:56Z", "authors": ["Björn Roman Kohlberger"], "abs_url": "https://arxiv.org/abs/2604.00733v1", "pdf_url": "https://arxiv.org/pdf/2604.00733v1", "x": -2.425509452819824, "y": 5.961112976074219, "similar_indices": [55, 63, 12, 160, 122]}, {"index": 60, "arxiv_id": "2604.00730v1", "title": "A CEFR-Inspired Classification Framework with Fuzzy C-Means To Automate Assessment of Programming Skills in Scratch", "summary": "Context: Schools, training platforms, and technology firms increasingly need to assess programming proficiency at scale with transparent, reproducible methods that support personalized learning pathways. Objective: This study introduces a pedagogical framework for Scratch project assessment, aligned with the Common European Framework of Reference (CEFR), providing universal competency levels for students and teachers alongside actionable insights for curriculum design. Method: We apply Fuzzy C-Means clustering to 2008246 Scratch projects evaluated via Dr.Scratch, implementing an ordinal criterion to map clusters to CEFR levels (A1-C2), and introducing enhanced classification metrics that identify transitional learners, enable continuous progress tracking, and quantify classification certainty to balance automated feedback with instructor review. Impact: The framework enables diagnosis of systemic curriculum gaps-notably a \"B2 bottleneck\" where only 13.3% of learners reside due to the cognitive load of integrating Logic Synchronization, and Data Representation--while providing certainty--based triggers for human intervention.", "published": "2026-04-01T10:42:07Z", "authors": ["Ricardo Hidalgo-Aragón", "Jesús M. González-Barahona", "Gregorio Robles"], "abs_url": "https://arxiv.org/abs/2604.00730v1", "pdf_url": "https://arxiv.org/pdf/2604.00730v1", "x": -9.375651359558105, "y": -6.52951717376709, "similar_indices": [111, 135, 17, 39, 154]}, {"index": 61, "arxiv_id": "2604.00717v1", "title": "GRASP: Gradient Realignment via Active Shared Perception for Multi-Agent Collaborative Optimization", "summary": "Non-stationarity arises from concurrent policy updates and leads to persistent environmental fluctuations. Existing approaches like Centralized Training with Decentralized Execution (CTDE) and sequential update schemes mitigate this issue. However, since the perception of the policies of other agents remains dependent on sampling environmental interaction data, the agent essentially operates in a passive perception state. This inevitably triggers equilibrium oscillations and significantly slows the convergence speed of the system. To address this issue, we propose Gradient Realignment via Active Shared Perception (GRASP), a novel framework that defines generalized Bellman equilibrium as a stable objective for policy evolution. The core mechanism of GRASP involves utilizing the independent gradients of agents to derive a defined consensus gradient, enabling agents to actively perceive policy updates and optimize team collaboration. Theoretically, we leverage the Kakutani Fixed-Point Theorem to prove that the consensus direction $u^*$ guarantees the existence and attainability of this equilibrium. Extensive experiments on StarCraft II Multi-Agent Challenge (SMAC) and Google Research Football (GRF) demonstrate the scalability and promising performance of the framework.", "published": "2026-04-01T10:26:22Z", "authors": ["Sihan Zhou", "Tiantian He", "Yifan Lu", "Yaqing Hou", "Yew-Soon Ong"], "abs_url": "https://arxiv.org/abs/2604.00717v1", "pdf_url": "https://arxiv.org/pdf/2604.00717v1", "x": -9.234606742858887, "y": 0.5776103734970093, "similar_indices": [164, 43, 37, 105, 120]}, {"index": 62, "arxiv_id": "2604.00716v1", "title": "CircuitProbe: Predicting Reasoning Circuits in Transformers via Stability Zone Detection", "summary": "Transformer language models contain localized reasoning circuits, contiguous layer blocks that improve reasoning when duplicated at inference time. Finding these circuits currently requires brute-force sweeps costing 25 GPU hours per model. We propose CircuitProbe, which predicts circuit locations from activation statistics in under 5 minutes on CPU, providing a speedup of three to four orders of magnitude. We find that reasoning circuits come in two types: stability circuits in early layers, detected through the derivative of representation change, and magnitude circuits in late layers, detected through anomaly scoring. We validate across 9 models spanning 6 architectures, including 2025 models, confirming that CircuitProbe top predictions match or are within 2 layers of the optimal circuit in all validated cases. A scaling experiment across the Qwen 2.5 family reveals that layer duplication consistently benefits models under 3B parameters but degrades performance in 7B+ models, making this a practical scaling technique for small language models. CircuitProbe requires as few as 10 calibration examples and its predictions are stable across English, Hindi, Chinese, and French.", "published": "2026-04-01T10:26:12Z", "authors": ["Rajkiran Panuganti"], "abs_url": "https://arxiv.org/abs/2604.00716v1", "pdf_url": "https://arxiv.org/pdf/2604.00716v1", "x": -3.2153115272521973, "y": 4.301784038543701, "similar_indices": [10, 56, 55, 12, 81]}, {"index": 63, "arxiv_id": "2604.00715v1", "title": "To Memorize or to Retrieve: Scaling Laws for RAG-Considerate Pretraining", "summary": "Retrieval-augmented generation (RAG) improves language model (LM) performance by providing relevant context at test time for knowledge-intensive situations. However, the relationship between parametric knowledge acquired during pretraining and non-parametric knowledge accessed via retrieval remains poorly understood, especially under fixed data budgets. In this work, we systematically study the trade-off between pretraining corpus size and retrieval store size across a wide range of model and data scales. We train OLMo-2-based LMs ranging from 30M to 3B parameters on up to 100B tokens of DCLM data, while varying both pretraining data scale (1-150x the number of parameters) and retrieval store size (1-20x), and evaluate performance across a diverse suite of benchmarks spanning reasoning, scientific QA, and open-domain QA. We find that retrieval consistently improves performance over parametric-only baselines across model scales and introduce a three-dimensional scaling framework that models performance as a function of model size, pretraining tokens, and retrieval corpus size. This scaling manifold enables us to estimate optimal allocations of a fixed data budget between pretraining and retrieval, revealing that the marginal utility of retrieval depends strongly on model scale, task type, and the degree of pretraining saturation. Our results provide a quantitative foundation for understanding when and how retrieval should complement pretraining, offering practical guidance for allocating data resources in the design of scalable language modeling systems.", "published": "2026-04-01T10:26:03Z", "authors": ["Karan Singh", "Michael Yu", "Varun Gangal", "Zhuofu Tao", "Sachin Kumar", "Emmy Liu", "Steven Y. Feng"], "abs_url": "https://arxiv.org/abs/2604.00715v1", "pdf_url": "https://arxiv.org/pdf/2604.00715v1", "x": -1.0758607387542725, "y": 3.6602132320404053, "similar_indices": [7, 27, 0, 10, 31]}, {"index": 64, "arxiv_id": "2604.00704v1", "title": "AutoEG: Exploiting Known Third-Party Vulnerabilities in Black-Box Web Applications", "summary": "Large-scale web applications are widely deployed with complex third-party components, inheriting security risks arising from component vulnerabilities. Security assessment is therefore required to determine whether such known vulnerabilities remain practically exploitable in real applications. Penetration testing is a widely adopted approach that validates exploitability by launching concrete attacks against known vulnerabilities in real-world black-box systems. However, existing approaches often fail to automatically generate reliable exploits, limiting their effectiveness in practical security assessment. This limitation mainly stems from two issues: (1) precisely triggering vulnerabilities with correct technical details, and (2) adapting exploits to diverse real-world deployment settings.   In this paper, we propose AutoEG, a fully automated multi-agent framework for exploit generation targeting black-box web applications. AutoEG has two phases: First, AutoEG extracts precise vulnerability trigger logic from unstructured vulnerability information and encapsulates it into reusable trigger functions. Second, AutoEG uses trigger functions for concrete attack objectives and iteratively refines exploits through feedback-driven interaction with the target application. We evaluate AutoEG on 104 real-world vulnerabilities with 29 attack objectives, resulting in 660 exploitation tasks and 55,440 exploit attempts. AutoEG achieves an average success rate of 82.41%, substantially outperforming state-of-the-art baselines, whose best performance reaches only 32.88%.", "published": "2026-04-01T10:07:45Z", "authors": ["Ruozhao Yang", "Mingfei Cheng", "Gelei Deng", "Junjie Wang", "Tianwei Zhang", "Xiaofei Xie"], "abs_url": "https://arxiv.org/abs/2604.00704v1", "pdf_url": "https://arxiv.org/pdf/2604.00704v1", "x": 3.805187702178955, "y": -7.62017822265625, "similar_indices": [144, 133, 24, 22, 13]}, {"index": 65, "arxiv_id": "2604.00698v1", "title": "Learning to Hint for Reinforcement Learning", "summary": "Group Relative Policy Optimization (GRPO) is widely used for reinforcement learning with verifiable rewards, but it often suffers from advantage collapse: when all rollouts in a group receive the same reward, the group yields zero relative advantage and thus no learning signal. For example, if a question is too hard for the reasoner, all sampled rollouts can be incorrect and receive zero reward. Recent work addresses this issue by adding hints or auxiliary scaffolds to such hard questions so that the reasoner produces mixed outcomes and recovers a non-zero update. However, existing hints are usually fixed rather than adapted to the current reasoner, and a hint that creates learning signal under the hinted input does not necessarily improve the no-hint policy used at test time. To this end, we propose Hint Learning for Reinforcement Learning (HiLL), a framework that jointly trains a hinter policy and a reasoner policy during RL. For each hard question, the hinter generates hints online conditioned on the current reasoner's incorrect rollout, allowing hint generation to adapt to the reasoner's evolving errors. We further introduce hint reliance, which measures how strongly correct hinted trajectories depend on the hint. We derive a transferability result showing that lower hint reliance implies stronger transfer from hinted success to no-hint success, and we use this result to define a transfer-weighted reward for training the hinter. Therefore, HiLL favors hints that not only recover informative GRPO groups, but also produce signals that are more likely to improve the original no-hint policy. Experiments across multiple benchmarks show that HiLL consistently outperforms GRPO and prior hint-based baselines, demonstrating the value of adaptive and transfer-aware hint learning for RL. The code is available at https://github.com/Andree-9/HiLL.", "published": "2026-04-01T09:58:08Z", "authors": ["Yu Xia", "Canwen Xu", "Zhewei Yao", "Julian McAuley", "Yuxiong He"], "abs_url": "https://arxiv.org/abs/2604.00698v1", "pdf_url": "https://arxiv.org/pdf/2604.00698v1", "x": -9.981547355651855, "y": -0.6227738857269287, "similar_indices": [164, 48, 117, 53, 139]}, {"index": 66, "arxiv_id": "2604.00694v1", "title": "Internal APIs Are All You Need: Shadow APIs, Shared Discovery, and the Case Against Browser-First Agent Architectures", "summary": "Autonomous agents increasingly interact with the web, yet most websites remain designed for human browsers -- a fundamental mismatch that the emerging ``Agentic Web'' must resolve. Agents must repeatedly browse pages, inspect DOMs, and reverse-engineer callable routes -- a process that is slow, brittle, and redundantly repeated across agents. We observe that every modern website already exposes internal APIs (sometimes called \\emph{shadow APIs}) behind its user interface -- first-party endpoints that power the site's own functionality. We present Unbrowse, a shared route graph that transforms browser-based route discovery into a collectively maintained index of these callable first-party interfaces. The system passively learns routes from real browsing traffic and serves cached routes via direct API calls. In a single-host live-web benchmark of equivalent information-retrieval tasks across 94 domains, fully warmed cached execution averaged 950\\,ms versus 3{,}404\\,ms for Playwright browser automation (3.6$\\times$ mean speedup, 5.4$\\times$ median), with well-cached routes completing in under 100\\,ms. A three-path execution model -- local cache, shared graph, or browser fallback -- ensures the system is voluntary and self-correcting. A three-tier micropayment model via the x402 protocol charges per-query search fees for graph lookups (Tier~3), a one-time install fee for discovery documentation (Tier~1), and optional per-execution fees for site owners who opt in (Tier~2). All tiers are grounded in a necessary condition for rational adoption: an agent uses the shared graph only when the total fee is lower than the expected cost of browser rediscovery.", "published": "2026-04-01T09:51:46Z", "authors": ["Lewis Tham", "Nicholas Mac Gregor Garcia", "Jungpil Hahn"], "abs_url": "https://arxiv.org/abs/2604.00694v1", "pdf_url": "https://arxiv.org/pdf/2604.00694v1", "x": -0.6717898845672607, "y": -8.483851432800293, "similar_indices": [133, 102, 47, 7, 73]}, {"index": 67, "arxiv_id": "2604.00675v1", "title": "Procela: Epistemic Governance in Mechanistic Simulations Under Structural Uncertainty", "summary": "Mechanistic simulations typically assume fixed ontologies: variables, causal relationships, and resolution policies are static. This assumption fails when the true causal structure is contested or unidentifiable-as in antimicrobial resistance (AMR) spread, where contact, environmental, and selection ontologies compete. We introduce Procela, a Python framework where variables act as epistemic authorities that maintain complete hypothesis memory, mechanisms encode competing ontologies as causal units, and governance observes epistemic signals and mutates system topology at runtime. This is the first framework where simulations test their own assumptions. We instantiate Procela for AMR in a hospital network with three competing families. Governance detects coverage decay, policy fragility, and runs structural probes. Results show 20.4% error reduction and 69% cumulative regret improvement over baseline. All experiments are reproducible with full auditability. Procela establishes a new paradigm: simulations that model not only the world but their own modeling process, enabling adaptation under structural uncertainty.", "published": "2026-04-01T09:22:32Z", "authors": ["Kinson Vernet"], "abs_url": "https://arxiv.org/abs/2604.00675v1", "pdf_url": "https://arxiv.org/pdf/2604.00675v1", "x": -9.391050338745117, "y": -4.338964939117432, "similar_indices": [72, 137, 95, 139, 118]}, {"index": 68, "arxiv_id": "2604.00660v1", "title": "Streaming Model Cascades for Semantic SQL", "summary": "Modern data warehouses extend SQL with semantic operators that invoke large language models on each qualifying row, but the per-row inference cost is prohibitive at scale. Model cascades reduce this cost by routing most rows through a fast proxy model and delegating uncertain cases to an expensive oracle. Existing frameworks, however, require global dataset access and optimize a single quality metric, limiting their applicability in distributed systems where data is partitioned across independent workers. We present two adaptive cascade algorithms designed for streaming, per-partition execution in which each worker processes its partition independently without inter-worker communication. SUPG-IT extends the SUPG statistical framework to streaming execution with iterative threshold refinement and joint precision-recall guarantees. GAMCAL replaces user-specified quality targets with a learned calibration model: a Generalized Additive Model maps proxy scores to calibrated probabilities with uncertainty quantification, enabling direct optimization of a cost-quality tradeoff through a single parameter. Experiments on six datasets in a production semantic SQL engine show that both algorithms achieve F1 > 0.95 on every dataset. GAMCAL achieves higher F1 per oracle call at cost-sensitive operating points, while SUPG-IT reaches a higher quality ceiling with formal guarantees on precision and recall.", "published": "2026-04-01T09:07:08Z", "authors": ["Paweł Liskowski", "Kyle Schmaus"], "abs_url": "https://arxiv.org/abs/2604.00660v1", "pdf_url": "https://arxiv.org/pdf/2604.00660v1", "x": -7.032095432281494, "y": 3.738166332244873, "similar_indices": [146, 7, 27, 81, 63]}, {"index": 69, "arxiv_id": "2604.00594v1", "title": "Agent psychometrics: Task-level performance prediction in agentic coding benchmarks", "summary": "As the focus in LLM-based coding shifts from static single-step code generation to multi-step agentic interaction with tools and environments, understanding which tasks will challenge agents and why becomes increasingly difficult. This is compounded by current practice: agent performance is typically measured by aggregate pass rates on benchmarks, but single-number metrics obscure the diversity of tasks within a benchmark. We present a framework for predicting success or failure on individual tasks tailored to the agentic coding regime. Our approach augments Item Response Theory (IRT) with rich features extracted from tasks, including issue statements, repository contexts, solutions, and test cases, and introduces a novel decomposition of agent ability into LLM and scaffold ability components. This parameterization enables us to aggregate evaluation data across heterogeneous leaderboards and accurately predict task-level performance for unseen benchmarks, as well as unseen LLM-scaffold combinations. Our methods have practical utility for benchmark designers, who can better calibrate the difficulty of their new tasks without running computationally expensive agent evaluations.", "published": "2026-04-01T07:59:59Z", "authors": ["Chris Ge", "Daria Kryvosheieva", "Daniel Fried", "Uzay Girit", "Kaivalya Hariharan"], "abs_url": "https://arxiv.org/abs/2604.00594v1", "pdf_url": "https://arxiv.org/pdf/2604.00594v1", "x": -2.8501176834106445, "y": -8.163999557495117, "similar_indices": [0, 133, 163, 42, 99]}, {"index": 70, "arxiv_id": "2604.00590v1", "title": "UniMixer: A Unified Architecture for Scaling Laws in Recommendation Systems", "summary": "In recent years, the scaling laws of recommendation models have attracted increasing attention, which govern the relationship between performance and parameters/FLOPs of recommenders. Currently, there are three mainstream architectures for achieving scaling in recommendation models, namely attention-based, TokenMixer-based, and factorization-machine-based methods, which exhibit fundamental differences in both design philosophy and architectural structure. In this paper, we propose a unified scaling architecture for recommendation systems, namely \\textbf{UniMixer}, to improve scaling efficiency and establish a unified theoretical framework that unifies the mainstream scaling blocks. By transforming the rule-based TokenMixer to an equivalent parameterized structure, we construct a generalized parameterized feature mixing module that allows the token mixing patterns to be optimized and learned during model training. Meanwhile, the generalized parameterized token mixing removes the constraint in TokenMixer that requires the number of heads to be equal to the number of tokens. Furthermore, we establish a unified scaling module design framework for recommender systems, which bridges the connections among attention-based, TokenMixer-based, and factorization-machine-based methods. To further boost scaling ROI, a lightweight UniMixing module is designed, \\textbf{UniMixing-Lite}, which further compresses the model parameters and computational cost while significantly improve the model performance. The scaling curves are shown in the following figure. Extensive offline and online experiments are conducted to verify the superior scaling abilities of \\textbf{UniMixer}.", "published": "2026-04-01T07:57:40Z", "authors": ["Mingming Ha", "Guanchen Wang", "Linxun Chen", "Xuan Rao", "Yuexin Shi", "Tianbao Ma", "Zhaojie Liu", "Yunqian Fan", "Zilong Lu", "Yanan Niu", "Han Li", "Kun Gai"], "abs_url": "https://arxiv.org/abs/2604.00590v1", "pdf_url": "https://arxiv.org/pdf/2604.00590v1", "x": 0.2859284579753876, "y": 6.524834632873535, "similar_indices": [25, 57, 140, 9, 80]}, {"index": 71, "arxiv_id": "2604.00556v1", "title": "HabitatAgent: An End-to-End Multi-Agent System for Housing Consultation", "summary": "Housing selection is a high-stakes and largely irreversible decision problem. We study housing consultation as a decision-support interface for housing selection. Existing housing platforms and many LLM-based assistants often reduce this process to ranking or recommendation, resulting in opaque reasoning, brittle multi-constraint handling, and limited guarantees on factuality.   We present HabitatAgent, the first LLM-powered multi-agent architecture for end-to-end housing consultation. HabitatAgent comprises four specialized agent roles: Memory, Retrieval, Generation, and Validation. The Memory Agent maintains multi-layer user memory through internal stages for constraint extraction, memory fusion, and verification-gated updates; the Retrieval Agent performs hybrid vector--graph retrieval (GraphRAG); the Generation Agent produces evidence-referenced recommendations and explanations; and the Validation Agent applies multi-tier verification and targeted remediation. Together, these agents provide an auditable and reliable workflow for end-to-end housing consultation.   We evaluate HabitatAgent on 100 real user consultation scenarios (300 multi-turn question--answer pairs) under an end-to-end correctness protocol. A strong single-stage baseline (Dense+Rerank) achieves 75% accuracy, while HabitatAgent reaches 95%.", "published": "2026-04-01T06:59:50Z", "authors": ["Hongyang Yang", "Yanxin Zhang", "Yang She", "Yue Xiao", "Hao Wu", "Yiyang Zhang", "Jiapeng Hou", "Rongshan Zhang"], "abs_url": "https://arxiv.org/abs/2604.00556v1", "pdf_url": "https://arxiv.org/pdf/2604.00556v1", "x": -1.5300832986831665, "y": -3.072038173675537, "similar_indices": [7, 0, 29, 43, 108]}, {"index": 72, "arxiv_id": "2604.00555v1", "title": "Ontology-Constrained Neural Reasoning in Enterprise Agentic Systems: A Neurosymbolic Architecture for Domain-Grounded AI Agents", "summary": "Enterprise adoption of Large Language Models (LLMs) is constrained by hallucination, domain drift, and the inability to enforce regulatory compliance at the reasoning level. We present a neurosymbolic architecture implemented within the Foundation AgenticOS (FAOS) platform that addresses these limitations through ontology-constrained neural reasoning. Our approach introduces a three-layer ontological framework--Role, Domain, and Interaction ontologies--that provides formal semantic grounding for LLM-based enterprise agents. We formalize the concept of asymmetric neurosymbolic coupling, wherein symbolic ontological knowledge constrains agent inputs (context assembly, tool discovery, governance thresholds) while proposing mechanisms for extending this coupling to constrain agent outputs (response validation, reasoning verification, compliance checking). We evaluate the architecture through a controlled experiment (600 runs across five industries: FinTech, Insurance, Healthcare, Vietnamese Banking, and Vietnamese Insurance), finding that ontology-coupled agents significantly outperform ungrounded agents on Metric Accuracy (p < .001, W = .460), Regulatory Compliance (p = .003, W = .318), and Role Consistency (p < .001, W = .614), with improvements greatest where LLM parametric knowledge is weakest--particularly in Vietnam-localized domains. Our contributions include: (1) a formal three-layer enterprise ontology model, (2) a taxonomy of neurosymbolic coupling patterns, (3) ontology-constrained tool discovery via SQL-pushdown scoring, (4) a proposed framework for output-side ontological validation, (5) empirical evidence for the inverse parametric knowledge effect that ontological grounding value is inversely proportional to LLM training data coverage of the domain, and (6) a production system serving 21 industry verticals with 650+ agents.", "published": "2026-04-01T06:59:15Z", "authors": ["Thanh Luong Tuan"], "abs_url": "https://arxiv.org/abs/2604.00555v1", "pdf_url": "https://arxiv.org/pdf/2604.00555v1", "x": 2.4447460174560547, "y": -10.188478469848633, "similar_indices": [29, 125, 171, 175, 144]}, {"index": 73, "arxiv_id": "2604.00550v1", "title": "BloClaw: An Omniscient, Multi-Modal Agentic Workspace for Next-Generation Scientific Discovery", "summary": "The integration of Large Language Models (LLMs) into life sciences has catalyzed the development of \"AI Scientists.\" However, translating these theoretical capabilities into deployment-ready research environments exposes profound infrastructural vulnerabilities. Current frameworks are bottlenecked by fragile JSON-based tool-calling protocols, easily disrupted execution sandboxes that lose graphical outputs, and rigid conversational interfaces inherently ill-suited for high-dimensional scientific data.We introduce BloClaw, a unified, multi-modal operating system designed for Artificial Intelligence for Science (AI4S). BloClaw reconstructs the Agent-Computer Interaction (ACI) paradigm through three architectural innovations: (1) An XML-Regex Dual-Track Routing Protocol that statistically eliminates serialization failures (0.2% error rate vs. 17.6% in JSON); (2) A Runtime State Interception Sandbox that utilizes Python monkey-patching to autonomously capture and compile dynamic data visualizations (Plotly/Matplotlib), circumventing browser CORS policies; and (3) A State-Driven Dynamic Viewport UI that morphs seamlessly between a minimalist command deck and an interactive spatial rendering engine. We comprehensively benchmark BloClaw across cheminformatics (RDKit), de novo 3D protein folding via ESMFold, molecular docking, and autonomous Retrieval-Augmented Generation (RAG), establishing a highly robust, self-evolving paradigm for computational research assistants. The open-source repository is available at https://github.com/qinheming/BloClaw.", "published": "2026-04-01T06:47:40Z", "authors": ["Yao Qin", "Yangyang Yan", "Jinhua Pang", "Xiaoming Zhang"], "abs_url": "https://arxiv.org/abs/2604.00550v1", "pdf_url": "https://arxiv.org/pdf/2604.00550v1", "x": 0.6470848321914673, "y": -8.093657493591309, "similar_indices": [167, 133, 30, 177, 187]}, {"index": 74, "arxiv_id": "2604.00547v1", "title": "Does Unification Come at a Cost? Uni-SafeBench: A Safety Benchmark for Unified Multimodal Large Models", "summary": "Unified Multimodal Large Models (UMLMs) integrate understanding and generation capabilities within a single architecture. While this architectural unification, driven by the deep fusion of multimodal features, enhances model performance, it also introduces important yet underexplored safety challenges. Existing safety benchmarks predominantly focus on isolated understanding or generation tasks, failing to evaluate the holistic safety of UMLMs when handling diverse tasks under a unified framework. To address this, we introduce Uni-SafeBench, a comprehensive benchmark featuring a taxonomy of six major safety categories across seven task types. To ensure rigorous assessment, we develop Uni-Judger, a framework that effectively decouples contextual safety from intrinsic safety. Based on comprehensive evaluations across Uni-SafeBench, we uncover that while the unification process enhances model capabilities, it significantly degrades the inherent safety of the underlying LLM. Furthermore, open-source UMLMs exhibit much lower safety performance than multimodal large models specialized for either generation or understanding tasks. We open-source all resources to systematically expose these risks and foster safer AGI development.", "published": "2026-04-01T06:45:01Z", "authors": ["Zixiang Peng", "Yongxiu Xu", "Qinyi Zhang", "Jiexun Shen", "Yifan Zhang", "Hongbo Xu", "Yubin Wang", "Gaopeng Gou"], "abs_url": "https://arxiv.org/abs/2604.00547v1", "pdf_url": "https://arxiv.org/pdf/2604.00547v1", "x": 3.808584213256836, "y": -2.2246809005737305, "similar_indices": [107, 173, 163, 30, 0]}, {"index": 75, "arxiv_id": "2604.00537v1", "title": "MATHENA: Mamba-based Architectural Tooth Hierarchical Estimator and Holistic Evaluation Network for Anatomy", "summary": "Dental diagnosis from Orthopantomograms (OPGs) requires coordination of tooth detection, caries segmentation (CarSeg), anomaly detection (AD), and dental developmental staging (DDS). We propose Mamba-based Architectural Tooth Hierarchical Estimator and Holistic Evaluation Network for Anatomy (MATHENA), a unified framework leveraging Mamba's linear-complexity State Space Models (SSM) to address all four tasks. MATHENA integrates MATHE, a multi-resolution SSM-driven detector with four-directional Vision State Space (VSS) blocks for O(N) global context modeling, generating per-tooth crops. These crops are processed by HENA, a lightweight Mamba-UNet with a triple-head architecture and Global Context State Token (GCST). In the triple-head architecture, CarSeg is first trained as an upstream task to establish shared representations, which are then frozen and reused for downstream AD fine-tuning and DDS classification via linear probing, enabling stable, efficient learning. We also curate PARTHENON, a benchmark comprising 15,062 annotated instances from ten datasets. MATHENA achieves 93.78% mAP@50 in tooth detection, 90.11% Dice for CarSeg, 88.35% for AD, and 72.40% ACC for DDS.", "published": "2026-04-01T06:28:52Z", "authors": ["Kyeonghun Kim", "Jaehyung Park", "Youngung Han", "Anna Jung", "Seongbin Park", "Sumin Lee", "Jiwon Yang", "Jiyoon Han", "Subeen Lee", "Junsu Lim", "Hyunsu Go", "Eunseob Choi", "Hyeonseok Jung", "Soo Yong Kim", "Woo Kyoung Jeong", "Won Jae Lee", "Pa Hong", "Hyuk-Jae Lee", "Ken Ying-Kai Liao", "Nam-Joon Kim"], "abs_url": "https://arxiv.org/abs/2604.00537v1", "pdf_url": "https://arxiv.org/pdf/2604.00537v1", "x": 7.315179347991943, "y": 8.538602828979492, "similar_indices": [11, 79, 136, 16, 41]}, {"index": 76, "arxiv_id": "2604.00536v1", "title": "Optimsyn: Influence-Guided Rubrics Optimization for Synthetic Data Generation", "summary": "Large language models (LLMs) achieve strong downstream performance largely due to abundant supervised fine-tuning (SFT) data. However, high-quality SFT data in knowledge-intensive domains such as humanities, social sciences, medicine, law, and finance is scarce because expert curation is expensive, privacy constraints are strict, and label consistency is hard to ensure. Recent work uses synthetic data, typically by prompting a generator over domain documents and filtering outputs with handcrafted rubrics. Yet rubric design is expert-dependent, transfers poorly across domains, and is often optimized through a brittle heuristic loop of writing rubrics, synthesizing data, training, inspecting results, and manually guessing revisions. This process lacks reliable quantitative feedback about how a rubric affects downstream performance. We propose evaluating synthetic data by its training utility on the target model and using this signal to guide data generation. Inspired by influence estimation, we adopt an optimizer-aware estimator that uses gradient information to quantify each synthetic sample's contribution to a target model's objective on specific tasks. Our analysis shows that even when synthetic and real samples are close in embedding space, their influence on learning can differ substantially. Based on this insight, we propose an optimization-based framework that adapts rubrics using target-model feedback. We provide lightweight guiding text and use a rubric-specialized model to generate task-conditioned rubrics. Influence score is used as the reward to optimize the rubric generator with reinforcement learning. Experiments across domains, target models, and data generators show consistent improvements and strong generalization without task-specific tuning.", "published": "2026-04-01T06:28:44Z", "authors": ["Zhiting Fan", "Ruizhe Chen", "Tianxiang Hu", "Ru Peng", "Zenan Huang", "Haokai Xu", "Yixin Chen", "Jian Wu", "Junbo Zhao", "Zuozhu Liu"], "abs_url": "https://arxiv.org/abs/2604.00536v1", "pdf_url": "https://arxiv.org/pdf/2604.00536v1", "x": -0.22976090013980865, "y": 1.5066850185394287, "similar_indices": [169, 93, 7, 27, 108]}, {"index": 77, "arxiv_id": "2604.00528v1", "title": "Think, Act, Build: An Agentic Framework with Vision Language Models for Zero-Shot 3D Visual Grounding", "summary": "3D Visual Grounding (3D-VG) aims to localize objects in 3D scenes via natural language descriptions. While recent advancements leveraging Vision-Language Models (VLMs) have explored zero-shot possibilities, they typically suffer from a static workflow relying on preprocessed 3D point clouds, essentially degrading grounding into proposal matching. To bypass this reliance, our core motivation is to decouple the task: leveraging 2D VLMs to resolve complex spatial semantics, while relying on deterministic multi-view geometry to instantiate the 3D structure. Driven by this insight, we propose \"Think, Act, Build (TAB)\", a dynamic agentic framework that reformulates 3D-VG tasks as a generative 2D-to-3D reconstruction paradigm operating directly on raw RGB-D streams. Specifically, guided by a specialized 3D-VG skill, our VLM agent dynamically invokes visual tools to track and reconstruct the target across 2D frames. Crucially, to overcome the multi-view coverage deficit caused by strict VLM semantic tracking, we introduce the Semantic-Anchored Geometric Expansion, a mechanism that first anchors the target in a reference video clip and then leverages multi-view geometry to propagate its spatial location across unobserved frames. This enables the agent to \"Build\" the target's 3D representation by aggregating these multi-view features via camera parameters, directly mapping 2D visual cues to 3D coordinates. Furthermore, to ensure rigorous assessment, we identify flaws such as reference ambiguity and category errors in existing benchmarks and manually refine the incorrect queries. Extensive experiments on ScanRefer and Nr3D demonstrate that our framework, relying entirely on open-source models, significantly outperforms previous zero-shot methods and even surpasses fully supervised baselines.", "published": "2026-04-01T06:12:16Z", "authors": ["Haibo Wang", "Zihao Lin", "Zhiyang Xu", "Lifu Huang"], "abs_url": "https://arxiv.org/abs/2604.00528v1", "pdf_url": "https://arxiv.org/pdf/2604.00528v1", "x": 6.150746822357178, "y": 2.836113691329956, "similar_indices": [50, 32, 16, 115, 166]}, {"index": 78, "arxiv_id": "2604.00517v1", "title": "Toward Optimal Sampling Rate Selection and Unbiased Classification for Precise Animal Activity Recognition", "summary": "With the rapid advancements in deep learning techniques, wearable sensor-aided animal activity recognition (AAR) has demonstrated promising performance, thereby improving livestock management efficiency as well as animal health and welfare monitoring. However, existing research often prioritizes overall performance, overlooking the fact that classification accuracies for specific animal behavioral categories may remain unsatisfactory. This issue typically stems from suboptimal sampling rates or class imbalance problems. To address these challenges and achieve high classification accuracy across all individual behaviors in farm animals, we propose a novel Individual-Behavior-Aware Network (IBA-Net). This network enhances the recognition of each specific behavior by simultaneously customizing features and calibrating the classifier. Specifically, considering that different behaviors require varying sampling rates to achieve optimal performance, we design a Mixture-of-Experts (MoE)-based Feature Customization (MFC) module. This module adaptively fuses data from multiple sampling rates, capturing customized features tailored to various animal behaviors. Additionally, to mitigate classifier bias toward majority classes caused by class imbalance, we develop a Neural Collapse-driven Classifier Calibration (NC3) module. This module introduces a fixed equiangular tight frame (ETF) classifier during the classification stage, maximizing the angles between pair-wise classifier vectors and thereby improving the classification performance for minority classes. To validate the effectiveness of IBA-Net, we conducted experiments on three public datasets covering goat, cattle, and horse activity recognition. The results demonstrate that our method consistently outperforms existing approaches across all datasets.", "published": "2026-04-01T06:02:58Z", "authors": ["Axiu Mao", "Meilu Zhu", "Lei Shen", "Xiaoshuai Wang", "Tomas Norton", "Kai Liu"], "abs_url": "https://arxiv.org/abs/2604.00517v1", "pdf_url": "https://arxiv.org/pdf/2604.00517v1", "x": 6.960432052612305, "y": 12.072164535522461, "similar_indices": [58, 70, 92, 51, 157]}, {"index": 79, "arxiv_id": "2604.00514v1", "title": "MAESIL: Masked Autoencoder for Enhanced Self-supervised Medical Image Learning", "summary": "Training deep learning models for three-dimensional (3D) medical imaging, such as Computed Tomography (CT), is fundamentally challenged by the scarcity of labeled data. While pre-training on natural images is common, it results in a significant domain shift, limiting performance. Self-Supervised Learning (SSL) on unlabeled medical data has emerged as a powerful solution, but prominent frameworks often fail to exploit the inherent 3D nature of CT scans. These methods typically process 3D scans as a collection of independent 2D slices, an approach that fundamentally discards critical axial coherence and the 3D structural context. To address this limitation, we propose the autoencoder for enhanced self-supervised medical image learning(MAESIL), a novel self-supervised learning framework designed to capture 3D structural information efficiently. The core innovation is the 'superpatch', a 3D chunk-based input unit that balances 3D context preservation with computational efficiency. Our framework partitions the volume into superpatches and employs a 3D masked autoencoder strategy with a dual-masking strategy to learn comprehensive spatial representations. We validated our approach on three diverse large-scale public CT datasets. Our experimental results show that MAESIL demonstrates significant improvements over existing methods such as AE, VAE and VQ-VAE in key reconstruction metrics such as PSNR and SSIM. This establishes MAESIL as a robust and practical pre-training solution for 3D medical imaging tasks.", "published": "2026-04-01T05:56:39Z", "authors": ["Kyeonghun Kim", "Hyeonseok Jung", "Youngung Han", "Junsu Lim", "YeonJu Jean", "Seongbin Park", "Eunseob Choi", "Hyunsu Go", "SeoYoung Ju", "Seohyoung Park", "Gyeongmin Kim", "MinJu Kwon", "KyungSeok Yuh", "Soo Yong Kim", "Ken Ying-Kai Liao", "Nam-Joon Kim", "Hyuk-Jae Lee"], "abs_url": "https://arxiv.org/abs/2604.00514v1", "pdf_url": "https://arxiv.org/pdf/2604.00514v1", "x": 8.8815279006958, "y": 8.275765419006348, "similar_indices": [176, 97, 41, 109, 11]}, {"index": 80, "arxiv_id": "2604.00513v1", "title": "MOON3.0: Reasoning-aware Multimodal Representation Learning for E-commerce Product Understanding", "summary": "With the rapid growth of e-commerce, exploring general representations rather than task-specific ones has attracted increasing attention. Although recent multimodal large language models (MLLMs) have driven significant progress in product understanding, they are typically employed as feature extractors that implicitly encode product information into global embeddings, thereby limiting their ability to capture fine-grained attributes. Therefore, we argue that leveraging the reasoning capabilities of MLLMs to explicitly model fine-grained product attributes holds significant potential. Nevertheless, achieving this goal remains non-trivial due to several key challenges: (i) long-context reasoning tends to dilute the model's attention to salient information in the raw input; (ii) supervised fine-tuning (SFT) primarily encourages rigid imitation, limiting the exploration of effective reasoning strategies; and (iii) fine-grained details are progressively attenuated during forward propagation. To address these issues, we propose MOON3.0, the first reasoning-aware MLLM-based model for product representation learning. Our method (1) employs a multi-head modality fusion module to adaptively integrate raw signals; (2) incorporates a joint contrastive and reinforcement learning framework to autonomously explore more effective reasoning strategies; and (3) introduces a fine-grained residual enhancement module to progressively preserve local details throughout the network. Additionally, we release a large-scale multimodal e-commerce benchmark MBE3.0. Experimentally, our model demonstrates state-of-the-art zero-shot performance across various downstream tasks on both our benchmark and public datasets.", "published": "2026-04-01T05:55:25Z", "authors": ["Junxian Wu", "Chenghan Fu", "Zhanheng Nie", "Daoze Zhang", "Bowen Wan", "Wanxian Guan", "Chuan Yu", "Jian Xu", "Bo Zheng"], "abs_url": "https://arxiv.org/abs/2604.00513v1", "pdf_url": "https://arxiv.org/pdf/2604.00513v1", "x": 3.5071122646331787, "y": 7.117499828338623, "similar_indices": [136, 166, 31, 188, 41]}, {"index": 81, "arxiv_id": "2604.00510v1", "title": "Adaptive Parallel Monte Carlo Tree Search for Efficient Test-time Compute Scaling", "summary": "Monte Carlo Tree Search (MCTS) is an effective test-time compute scaling (TTCS) method for improving the reasoning performance of large language models, but its highly variable execution time leads to severe long-tail latency in practice. Existing optimizations such as positive early exit, reduce latency in favorable cases but are less effective when search continues without meaningful progress. We introduce {\\it negative early exit}, which prunes unproductive MCTS trajectories, and an {\\it adaptive boosting mechanism} that reallocates reclaimed computation to reduce resource contention among concurrent searches. Integrated into vLLM, these techniques substantially reduce p99 end-to-end latency while improving throughput and maintaining reasoning accuracy.", "published": "2026-04-01T05:52:38Z", "authors": ["Hongbeen Kim", "Juhyun Lee", "Sanghyeon Lee", "Kwanghoon Choi", "Jaehyuk Huh"], "abs_url": "https://arxiv.org/abs/2604.00510v1", "pdf_url": "https://arxiv.org/pdf/2604.00510v1", "x": -2.571204900741577, "y": 3.6330909729003906, "similar_indices": [27, 10, 84, 62, 63]}, {"index": 82, "arxiv_id": "2604.00505v1", "title": "Towards Initialization-dependent and Non-vacuous Generalization Bounds for Overparameterized Shallow Neural Networks", "summary": "Overparameterized neural networks often show a benign overfitting property in the sense of achieving excellent generalization behavior despite the number of parameters exceeding the number of training examples. A promising direction to explain benign overfitting is to relate generalization to the norm of distance from initialization, motivated by the empirical observations that this distance is often significantly smaller than the norm itself. However, the existing initialization-dependent complexity analyses cannot fully exploit the power of initialization since the associated bounds depend on the spectral norm of the initialization matrix, which can scale as a square-root function of the width and are therefore not effective for overparameterized models. In this paper, we develop the first \\emph{fully} initialization-dependent complexity bounds for shallow neural networks with general Lipschitz activation functions, which enjoys a logarithmic dependency on the width. Our bounds depend on the path-norm of the distance from initialization, which are derived by introducing a new peeling technique to handle the challenge along with the initialization-dependent constraint. We also develop a lower bound tight up to a constant factor. Finally, we conduct empirical comparisons and show that our generalization analysis implies non-vacuous bounds for overparameterized networks.", "published": "2026-04-01T05:42:40Z", "authors": ["Yunwen Lei", "Yufeng Xie"], "abs_url": "https://arxiv.org/abs/2604.00505v1", "pdf_url": "https://arxiv.org/pdf/2604.00505v1", "x": 0.8952106833457947, "y": 13.011565208435059, "similar_indices": [38, 34, 98, 2, 92]}, {"index": 83, "arxiv_id": "2604.00493v1", "title": "A Reasoning-Enabled Vision-Language Foundation Model for Chest X-ray Interpretation", "summary": "Chest X-rays (CXRs) are among the most frequently performed imaging examinations worldwide, yet rising imaging volumes increase radiologist workload and the risk of diagnostic errors. Although artificial intelligence (AI) systems have shown promise for CXR interpretation, most generate only final predictions, without making explicit how visual evidence is translated into radiographic findings and diagnostic predictions. We present CheXOne, a reasoning-enabled vision-language model for CXR interpretation. CheXOne jointly generates diagnostic predictions and explicit, clinically grounded reasoning traces that connect visual evidence, radiographic findings, and these predictions. The model is trained on 14.7 million instruction and reasoning samples curated from 30 public datasets spanning 36 CXR interpretation tasks, using a two-stage framework that combines instruction tuning with reinforcement learning to improve reasoning quality. We evaluate CheXOne in zero-shot settings across visual question answering, report generation, visual grounding and reasoning assessment, covering 17 evaluation settings. CheXOne outperforms existing medical and general-domain foundation models and achieves strong performance on independent public benchmarks. A clinical reader study demonstrates that CheXOne-drafted reports are comparable to or better than resident-written reports in 55% of cases, while effectively addressing clinical indications and enhancing both report writing and CXR interpretation efficiency. Further analyses involving radiologists reveal
