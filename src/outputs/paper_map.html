  <script>
    const papers = [{"index": 0, "arxiv_id": "2604.01221v1", "title": "HippoCamp: Benchmarking Contextual Agents on Personal Computers", "summary": "We present HippoCamp, a new benchmark designed to evaluate agents' capabilities on multimodal file management. Unlike existing agent benchmarks that focus on tasks like web interaction, tool use, or software automation in generic settings, HippoCamp evaluates agents in user-centric environments to model individual user profiles and search massive personal files for context-aware reasoning. Our benchmark instantiates device-scale file systems over real-world profiles spanning diverse modalities, comprising 42.4 GB of data across over 2K real-world files. Building upon the raw files, we construct 581 QA pairs to assess agents' capabilities in search, evidence perception, and multi-step reasoning. To facilitate fine-grained analysis, we provide 46.1K densely annotated structured trajectories for step-wise failure diagnosis. We evaluate a wide range of state-of-the-art multimodal large language models (MLLMs) and agentic methods on HippoCamp. Our comprehensive experiments reveal a significant performance gap: even the most advanced commercial models achieve only 48.3% accuracy in user profiling, struggling particularly with long-horizon retrieval and cross-modal reasoning within dense personal file systems. Furthermore, our step-wise failure diagnosis identifies multimodal perception and evidence grounding as the primary bottlenecks. Ultimately, HippoCamp exposes the critical limitations of current agents in realistic, user-centric environments and provides a robust foundation for developing next-generation personal AI assistants.", "published": "2026-04-01T17:58:33Z", "authors": ["Zhe Yang", "Shulin Tian", "Kairui Hu", "Shuai Liu", "Hoang-Nhat Nguyen", "Yichi Zhang", "Zujin Guo", "Mengying Yu", "Zinan Zhang", "Jingkang Yang", "Chen Change Loy", "Ziwei Liu"], "abs_url": "https://arxiv.org/abs/2604.01221v1", "pdf_url": "https://arxiv.org/pdf/2604.01221v1", "x": -1.1275315284729004, "y": -1.6849098205566406, "similar_indices": [163, 30, 69, 102, 133]}, {"index": 1, "arxiv_id": "2604.01216v1", "title": "LAtent Phase Inference from Short time sequences using SHallow REcurrent Decoders (LAPIS-SHRED)", "summary": "Reconstructing full spatio-temporal dynamics from sparse observations in both space and time remains a central challenge in complex systems, as measurements can be spatially incomplete and can be also limited to narrow temporal windows. Yet approximating the complete spatio-temporal trajectory is essential for mechanistic insight and understanding, model calibration, and operational decision-making. We introduce LAPIS-SHRED (LAtent Phase Inference from Short time sequence using SHallow REcurrent Decoders), a modular architecture that reconstructs and/or forecasts complete spatiotemporal dynamics from sparse sensor observations confined to short temporal windows. LAPIS-SHRED operates through a three-stage pipeline: (i) a SHRED model is pre-trained entirely on simulation data to map sensor time-histories into a structured latent space, (ii) a temporal sequence model, trained on simulation-derived latent trajectories, learns to propagate latent states forward or backward in time to span unobserved temporal regions from short observational time windows, and (iii) at deployment, only a short observation window of hyper-sparse sensor measurements from the true system is provided, from which the frozen SHRED model and the temporal model jointly reconstruct or forecast the complete spatiotemporal trajectory. The framework supports bidirectional inference, inherits data assimilation and multiscale reconstruction capabilities from its modular structure, and accommodates extreme observational constraints including single-frame terminal inputs. We evaluate LAPIS-SHRED on six experiments spanning complex spatio-temporal physics: turbulent flows, multiscale propulsion physics, volatile combustion transients, and satellite-derived environmental fields, highlighting a lightweight, modular architecture suited for operational settings where observation is constrained by physical or logistical limitations.", "published": "2026-04-01T17:55:10Z", "authors": ["Yuxuan Bao", "Xingyue Zhang", "J. Nathan Kutz"], "abs_url": "https://arxiv.org/abs/2604.01216v1", "pdf_url": "https://arxiv.org/pdf/2604.01216v1", "x": 4.008138656616211, "y": 10.62376880645752, "similar_indices": [166, 50, 2, 195, 94]}, {"index": 2, "arxiv_id": "2604.01215v1", "title": "The Recipe Matters More Than the Kitchen:Mathematical Foundations of the AI Weather Prediction Pipeline", "summary": "AI weather prediction has advanced rapidly, yet no unified mathematical framework explains what determines forecast skill. Existing theory addresses specific architectural choices rather than the learning pipeline as a whole, while operational evidence from 2023-2026 demonstrates that training methodology, loss function design, and data diversity matter at least as much as architecture selection. This paper makes two interleaved contributions. Theoretically, we construct a framework rooted in approximation theory on the sphere, dynamical systems theory, information theory, and statistical learning theory that treats the complete learning pipeline (architecture, loss function, training strategy, data distribution) rather than architecture alone. We establish a Learning Pipeline Error Decomposition showing that estimation error (loss- and data-dependent) dominates approximation error (architecture-dependent) at current scales. We develop a Loss Function Spectral Theory formalizing MSE-induced spectral blurring in spherical harmonic coordinates, and derive Out-of-Distribution Extrapolation Bounds proving that data-driven models systematically underestimate record-breaking extremes with bias growing linearly in record exceedance. Empirically, we validate these predictions via inference across ten architecturally diverse AI weather models using NVIDIA Earth2Studio with ERA5 initial conditions, evaluating six metrics across 30 initialization dates spanning all seasons. Results confirm universal spectral energy loss at high wavenumbers for MSE-trained models, rising Error Consensus Ratios showing that the majority of forecast error is shared across architectures, and linear negative bias during extreme events. A Holistic Model Assessment Score provides unified multi-dimensional evaluation, and a prescriptive framework enables mathematical evaluation of proposed pipelines before training.", "published": "2026-04-01T17:53:51Z", "authors": ["Piyush Garg", "Diana R. Gergel", "Andrew E. Shao", "Galen J. Yacalis"], "abs_url": "https://arxiv.org/abs/2604.01215v1", "pdf_url": "https://arxiv.org/pdf/2604.01215v1", "x": 2.678577184677124, "y": 11.69102954864502, "similar_indices": [96, 98, 1, 194, 34]}, {"index": 3, "arxiv_id": "2604.01212v1", "title": "$\\texttt{YC-Bench}$: Benchmarking AI Agents for Long-Term Planning and Consistent Execution", "summary": "As LLM agents tackle increasingly complex tasks, a critical question is whether they can maintain strategic coherence over long horizons: planning under uncertainty, learning from delayed feedback, and adapting when early mistakes compound. We introduce $\\texttt{YC-Bench}$, a benchmark that evaluates these capabilities by tasking an agent with running a simulated startup over a one-year horizon spanning hundreds of turns. The agent must manage employees, select task contracts, and maintain profitability in a partially observable environment where adversarial clients and growing payroll create compounding consequences for poor decisions. We evaluate 12 models, both proprietary and open source, across 3 seeds each. Only three models consistently surpass the starting capital of \\$200K, with Claude Opus 4.6 achieving the highest average final funds at \\$1.27 M, followed by GLM-5 at \\$1.21 M at 11$\\times$ lower inference cost. Scratchpad usage, the sole mechanism for persisting information across context truncation, is the strongest predictor of success, and adversarial client detection is the primary failure mode, accounting for $47\\%$ of bankruptcies. Our analysis reveals that frontier models still fail through distinct failure modes such as over-parallelization, demonstrating the capability gaps for long-horizon performance. $\\texttt{YC-Bench}$ is open-source, reproducible, and configurable.", "published": "2026-04-01T17:52:19Z", "authors": ["Muyu He", "Adit Jain", "Anand Kumar", "Vincent Tu", "Soumyadeep Bakshi", "Sachin Patro", "Nazneen Rajani"], "abs_url": "https://arxiv.org/abs/2604.01212v1", "pdf_url": "https://arxiv.org/pdf/2604.01212v1", "x": -3.626136302947998, "y": -1.9843953847885132, "similar_indices": [194, 108, 197, 30, 91]}, {"index": 4, "arxiv_id": "2604.01210v1", "title": "CliffSearch: Structured Agentic Co-Evolution over Theory and Code for Scientific Algorithm Discovery", "summary": "Scientific algorithm discovery is iterative: hypotheses are proposed, implemented, stress-tested, and revised. Current LLM-guided search systems accelerate proposal generation, but often under-represent scientific structure by optimizing code-only artifacts with weak correctness/originality gating. We present CliffSearch, an agentic evolutionary framework in which the core evolution operators (pair selection, crossover, mutation, and review) are implemented as LLM agents, and the loop is designed around three principles: (1) each node is a structured scientific artifact, instantiated in either theory+code or code_only mode, (2) reviewer judgments of correctness and originality are first-class selection gates alongside optimization of the benchmark metric of interest, and (3) mutation is split into exploration and correction pathways with distinct objectives. Exploration mutation imports ideas from adjacent scientific domains to increase novelty, while correction mutation performs targeted evidence-guided repair using reviewer signals over theory, code, benchmark results, and runtime errors. We illustrate the framework on three benchmark-grounded studies: transformer hyper-connection evolution, optimizer discovery on a fixed nanoGPT stack, and a smaller native-optimizer ablation. Across these settings, the same loop supports explicit metric direction, reproducible persistence, and reviewer-gated comparison of discoveries under controlled search conditions. The result is a discovery workflow that prioritizes scientific interpretability and correctness while optimizing task metrics under controlled novelty constraints, rather than maximizing candidate throughput alone. Full run artifacts, interactive visualizations, and exported best nodes for the reported studies are available at https://cliffsearch.ai .", "published": "2026-04-01T17:51:26Z", "authors": ["Youssef Mroueh", "Carlos Fonseca", "Brian Belgodere", "David Cox"], "abs_url": "https://arxiv.org/abs/2604.01210v1", "pdf_url": "https://arxiv.org/pdf/2604.01210v1", "x": -4.0841288566589355, "y": -3.053009033203125, "similar_indices": [197, 194, 30, 91, 73]}, {"index": 5, "arxiv_id": "2604.01204v1", "title": "Neural Harmonic Textures for High-Quality Primitive Based Neural Reconstruction", "summary": "Primitive-based methods such as 3D Gaussian Splatting have recently become the state-of-the-art for novel-view synthesis and related reconstruction tasks. Compared to neural fields, these representations are more flexible, adaptive, and scale better to large scenes. However, the limited expressivity of individual primitives makes modeling high-frequency detail challenging. We introduce Neural Harmonic Textures, a neural representation approach that anchors latent feature vectors on a virtual scaffold surrounding each primitive. These features are interpolated within the primitive at ray intersection points. Inspired by Fourier analysis, we apply periodic activations to the interpolated features, turning alpha blending into a weighted sum of harmonic components. The resulting signal is then decoded in a single deferred pass using a small neural network, significantly reducing computational cost. Neural Harmonic Textures yield state-of-the-art results in real-time novel view synthesis while bridging the gap between primitive- and neural-field-based reconstruction. Our method integrates seamlessly into existing primitive-based pipelines such as 3DGUT, Triangle Splatting, and 2DGS. We further demonstrate its generality with applications to 2D image fitting and semantic reconstruction.", "published": "2026-04-01T17:48:22Z", "authors": ["Jorge Condor", "Nicolas Moenne-Loccoz", "Merlin Nimier-David", "Piotr Didyk", "Zan Gojcic", "Qi Wu"], "abs_url": "https://arxiv.org/abs/2604.01204v1", "pdf_url": "https://arxiv.org/pdf/2604.01204v1", "x": 9.418954849243164, "y": 5.954411506652832, "similar_indices": [79, 109, 176, 77, 16]}, {"index": 6, "arxiv_id": "2604.01202v1", "title": "Therefore I am. I Think", "summary": "We consider the question: when a large language reasoning model makes a choice, did it think first and then decide to, or decide first and then think? In this paper, we present evidence that detectable, early-encoded decisions shape chain-of-thought in reasoning models. Specifically, we show that a simple linear probe successfully decodes tool-calling decisions from pre-generation activations with very high confidence, and in some cases, even before a single reasoning token is produced. Activation steering supports this causally: perturbing the decision direction leads to inflated deliberation, and flips behavior in many examples (between 7 - 79% depending on model and benchmark). We also show through behavioral analysis that, when steering changes the decision, the chain-of-thought process often rationalizes the flip rather than resisting it. Together, these results suggest that reasoning models can encode action choices before they begin to deliberate in text.", "published": "2026-04-01T17:46:23Z", "authors": ["Esakkivel Esakkiraja", "Sai Rajeswar", "Denis Akhiyarov", "Rajagopal Venkatesaramani"], "abs_url": "https://arxiv.org/abs/2604.01202v1", "pdf_url": "https://arxiv.org/pdf/2604.01202v1", "x": -4.055986404418945, "y": 2.7527830600738525, "similar_indices": [56, 10, 44, 147, 166]}, {"index": 7, "arxiv_id": "2604.01195v1", "title": "ORBIT: Scalable and Verifiable Data Generation for Search Agents on a Tight Budget", "summary": "Search agents, which integrate language models (LMs) with web search, are becoming crucial for answering complex user queries. Constructing training datasets for deep research tasks, involving multi-step retrieval and reasoning, remains challenging due to expensive human annotation, or cumbersome prerequisites. In this work, we introduce ORBIT, a training dataset with 20K reasoning-intensive queries with short verifiable answers, generated using a frugal framework without relying on paid API services. The modular framework relies on four stages: seed creation, question--answer pair generation, and two stages of verification: self and external. ORBIT spans 15 domains and each training pair requires 4--5 reasoning steps, with external search verification required from the complete web. We train Qwen3-4B as the base model on ORBIT using GRPO and evaluate it on Wikipedia question answering tasks. Extensive experiment results demonstrate that ORBIT-4B achieves strong performance among sub-4B LLMs as search agents, proving the utility of synthetic datasets. Our framework, code and datasets are open-sourced and available publicly.", "published": "2026-04-01T17:42:41Z", "authors": ["Nandan Thakur", "Zijian Chen", "Xueguang Ma", "Jimmy Lin"], "abs_url": "https://arxiv.org/abs/2604.01195v1", "pdf_url": "https://arxiv.org/pdf/2604.01195v1", "x": -1.3272888660430908, "y": 0.8043160438537598, "similar_indices": [169, 63, 163, 10, 71]}, {"index": 8, "arxiv_id": "2604.01179v1", "title": "A ROS 2 Wrapper for Florence-2: Multi-Mode Local Vision-Language Inference for Robotic Systems", "summary": "Foundation vision-language models are becoming increasingly relevant to robotics because they can provide richer semantic perception than narrow task-specific pipelines. However, their practical adoption in robot software stacks still depends on reproducible middleware integrations rather than on model quality alone. Florence-2 is especially attractive in this regard because it unifies captioning, optical character recognition, open-vocabulary detection, grounding and related vision-language tasks within a comparatively manageable model size. This article presents a ROS 2 wrapper for Florence-2 that exposes the model through three complementary interaction modes: continuous topic-driven processing, synchronous service calls and asynchronous actions. The wrapper is designed for local execution and supports both native installation and Docker container deployment. It also combines generic JSON outputs with standard ROS 2 message bindings for detection-oriented tasks. A functional validation is reported together with a throughput study on several GPUs, showing that local deployment is feasible with consumer grade hardware. The repository is publicly available here: https://github.com/JEDominguezVidal/florence2_ros2_wrapper", "published": "2026-04-01T17:29:59Z", "authors": ["J. E. Domínguez-Vidal"], "abs_url": "https://arxiv.org/abs/2604.01179v1", "pdf_url": "https://arxiv.org/pdf/2604.01179v1", "x": -11.69713020324707, "y": -3.0302677154541016, "similar_indices": [166, 77, 88, 115, 143]}, {"index": 9, "arxiv_id": "2604.01178v1", "title": "Screening Is Enough", "summary": "A core limitation of standard softmax attention is that it does not define a notion of absolute query--key relevance: attention weights are obtained by redistributing a fixed unit mass across all keys according to their relative scores. As a result, relevance is defined only relative to competing keys, and irrelevant keys cannot be explicitly rejected. We introduce Multiscreen, a language-model architecture built around a mechanism we call screening, which enables absolute query--key relevance. Instead of redistributing attention across all keys, screening evaluates each key against an explicit threshold, discarding irrelevant keys and aggregating the remaining keys, thereby removing global competition among keys. Across experiments, Multiscreen achieves comparable validation loss with approximately 40% fewer parameters than a Transformer baseline, enables stable optimization at substantially larger learning rates, maintains strong performance in long-context perplexity, shows little to no degradation in retrieval performance even far beyond the training context length, and reduces inference latency by up to 3.2$\\times$ at 100K context length.", "published": "2026-04-01T17:29:08Z", "authors": ["Ken M. Nakanishi"], "abs_url": "https://arxiv.org/abs/2604.01178v1", "pdf_url": "https://arxiv.org/pdf/2604.01178v1", "x": 2.3116707801818848, "y": 4.980146884918213, "similar_indices": [124, 57, 140, 31, 122]}, {"index": 10, "arxiv_id": "2604.01170v1", "title": "Online Reasoning Calibration: Test-Time Training Enables Generalizable Conformal LLM Reasoning", "summary": "While test-time scaling has enabled large language models to solve highly difficult tasks, state-of-the-art results come at exorbitant compute costs. These inefficiencies can be attributed to the miscalibration of post-trained language models, and the lack of calibration in popular sampling techniques. Here, we present Online Reasoning Calibration (ORCA), a framework for calibrating the sampling process that draws upon conformal prediction and test-time training. Specifically, we introduce a meta-learning procedure that updates the calibration module for each input. This allows us to provide valid confidence estimates under distributional shift, e.g. in thought patterns that occur across different stages of reasoning, or in prompt distributions between model development and deployment. ORCA not only provides theoretical guarantees on conformal risks, but also empirically shows higher efficiency and generalization across different reasoning tasks. At risk level $δ=0.1$, ORCA improves Qwen2.5-32B efficiency on in-distribution tasks with savings up to 47.5% with supervised labels and 40.7% with self-consistency labels. Under zero-shot out-of-domain settings, it improves MATH-500 savings from 24.8% of the static calibration baseline to 67.0% while maintaining a low empirical error rate, and the same trend holds across model families and downstream benchmarks. Our code is publicly available at https://github.com/wzekai99/ORCA.", "published": "2026-04-01T17:21:50Z", "authors": ["Cai Zhou", "Zekai Wang", "Menghua Wu", "Qianyu Julie Zhu", "Flora C. Shi", "Chenyu Wang", "Ashia Wilson", "Tommi Jaakkola", "Stephen Bates"], "abs_url": "https://arxiv.org/abs/2604.01170v1", "pdf_url": "https://arxiv.org/pdf/2604.01170v1", "x": -2.8153207302093506, "y": 2.5345723628997803, "similar_indices": [7, 6, 48, 27, 62]}, {"index": 11, "arxiv_id": "2604.01167v1", "title": "AdaLoRA-QAT: Adaptive Low-Rank and Quantization-Aware Segmentation", "summary": "Chest X-ray (CXR) segmentation is an important step in computer-aided diagnosis, yet deploying large foundation models in clinical settings remains challenging due to computational constraints. We propose AdaLoRA-QAT, a two-stage fine-tuning framework that combines adaptive low-rank encoder adaptation with full quantization-aware training. Adaptive rank allocation improves parameter efficiency, while selective mixed-precision INT8 quantization preserves structural fidelity crucial for clinical reliability. Evaluated across large-scale CXR datasets, AdaLoRA-QAT achieves 95.6% Dice, matching full-precision SAM decoder fine-tuning while reducing trainable parameters by 16.6\\times and yielding 2.24\\times model compression. A Wilcoxon signed-rank test confirms that quantization does not significantly degrade segmentation accuracy. These results demonstrate that AdaLoRA-QAT effectively balances accuracy, efficiency, and structural trust-worthiness, enabling compact and deployable foundation models for medical image segmentation. Code and pretrained models are available at: https://prantik-pdeb.github.io/adaloraqat.github.io/", "published": "2026-04-01T17:18:46Z", "authors": ["Prantik Deb", "Srimanth Dhondy", "N. Ramakrishna", "Anu Kapoor", "Raju S. Bapi", "Tapabrata Chakraborti"], "abs_url": "https://arxiv.org/abs/2604.01167v1", "pdf_url": "https://arxiv.org/pdf/2604.01167v1", "x": 7.804706573486328, "y": 8.982701301574707, "similar_indices": [79, 97, 75, 83, 157]}, {"index": 12, "arxiv_id": "2604.01152v1", "title": "Brainstacks: Cross-Domain Cognitive Capabilities via Frozen MoE-LoRA Stacks for Continual LLM Learning", "summary": "We present Brainstacks, a modular architecture for continual multi-domain fine-tuning of large language models that packages domain expertise as frozen adapter stacks composing additively on a shared frozen base at inference. Five interlocking components: (1) MoE-LoRA with Shazeer-style noisy top-2 routing across all seven transformer projections under QLoRA 4-bit quantization with rsLoRA scaling; (2) an inner loop performing residual boosting by freezing trained stacks and adding new ones; (3) an outer loop training sequential domain-specific stacks with curriculum-ordered dependencies; (4) null-space projection via randomized SVD constraining new stacks to subspaces orthogonal to prior directions, achieving zero forgetting in isolation; (5) an outcome-based sigmoid meta-router trained on empirically discovered domain-combination targets that selectively weights stacks, enabling cross-domain composition. Two boundary experiments: (6) PSN pretraining on a randomly initialized model; (7) per-domain RL (DPO/GRPO) validating compatibility with post-SFT alignment. Validated on TinyLlama-1.1B (4 domains, 9 stacks) and Gemma 3 12B IT (5 domains, 10 stacks), MoE-LoRA achieves 2.5x faster convergence than parameter-matched single LoRA, residual boosting breaks through the single-stack ceiling, and the routed system recovers generation quality destroyed by ungated stack accumulation. The central finding: the outcome-based router discovers that domain stacks encode transferable cognitive primitives (instruction-following clarity, numerical reasoning, procedural logic, chain-of-thought structure) rather than domain-specific knowledge, with medical prompts routing to chat+math stacks in 97% of cases despite zero medical data in those stacks.", "published": "2026-04-01T17:08:25Z", "authors": ["Mohammad R. Abu Ayyash"], "abs_url": "https://arxiv.org/abs/2604.01152v1", "pdf_url": "https://arxiv.org/pdf/2604.01152v1", "x": -1.7123072147369385, "y": 5.215582370758057, "similar_indices": [59, 92, 30, 62, 20]}, {"index": 13, "arxiv_id": "2604.01151v1", "title": "Detecting Multi-Agent Collusion Through Multi-Agent Interpretability", "summary": "As LLM agents are increasingly deployed in multi-agent systems, they introduce risks of covert coordination that may evade standard forms of human oversight. While linear probes on model activations have shown promise for detecting deception in single-agent settings, collusion is inherently a multi-agent phenomenon, and the use of internal representations for detecting collusion between agents remains unexplored. We introduce NARCBench, a benchmark for evaluating collusion detection under environment distribution shift, and propose five probing techniques that aggregate per-agent deception scores to classify scenarios at the group level. Our probes achieve 1.00 AUROC in-distribution and 0.60--0.86 AUROC when transferred zero-shot to structurally different multi-agent scenarios and a steganographic blackjack card-counting task. We find that no single probing technique dominates across all collusion types, suggesting that different forms of collusion manifest differently in activation space. We also find preliminary evidence that this signal is localised at the token level, with the colluding agent's activations spiking specifically when processing the encoded parts of their partner's message. This work takes a step toward multi-agent interpretability: extending white-box inspection from single models to multi-agent contexts, where detection requires aggregating signals across agents. These results suggest that model internals provide a complementary signal to text-level monitoring for detecting multi-agent collusion, particularly for organisations with access to model activations. Code and data are available at https://github.com/aaronrose227/narcbench.", "published": "2026-04-01T17:08:05Z", "authors": ["Aaron Rose", "Carissa Cullen", "Brandon Gary Kaplowitz", "Christian Schroeder de Witt"], "abs_url": "https://arxiv.org/abs/2604.01151v1", "pdf_url": "https://arxiv.org/pdf/2604.01151v1", "x": 3.140584945678711, "y": -4.972300052642822, "similar_indices": [177, 64, 104, 197, 18]}, {"index": 14, "arxiv_id": "2604.01141v1", "title": "Looking into a Pixel by Nonlinear Unmixing -- A Generative Approach", "summary": "Due to the large footprint of pixels in remote sensing imagery, hyperspectral unmixing (HU) has become an important and necessary procedure in hyperspectral image analysis. Traditional HU methods rely on a prior spectral mixing model, especially for nonlinear mixtures, which has largely limited the performance and generalization capacity of the unmixing approach. In this paper, we address the challenging problem of hyperspectral nonlinear unmixing (HNU) without explicit knowledge of the mixing model. Inspired by the principle of generative models, where images of the same distribution can be generated as that of the training images without knowing the exact probability distribution function of the image, we develop an invertible mixing-unmixing process via a bi-directional GAN framework, constrained by both the cycle consistency and the linkage between linear and nonlinear mixtures. The combination of cycle consistency and linear linkage provides powerful constraints without requiring an explicit mixing model. We refer to the proposed approach as the linearly-constrained CycleGAN unmixing net, or LCGU net. Experimental results indicate that the proposed LCGU net exhibits stable and competitive performance across different datasets compared with other state-of-the-art model-based HNU methods.", "published": "2026-04-01T16:58:05Z", "authors": ["Maofeng Tang", "Hairong Qi"], "abs_url": "https://arxiv.org/abs/2604.01141v1", "pdf_url": "https://arxiv.org/pdf/2604.01141v1", "x": 10.282698631286621, "y": 6.9714813232421875, "similar_indices": [176, 109, 5, 199, 188]}, {"index": 15, "arxiv_id": "2604.01128v1", "title": "Paper Reconstruction Evaluation: Evaluating Presentation and Hallucination in AI-written Papers", "summary": "This paper introduces the first systematic evaluation framework for quantifying the quality and risks of papers written by modern coding agents. While AI-driven paper writing has become a growing concern, rigorous evaluation of the quality and potential risks of AI-written papers remains limited, and a unified understanding of their reliability is still lacking. We introduce Paper Reconstruction Evaluation (PaperRecon), an evaluation framework in which an overview (overview.md) is created from an existing paper, after which an agent generates a full paper based on the overview and minimal additional resources, and the result is subsequently compared against the original paper. PaperRecon disentangles the evaluation of the AI-written papers into two orthogonal dimensions, Presentation and Hallucination, where Presentation is evaluated using a rubric and Hallucination is assessed via agentic evaluation grounded in the original paper source. For evaluation, we introduce PaperWrite-Bench, a benchmark of 51 papers from top-tier venues across diverse domains published after 2025. Our experiments reveal a clear trade-off: while both ClaudeCode and Codex improve with model advances, ClaudeCode achieves higher presentation quality at the cost of more than 10 hallucinations per paper on average, whereas Codex produces fewer hallucinations but lower presentation quality. This work takes a first step toward establishing evaluation frameworks for AI-driven paper writing and improving the understanding of its risks within the research community.", "published": "2026-04-01T16:48:04Z", "authors": ["Atsuyuki Miyai", "Mashiro Toyooka", "Zaiying Zhao", "Kenta Watanabe", "Toshihiko Yamasaki", "Kiyoharu Aizawa"], "abs_url": "https://arxiv.org/abs/2604.01128v1", "pdf_url": "https://arxiv.org/pdf/2604.01128v1", "x": -4.9405364990234375, "y": -8.4169921875, "similar_indices": [163, 42, 119, 181, 0]}, {"index": 16, "arxiv_id": "2604.01118v1", "title": "Lightweight Prompt-Guided CLIP Adaptation for Monocular Depth Estimation", "summary": "Leveraging the rich semantic features of vision-language models (VLMs) like CLIP for monocular depth estimation tasks is a promising direction, yet often requires extensive fine-tuning or lacks geometric precision. We present a parameter-efficient framework, named MoA-DepthCLIP, that adapts pretrained CLIP representations for monocular depth estimation with minimal supervision. Our method integrates a lightweight Mixture-of-Adapters (MoA) module into the pretrained Vision Transformer (ViT-B/32) backbone combined with selective fine-tuning of the final layers. This design enables spatially-aware adaptation, guided by a global semantic context vector and a hybrid prediction architecture that synergizes depth bin classification with direct regression. To enhance structural accuracy, we employ a composite loss function that enforces geometric constraints. On the NYU Depth V2 benchmark, MoA-DepthCLIP achieves competitive results, significantly outperforming the DepthCLIP baseline by improving the $δ_1$ accuracy from 0.390 to 0.745 and reducing the RMSE from 1.176 to 0.520. These results are achieved while requiring substantially few trainable parameters, demonstrating that lightweight, prompt-guided MoA is a highly effective strategy for transferring VLM knowledge to fine-grained monocular depth estimation tasks.", "published": "2026-04-01T16:41:04Z", "authors": ["Reyhaneh Ahani Manghotay", "Jie Liang"], "abs_url": "https://arxiv.org/abs/2604.01118v1", "pdf_url": "https://arxiv.org/pdf/2604.01118v1", "x": 6.131923198699951, "y": 4.459803581237793, "similar_indices": [136, 77, 50, 166, 45]}, {"index": 17, "arxiv_id": "2604.01114v1", "title": "Trust and Reliance on AI in Education: AI Literacy and Need for Cognition as Moderators", "summary": "As generative AI systems are integrated into educational settings, students often encounter AI-generated output while working through learning tasks, either by requesting help or through integrated tools. Trust in AI can influence how students interpret and use that output, including whether they evaluate it critically or exhibit overreliance. We investigate how students' trust relates to their appropriate reliance on an AI assistant during programming problem-solving tasks, and whether this relationship differs by learner characteristics. With 432 undergraduate participants, students' completed Python output-prediction problems while receiving recommendations and explanations from an AI chatbot, including accurate and intentionally misleading suggestions. We operationalize reliance behaviorally as the extent to which students' responses reflected appropriate use of the AI assistant's suggestions, accepting them when they were correct and rejecting them when they were incorrect. Pre- and post-task surveys assessed trust in the assistant, AI literacy, need for cognition, programming self-efficacy, and programming literacy. Results showed a non-linear relationship in which higher trust was associated with lower appropriate reliance, suggesting weaker discrimination between correct and incorrect recommendations. This relationship was significantly moderated by students' AI literacy and need for cognition. These findings highlight the need for future work on instructional and system supports that encourage more reflective evaluation of AI assistance during problem-solving.", "published": "2026-04-01T16:38:47Z", "authors": ["Griffin Pitts", "Neha Rani", "Weedguet Mildort"], "abs_url": "https://arxiv.org/abs/2604.01114v1", "pdf_url": "https://arxiv.org/pdf/2604.01114v1", "x": -9.546473503112793, "y": -8.55914306640625, "similar_indices": [154, 126, 186, 135, 183]}, {"index": 18, "arxiv_id": "2604.01108v1", "title": "Adversarial Moral Stress Testing of Large Language Models", "summary": "Evaluating the ethical robustness of large language models (LLMs) deployed in software systems remains challenging, particularly under sustained adversarial user interaction. Existing safety benchmarks typically rely on single-round evaluations and aggregate metrics, such as toxicity scores and refusal rates, which offer limited visibility into behavioral instability that may arise during realistic multi-turn interactions. As a result, rare but high-impact ethical failures and progressive degradation effects may remain undetected prior to deployment. This paper introduces Adversarial Moral Stress Testing (AMST), a stress-based evaluation framework for assessing ethical robustness under adversarial multi-round interactions. AMST applies structured stress transformations to prompts and evaluates model behavior through distribution-aware robustness metrics that capture variance, tail risk, and temporal behavioral drift across interaction rounds. We evaluate AMST on several state-of-the-art LLMs, including LLaMA-3-8B, GPT-4o, and DeepSeek-v3, using a large set of adversarial scenarios generated under controlled stress conditions. The results demonstrate substantial differences in robustness profiles across models and expose degradation patterns that are not observable under conventional single-round evaluation protocols. In particular, robustness has been shown to depend on distributional stability and tail behavior rather than on average performance alone. Additionally, AMST provides a scalable and model-agnostic stress-testing methodology that enables robustness-aware evaluation and monitoring of LLM-enabled software systems operating in adversarial environments.", "published": "2026-04-01T16:34:20Z", "authors": ["Saeid Jamshidi", "Foutse Khomh", "Arghavan Moradi Dakhel", "Amin Nikanjam", "Mohammad Hamdaqa", "Kawser Wazed Nafi"], "abs_url": "https://arxiv.org/abs/2604.01108v1", "pdf_url": "https://arxiv.org/pdf/2604.01108v1", "x": 4.316507816314697, "y": -4.230186462402344, "similar_indices": [107, 104, 108, 99, 144]}, {"index": 19, "arxiv_id": "2604.01098v1", "title": "Approximating Pareto Frontiers in Stochastic Multi-Objective Optimization via Hashing and Randomization", "summary": "Stochastic Multi-Objective Optimization (SMOO) is critical for decision-making trading off multiple potentially conflicting objectives in uncertain environments. SMOO aims at identifying the Pareto frontier, which contains all mutually non-dominating decisions. The problem is highly intractable due to the embedded probabilistic inference, such as computing the marginal, posterior probabilities, or expectations. Existing methods, such as scalarization, sample average approximation, and evolutionary algorithms, either offer arbitrarily loose approximations or may incur prohibitive computational costs. We propose XOR-SMOO, a novel algorithm that with probability $1-δ$, obtains $γ$-approximate Pareto frontiers ($γ>1$) for SMOO by querying an SAT oracle poly-log times in $γ$ and $δ$. A $γ$-approximate Pareto frontier is only below the true frontier by a fixed, multiplicative factor $γ$. Thus, XOR-SMOO solves highly intractable SMOO problems (\\#P-hard) with only queries to SAT oracles while obtaining tight, constant factor approximation guarantees. Experiments on real-world road network strengthening and supply chain design problems demonstrate that XOR-SMOO outperforms several baselines in identifying Pareto frontiers that have higher objective values, better coverage of the optimal solutions, and the solutions found are more evenly distributed. Overall, XOR-SMOO significantly enhanced the practicality and reliability of SMOO solvers.", "published": "2026-04-01T16:24:13Z", "authors": ["Jinzhao Li", "Nan Jiang", "Yexiang Xue"], "abs_url": "https://arxiv.org/abs/2604.01098v1", "pdf_url": "https://arxiv.org/pdf/2604.01098v1", "x": -10.090666770935059, "y": 2.4282472133636475, "similar_indices": [120, 68, 164, 52, 34]}, {"index": 20, "arxiv_id": "2604.01094v1", "title": "Temporal Dependencies in In-Context Learning: The Role of Induction Heads", "summary": "Large language models (LLMs) exhibit strong in-context learning capabilities, but how they track and retrieve information from context remains underexplored. Drawing on the free recall paradigm in cognitive science (where participants recall list items in any order), we show that several open-source LLMs consistently display a serial-recall-like pattern, assigning peak probability to tokens that immediately follow a repeated token in the input sequence. Through systematic ablation experiments, we show that induction heads, specialized attention heads that attend to the token following a previous occurrence of the current token, play an important role in this phenomenon. Removing heads with a high induction score substantially reduces the +1 lag bias, whereas ablating random heads does not reproduce the same reduction. We also show that removing heads with high induction scores impairs the performance of models prompted to do serial recall using few-shot learning to a larger extent than removing random heads. Our findings highlight a mechanistically specific connection between induction heads and temporal context processing in transformers, suggesting that these heads are especially important for ordered retrieval and serial-recall-like behavior during in-context learning.", "published": "2026-04-01T16:21:38Z", "authors": ["Anooshka Bajaj", "Deven Mahesh Mistry", "Sahaj Singh Maini", "Yash Aggarwal", "Billy Dickson", "Zoran Tiganj"], "abs_url": "https://arxiv.org/abs/2604.01094v1", "pdf_url": "https://arxiv.org/pdf/2604.01094v1", "x": 1.2552835941314697, "y": 4.203005790710449, "similar_indices": [88, 122, 48, 9, 6]}, {"index": 21, "arxiv_id": "2604.01083v1", "title": "TRACE: Training-Free Partial Audio Deepfake Detection via Embedding Trajectory Analysis of Speech Foundation Models", "summary": "Partial audio deepfakes, where synthesized segments are spliced into genuine recordings, are particularly deceptive because most of the audio remains authentic. Existing detectors are supervised: they require frame-level annotations, overfit to specific synthesis pipelines, and must be retrained as new generative models emerge. We argue that this supervision is unnecessary. We hypothesize that speech foundation models implicitly encode a forensic signal: genuine speech forms smooth, slowly varying embedding trajectories, while splice boundaries introduce abrupt disruptions in frame-level transitions. Building on this, we propose TRACE (Training-free Representation-based Audio Countermeasure via Embedding dynamics), a training-free framework that detects partial audio deepfakes by analyzing the first-order dynamics of frozen speech foundation model representations without any training, labeled data, or architectural modification. We evaluate TRACE on four benchmarks that span two languages using six speech foundation models. In PartialSpoof, TRACE achieves 8.08% EER, competitive with fine-tuned supervised baselines. In LlamaPartialSpoof, the most challenging benchmark featuring LLM-driven commercial synthesis, TRACE surpasses a supervised baseline outright (24.12% vs. 24.49% EER) without any target-domain data. These results show that temporal dynamics in speech foundation models provide an effective, generalize signal for training-free audio forensics.", "published": "2026-04-01T16:12:31Z", "authors": ["Awais Khan", "Muhammad Umar Farooq", "Kutub Uddin", "Khalid Malik"], "abs_url": "https://arxiv.org/abs/2604.01083v1", "pdf_url": "https://arxiv.org/pdf/2604.01083v1", "x": 2.0260183811187744, "y": 2.0301642417907715, "similar_indices": [107, 27, 31, 76, 93]}, {"index": 22, "arxiv_id": "2604.01052v1", "title": "VibeGuard: A Security Gate Framework for AI-Generated Code", "summary": "\"Vibe coding,\" in which developers delegate code generation to AI assistants and accept the output with little manual review, has gained rapid adoption in production settings. On March 31, 2026, Anthropic's Claude Code CLI shipped a 59.8 MB source map file in its npm package, exposing roughly 512,000 lines of proprietary TypeScript. The tool had itself been largely vibe-coded, and the leak traced to a misconfigured packaging rule rather than a logic bug. Existing static-analysis and secret-scanning tools did not cover this failure mode, pointing to a gap between the vulnerabilities AI tends to introduce and the vulnerabilities current tooling is built to find. We present VibeGuard, a pre-publish security gate that targets five such blind spots: artifact hygiene, packaging-configuration drift, source-map exposure, hardcoded secrets, and supply-chain risk. In controlled experiments on eight synthetic projects (seven vulnerable, one clean control), VibeGuard achieved 100% recall, 89.47% precision (F1 = 94.44%), and correct pass/fail gate decisions on all eight projects across three policy levels. We discuss how these results inform a defense-in-depth workflow for teams that rely on AI code generation.", "published": "2026-04-01T15:57:01Z", "authors": ["Ying Xie"], "abs_url": "https://arxiv.org/abs/2604.01052v1", "pdf_url": "https://arxiv.org/pdf/2604.01052v1", "x": 4.933460712432861, "y": -7.457590103149414, "similar_indices": [54, 99, 64, 24, 100]}, {"index": 23, "arxiv_id": "2604.01049v1", "title": "Adversarial Attacks in AI-Driven RAN Slicing: SLA Violations and Recovery", "summary": "Next-generation (NextG) cellular networks are designed to support emerging applications with diverse data rate and latency requirements, such as immersive multimedia services and large-scale Internet of Things deployments. A key enabling mechanism is radio access network (RAN) slicing, which dynamically partitions radio resources into virtual resource blocks to efficiently serve heterogeneous traffic classes, including enhanced mobile broadband (eMBB), massive machine-type communications (mMTC), and ultra-reliable low-latency communications (URLLC). In this paper, we study the impact of adversarial attacks on AI-driven RAN slicing decisions, where a budget-constrained adversary selectively jams slice transmissions to bias deep reinforcement learning (DRL)-based resource allocation, and quantify the resulting service level agreement (SLA) violations and post-attack recovery behavior. Our results indicate that budget-constrained adversarial jamming can induce severe and slice-dependent steady-state SLA violations. Moreover, the DRL agent's reward converges toward the clean baseline only after a non-negligible recovery period.", "published": "2026-04-01T15:54:06Z", "authors": ["Deemah H. Tashman", "Soumaya Cherkaoui"], "abs_url": "https://arxiv.org/abs/2604.01049v1", "pdf_url": "https://arxiv.org/pdf/2604.01049v1", "x": 5.968775272369385, "y": -4.658543586730957, "similar_indices": [104, 18, 161, 3, 56]}, {"index": 24, "arxiv_id": "2604.01039v1", "title": "Automated Framework to Evaluate and Harden LLM System Instructions against Encoding Attacks", "summary": "System Instructions in Large Language Models (LLMs) are commonly used to enforce safety policies, define agent behavior, and protect sensitive operational context in agentic AI applications. These instructions may contain sensitive information such as API credentials, internal policies, and privileged workflow definitions, making system instruction leakage a critical security risk highlighted in the OWASP Top 10 for LLM Applications. Without incurring the overhead costs of reasoning models, many LLM applications rely on refusal-based instructions that block direct requests for system instructions, implicitly assuming that prohibited information can only be extracted through explicit queries. We introduce an automated evaluation framework that tests whether system instructions remain confidential when extraction requests are re-framed as encoding or structured output tasks. Across four common models and 46 verified system instructions, we observe high attack success rates (> 0.7) for structured serialization where models refuse direct extraction requests but disclose protected content in the requested serialization formats. We further demonstrate a mitigation strategy based on one-shot instruction reshaping using a Chain-of-Thought reasoning model, indicating that even subtle changes in wording and structure of system instructions can significantly reduce attack success rate without requiring model retraining.", "published": "2026-04-01T15:45:56Z", "authors": ["Anubhab Sahu", "Diptisha Samanta", "Reza Soosahabi"], "abs_url": "https://arxiv.org/abs/2604.01039v1", "pdf_url": "https://arxiv.org/pdf/2604.01039v1", "x": 3.3016507625579834, "y": -6.794439315795898, "similar_indices": [144, 84, 64, 112, 54]}, {"index": 25, "arxiv_id": "2604.01036v1", "title": "Aligning Recommendations with User Popularity Preferences", "summary": "Popularity bias is a pervasive problem in recommender systems, where recommendations disproportionately favor popular items. This not only results in \"rich-get-richer\" dynamics and a homogenization of visible content, but can also lead to misalignment of recommendations with individual users' preferences for popular or niche content. This work studies popularity bias through the lens of user-recommender alignment. To this end, we introduce Popularity Quantile Calibration, a measurement framework that quantifies misalignment between a user's historical popularity preference and the popularity of their recommendations. Building on this notion of popularity alignment, we propose SPREE, an inference-time mitigation method for sequential recommenders based on activation steering. SPREE identifies a popularity direction in representation space and adaptively steers model activations based on an estimate of each user's personal popularity bias, allowing both the direction and magnitude of steering to vary across users. Unlike global debiasing approaches, SPREE explicitly targets alignment rather than uniformly reducing popularity. Experiments across multiple datasets show that SPREE consistently improves user-level popularity alignment while preserving recommendation quality.", "published": "2026-04-01T15:45:24Z", "authors": ["Mona Schirmer", "Anton Thielmann", "Pola Schwöbel", "Thomas Martynec", "Giuseppe Di Benedetto", "Ben London", "Yannik Stein"], "abs_url": "https://arxiv.org/abs/2604.01036v1", "pdf_url": "https://arxiv.org/pdf/2604.01036v1", "x": 0.06471742689609528, "y": 6.623171329498291, "similar_indices": [70, 76, 189, 165, 93]}, {"index": 26, "arxiv_id": "2604.01029v1", "title": "Revision or Re-Solving? Decomposing Second-Pass Gains in Multi-LLM Pipelines", "summary": "Multi-LLM revision pipelines, in which a second model reviews and improves a draft produced by a first, are widely assumed to derive their gains from genuine error correction. We question this assumption with a controlled decomposition experiment that uses four matched conditions to separate second-pass gains into three additive components: re-solving, scaffold, and content. We evaluate this design across two model pairs on three benchmarks spanning knowledge-intensive MCQ and competitive programming. Our results show that the gains of multi-LLM revision are not monolithic, but depend on task structure, draft quality, and the type of draft information. On MCQ tasks, where the answer space is constrained and drafts provide little structural guidance, most gains are consistent with stronger-model re-solving, and directly routing queries to the stronger model can be more effective than revising a weak draft. On code generation tasks, however, two-stage prompting remains useful because even semantically null drafts can provide substantial structural scaffolding, while weak draft content can be harmful. Finally, role-reversed experiments show that strong drafts clearly benefit weak reviewers. Ultimately, our findings demonstrate that the utility of multi-LLM revision is dynamically bottlenecked by task structure and draft quality, necessitating more targeted pipeline designs rather than blanket revision strategies.", "published": "2026-04-01T15:39:40Z", "authors": ["Jingjie Ning", "Xueqi Li", "Chengyu Yu"], "abs_url": "https://arxiv.org/abs/2604.01029v1", "pdf_url": "https://arxiv.org/pdf/2604.01029v1", "x": -6.288451671600342, "y": -6.499680519104004, "similar_indices": [69, 119, 163, 99, 112]}, {"index": 27, "arxiv_id": "2604.01025v1", "title": "Fast and Accurate Probing of In-Training LLMs' Downstream Performances", "summary": "The paradigm of scaling Large Language Models (LLMs) in both parameter size and test time has pushed the boundaries of AI capabilities, but at the cost of making the traditional generative evaluation paradigm prohibitively expensive, therefore making the latency of LLM's in-training downstream performance evaluation unbearable. However, simple metrics like training loss (perplexity) are not always correlated with downstream performance, as sometimes their trends diverge from the actual task outcomes. This dilemma calls for a method that is computationally efficient and sufficiently accurate in measuring model capabilities. To address this challenge, we introduce a new in-training evaluation paradigm that uses a lightweight probe for monitoring downstream performance. The probes take the internal representations of LLM checkpoints (during training) as input and directly predict the checkpoint's performance on downstream tasks measured by success probability (i.e., pass@1). We design several probe architectures, validating their effectiveness using the OLMo3-7B's checkpoints across a diverse set of downstream tasks. The probes can accurately predict a checkpoint's performance (with avg. AUROC$>$0.75), have decent generalizability across checkpoints (earlier predicts later), and reduce the computation latency from $\\sim$1 hr (using conventional generative evaluation method) to $\\sim$3 min. In sum, this work presents a practical and scalable in-training downstream evaluation paradigm, enabling a more agile, informed, and efficient LLM development process.", "published": "2026-04-01T15:32:56Z", "authors": ["Zhichen Liu", "Tianle Lun", "Zhibin Wen", "Hao An", "Yulin Ou", "Jianhui Xu", "Hao Zhang", "Wenyi Fang", "Yang Zheng", "Yang Xu"], "abs_url": "https://arxiv.org/abs/2604.01025v1", "pdf_url": "https://arxiv.org/pdf/2604.01025v1", "x": -1.0340843200683594, "y": 3.067241668701172, "similar_indices": [63, 0, 48, 108, 123]}, {"index": 28, "arxiv_id": "2604.01021v1", "title": "Transfer learning for nonparametric Bayesian networks", "summary": "This paper introduces two transfer learning methodologies for estimating nonparametric Bayesian networks under scarce data. We propose two algorithms, a constraint-based structure learning method, called PC-stable-transfer learning (PCS-TL), and a score-based method, called hill climbing transfer learning (HC-TL). We also define particular metrics to tackle the negative transfer problem in each of them, a situation in which transfer learning has a negative impact on the model's performance. Then, for the parameters, we propose a log-linear pooling approach. For the evaluation, we learn kernel density estimation Bayesian networks, a type of nonparametric Bayesian network, and compare their transfer learning performance with the models alone. To do so, we sample data from small, medium and large-sized synthetic networks and datasets from the UCI Machine Learning repository. Then, we add noise and modifications to these datasets to test their ability to avoid negative transfer. To conclude, we perform a Friedman test with a Bergmann-Hommel post-hoc analysis to show statistical proof of the enhanced experimental behavior of our methods. Thus, PCS-TL and HC-TL demonstrate to be reliable algorithms for improving the learning performance of a nonparametric Bayesian network with scarce data, which in real industrial environments implies a reduction in the required time to deploy the network.", "published": "2026-04-01T15:25:46Z", "authors": ["Rafael Sojo", "Pedro Larrañaga", "Concha Bielza"], "abs_url": "https://arxiv.org/abs/2604.01021v1", "pdf_url": "https://arxiv.org/pdf/2604.01021v1", "x": 2.7249810695648193, "y": 13.415207862854004, "similar_indices": [98, 34, 76, 96, 93]}, {"index": 29, "arxiv_id": "2604.01020v1", "title": "OrgAgent: Organize Your Multi-Agent System like a Company", "summary": "While large language model-based multi-agent systems have shown strong potential for complex reasoning, how to effectively organize multiple agents remains an open question. In this paper, we introduce OrgAgent, a company-style hierarchical multi-agent framework that separates collaboration into governance, execution, and compliance layers. OrgAgent decomposes multi-agent reasoning into three layers: a governance layer for planning and resource allocation, an execution layer for task solving and review, and a compliance layer for final answer control. By evaluating the framework across reasoning tasks, LLMs, execution modes, and execution policies, we find that multi-agent systems organized in a company-style hierarchy generally outperform other organizational structures. Besides, hierarchical coordination also reduces token consumption relative to flat collaboration in most settings. For example, for GPT-OSS-120B, the hierarchical setting improves performance over flat multi-agent system by 102.73% while reducing token usage by 74.52% on SQuAD 2.0. Further analysis shows that hierarchy helps most when tasks benefit from stable skill assignment, controlled information flow, and layered verification. Overall, our findings highlight organizational structure as an important factor in multi-agent reasoning, shaping not only effectiveness and cost, but also coordination behavior.", "published": "2026-04-01T15:21:14Z", "authors": ["Yiru Wang", "Xinyue Shen", "Yaohui Han", "Michael Backes", "Pin-Yu Chen", "Tsung-Yi Ho"], "abs_url": "https://arxiv.org/abs/2604.01020v1", "pdf_url": "https://arxiv.org/pdf/2604.01020v1", "x": 2.035144805908203, "y": -9.548322677612305, "similar_indices": [197, 72, 71, 118, 171]}, {"index": 30, "arxiv_id": "2604.01007v1", "title": "OmniMem: Autoresearch-Guided Discovery of Lifelong Multimodal Agent Memory", "summary": "AI agents increasingly operate over extended time horizons, yet their ability to retain, organize, and recall multimodal experiences remains a critical bottleneck. Building effective lifelong memory requires navigating a vast design space spanning architecture, retrieval strategies, prompt engineering, and data pipelines; this space is too large and interconnected for manual exploration or traditional AutoML to explore effectively. We deploy an autonomous research pipeline to discover OmniMem, a unified multimodal memory framework for lifelong AI agents. Starting from a naïve baseline (F1=0.117 on LoCoMo), the pipeline autonomously executes ${\\sim}50$ experiments across two benchmarks, diagnosing failure modes, proposing architectural modifications, and repairing data pipeline bugs, all without human intervention in the inner loop. The resulting system achieves state-of-the-art on both benchmarks, improving F1 by +411% on LoCoMo (0.117$\\to$0.598) and +214% on Mem-Gallery (0.254$\\to$0.797) relative to the initial configurations. Critically, the most impactful discoveries are not hyperparameter adjustments: bug fixes (+175%), architectural changes (+44%), and prompt engineering (+188\\% on specific categories) each individually exceed the cumulative contribution of all hyperparameter tuning, demonstrating capabilities fundamentally beyond the reach of traditional AutoML. We provide a taxonomy of six discovery types and identify four properties that make multimodal memory particularly suited for autoresearch, offering guidance for applying autonomous research pipelines to other AI system domains. Code is available at this https://github.com/aiming-lab/OmniMem.", "published": "2026-04-01T15:06:23Z", "authors": ["Jiaqi Liu", "Zipeng Ling", "Shi Qiu", "Yanqing Liu", "Siwei Han", "Peng Xia", "Haoqin Tu", "Zeyu Zheng", "Cihang Xie", "Charles Fleming", "Mingyu Ding", "Huaxiu Yao"], "abs_url": "https://arxiv.org/abs/2604.01007v1", "pdf_url": "https://arxiv.org/pdf/2604.01007v1", "x": -2.207890033721924, "y": -1.4991040229797363, "similar_indices": [0, 194, 163, 197, 74]}, {"index": 31, "arxiv_id": "2604.01002v1", "title": "Query-Conditioned Evidential Keyframe Sampling for MLLM-Based Long-Form Video Understanding", "summary": "Multimodal Large Language Models (MLLMs) have shown strong performance on video question answering, but their application to long-form videos is constrained by limited context length and computational cost, making keyframe sampling essential. Existing approaches typically rely on semantic relevance or reinforcement learning, which either fail to capture evidential clues or suffer from inefficient combinatorial optimization. In this work, we propose an evidence-driven keyframe sampling framework grounded in information bottleneck theory. We formulate keyframe selection as maximizing the conditional mutual information between selected frames and the query, providing a principled objective that reflects each frame's contribution to answering the question. To make this objective tractable, we exploit its structure to derive a decomposed optimization that reduces subset selection to independent frame-level scoring. We further introduce a query-conditioned evidence scoring network trained with a contrastive objective to estimate evidential importance efficiently. Experiments on long-form video understanding benchmarks show that our method consistently outperforms prior sampling strategies under strict token budgets, while significantly improving training efficiency.", "published": "2026-04-01T15:02:50Z", "authors": ["Yiheng Wang", "Lichen Zhu", "Yueqian Lin", "Yudong Liu", "Jingyang Zhang", "Hai \"Helen\" Li", "Yiran Chen"], "abs_url": "https://arxiv.org/abs/2604.01002v1", "pdf_url": "https://arxiv.org/pdf/2604.01002v1", "x": 3.046389579772949, "y": 6.6470046043396, "similar_indices": [57, 80, 50, 106, 7]}, {"index": 32, "arxiv_id": "2604.01001v1", "title": "EgoSim: Egocentric World Simulator for Embodied Interaction Generation", "summary": "We introduce EgoSim, a closed-loop egocentric world simulator that generates spatially consistent interaction videos and persistently updates the underlying 3D scene state for continuous simulation. Existing egocentric simulators either lack explicit 3D grounding, causing structural drift under viewpoint changes, or treat the scene as static, failing to update world states across multi-stage interactions. EgoSim addresses both limitations by modeling 3D scenes as updatable world states. We generate embodiment interactions via a Geometry-action-aware Observation Simulation model, with spatial consistency from an Interaction-aware State Updating module. To overcome the critical data bottleneck posed by the difficulty in acquiring densely aligned scene-interaction training pairs, we design a scalable pipeline that extracts static point clouds, camera trajectories, and embodiment actions from in-the-wild large-scale monocular egocentric videos. We further introduce EgoCap, a capture system that enables low-cost real-world data collection with uncalibrated smartphones. Extensive experiments demonstrate that EgoSim significantly outperforms existing methods in terms of visual quality, spatial consistency, and generalization to complex scenes and in-the-wild dexterous interactions, while supporting cross-embodiment transfer to robotic manipulation. Codes and datasets will be open soon. The project page is at egosimulator.github.io.", "published": "2026-04-01T15:00:46Z", "authors": ["Jinkun Hao", "Mingda Jia", "Ruiyan Wang", "Xihui Liu", "Ran Yi", "Lizhuang Ma", "Jiangmiao Pang", "Xudong Xu"], "abs_url": "https://arxiv.org/abs/2604.01001v1", "pdf_url": "https://arxiv.org/pdf/2604.01001v1", "x": 6.1871466636657715, "y": 2.0503149032592773, "similar_indices": [77, 50, 115, 94, 166]}, {"index": 33, "arxiv_id": "2604.00994v1", "title": "Multimodal Analysis of State-Funded News Coverage of the Israel-Hamas War on YouTube Shorts", "summary": "YouTube Shorts have become central to news consumption on the platform, yet research on how geopolitical events are represented in this format remains limited. To address this gap, we present a multimodal pipeline that combines automatic transcription, aspect-based sentiment analysis (ABSA), and semantic scene classification. The pipeline is first assessed for feasibility and then applied to analyze short-form coverage of the Israel-Hamas war by state-funded outlets. Using over 2,300 conflict-related Shorts and more than 94,000 visual frames, we systematically examine war reporting across major international broadcasters. Our findings reveal that the sentiment expressed in transcripts regarding specific aspects differs across outlets and over time, whereas scene-type classifications reflect visual cues consistent with real-world events. Notably, smaller domain-adapted models outperform large transformers and even LLMs for sentiment analysis, underscoring the value of resource-efficient approaches for humanities research. The pipeline serves as a template for other short-form platforms, such as TikTok and Instagram, and demonstrates how multimodal methods, combined with qualitative interpretation, can characterize sentiment patterns and visual cues in algorithmically driven video environments.", "published": "2026-04-01T14:55:58Z", "authors": ["Daniel Miehling", "Sandra Kuebler"], "abs_url": "https://arxiv.org/abs/2604.00994v1", "pdf_url": "https://arxiv.org/pdf/2604.00994v1", "x": 2.5249292850494385, "y": 9.088607788085938, "similar_indices": [46, 188, 31, 49, 136]}, {"index": 34, "arxiv_id": "2604.00987v1", "title": "Bridging Structured Knowledge and Data: A Unified Framework with Finance Applications", "summary": "We develop Structured-Knowledge-Informed Neural Networks (SKINNs), a unified estimation framework that embeds theoretical, simulated, previously learned, or cross-domain insights as differentiable constraints within flexible neural function approximation. SKINNs jointly estimate neural network parameters and economically meaningful structural parameters in a single optimization problem, enforcing theoretical consistency not only on observed data but over a broader input domain through collocation, and therefore nesting approaches such as functional GMM, Bayesian updating, transfer learning, PINNs, and surrogate modeling. SKINNs define a class of M-estimators that are consistent and asymptotically normal with root-N convergence, sandwich covariance, and recovery of pseudo-true parameters under misspecification. We establish identification of structural parameters under joint flexibility, derive generalization and target-risk bounds under distributional shift in a convex proxy, and provide a restricted-optimal characterization of the weighting parameter that governs the bias-variance tradeoff. In an illustrative financial application to option pricing, SKINNs improve out-of-sample valuation and hedging performance, particularly at longer horizons and during high-volatility regimes, while recovering economically interpretable structural parameters with improved stability relative to conventional calibration. More broadly, SKINNs provide a general econometric framework for combining model-based reasoning with high-dimensional, data-driven estimation.", "published": "2026-04-01T14:51:08Z", "authors": ["Yi Cao", "Zexun Chen", "Lin William Cong", "Heqing Shi"], "abs_url": "https://arxiv.org/abs/2604.00987v1", "pdf_url": "https://arxiv.org/pdf/2604.00987v1", "x": 1.375483751296997, "y": 12.434614181518555, "similar_indices": [2, 82, 120, 38, 28]}, {"index": 35, "arxiv_id": "2604.00986v1", "title": "Do Phone-Use Agents Respect Your Privacy?", "summary": "We study whether phone-use agents respect privacy while completing benign mobile tasks. This question has remained hard to answer because privacy-compliant behavior is not operationalized for phone-use agents, and ordinary apps do not reveal exactly what data agents type into which form entries during execution. To make this question measurable, we introduce MyPhoneBench, a verifiable evaluation framework for privacy behavior in mobile agents. We operationalize privacy-respecting phone use as permissioned access, minimal disclosure, and user-controlled memory through a minimal privacy contract, iMy, and pair it with instrumented mock apps plus rule-based auditing that make unnecessary permission requests, deceptive re-disclosure, and unnecessary form filling observable and reproducible. Across five frontier models on 10 mobile apps and 300 tasks, we find that task success, privacy-compliant task completion, and later-session use of saved preferences are distinct capabilities, and no single model dominates all three. Evaluating success and privacy jointly reshuffles the model ordering relative to either metric alone. The most persistent failure mode across models is simple data minimization: agents still fill optional personal entries that the task does not require. These results show that privacy failures arise from over-helpful execution of benign tasks, and that success-only evaluation overestimates the deployment readiness of current phone-use agents. All code, mock apps, and agent trajectories are publicly available at~ https://github.com/tangzhy/MyPhoneBench.", "published": "2026-04-01T14:50:50Z", "authors": ["Zhengyang Tang", "Ke Ji", "Xidong Wang", "Zihan Ye", "Xinyuan Wang", "Yiduo Guo", "Ziniu Li", "Chenxin Li", "Jingyuan Hu", "Shunian Chen", "Tongxu Luo", "Jiaxi Bi", "Zeyu Qin", "Shaobo Wang", "Xin Lai", "Pengyuan Lyu", "Junyi Li", "Can Xu", "Chengquan Zhang", "Han Hu", "Ming Yan", "Benyou Wang"], "abs_url": "https://arxiv.org/abs/2604.00986v1", "pdf_url": "https://arxiv.org/pdf/2604.00986v1", "x": 2.2623133659362793, "y": -6.940223693847656, "similar_indices": [24, 144, 47, 85, 71]}, {"index": 36, "arxiv_id": "2604.00979v1", "title": "Dual Optimal: Make Your LLM Peer-like with Dignity", "summary": "Current aligned language models exhibit a dual failure mode we term the Evasive Servant: they sycophantically validate flawed user beliefs while deflecting responsibility with boilerplate disclaimers. We propose the Dignified Peer framework, which counters servility with anti-sycophancy and trustworthiness, and mitigates evasiveness through empathy and creativity. Realizing this agent requires overcoming significant challenges in data supervision, objective collapse, and evaluation bias. We address these issues by introducing the PersonaKnob dataset which features a compositional partial order structure of multiple persona preference. This data is utilized alongside a tolerant constrained Lagrangian DPO algorithm that dynamically balances all persona dimensions to prevent behavioral collapse. Additionally, we employ a psychometrically calibrated Item Response Theory evaluation protocol to disentangle latent model persona capability from confounders like judge biases. Extensive empirical studies demonstrate that our approach successfully build a LLM agent with both dignity and peer.", "published": "2026-04-01T14:48:44Z", "authors": ["Xiangqi Wang", "Yue Huang", "Haomin Zhuang", "Kehan Guo", "Xiangliang Zhang"], "abs_url": "https://arxiv.org/abs/2604.00979v1", "pdf_url": "https://arxiv.org/pdf/2604.00979v1", "x": -3.8083415031433105, "y": -7.419861793518066, "similar_indices": [86, 118, 69, 85, 116]}, {"index": 37, "arxiv_id": "2604.00977v1", "title": "Flow-based Policy With Distributional Reinforcement Learning in Trajectory Optimization", "summary": "Reinforcement Learning (RL) has proven highly effective in addressing complex control and decision-making tasks. However, in most traditional RL algorithms, the policy is typically parameterized as a diagonal Gaussian distribution, which constrains the policy from capturing multimodal distributions, making it difficult to cover the full range of optimal solutions in multi-solution problems, and the return is reduced to a mean value, losing its multimodal nature and thus providing insufficient guidance for policy updates. In response to these problems, we propose a RL algorithm termed flow-based policy with distributional RL (FP-DRL). This algorithm models the policy using flow matching, which offers both computational efficiency and the capacity to fit complex distributions. Additionally, it employs a distributional RL approach to model and optimize the entire return distribution, thereby more effectively guiding multimodal policy updates and improving agent performance. Experimental trails on MuJoCo benchmarks demonstrate that the FP-DRL algorithm achieves state-of-the-art (SOTA) performance in most MuJoCo control tasks while exhibiting superior representation capability of the flow policy.", "published": "2026-04-01T14:47:41Z", "authors": ["Ruijie Hao", "Longfei Zhang", "Yang Dai", "Yang Ma", "Xingxing Liang", "Guangquan Cheng"], "abs_url": "https://arxiv.org/abs/2604.00977v1", "pdf_url": "https://arxiv.org/pdf/2604.00977v1", "x": -8.09809398651123, "y": -0.7260633707046509, "similar_indices": [143, 48, 161, 166, 91]}, {"index": 38, "arxiv_id": "2604.00938v1", "title": "WARP: Guaranteed Inner-Layer Repair of NLP Transformers", "summary": "Transformer-based NLP models remain vulnerable to adversarial perturbations, yet existing repair methods face a fundamental trade-off: gradient-based approaches offer flexibility but lack verifiability and often overfit; methods that do provide repair guarantees are restricted to the final layer or small networks, significantly limiting the parameter search space available for repair. We present WARP (Weight-Adjusted Repair with Provability), a constraint-based repair framework that extends repair beyond the last layer of Transformer models. WARP formulates repair as a convex quadratic program derived from a first-order linearization of the logit gap, enabling tractable optimization over a high-dimensional parameter space. Under the condition that the first-order approximation holds, this formulation induces three per-sample guarantees: (i) a positive margin constraint ensuring correct classification on repaired inputs, (ii) preservation constraints over a designated remain set, and (iii) a certified robustness radius derived from Lipschitz continuity. To ensure feasibility across varying model architectures, we introduce a sensitivity-based preprocessing step that conditions the optimization landscape accordingly. We further show that the iterative optimization procedure converges to solutions satisfying all repair constraints under mild assumptions. Empirical evaluation on encoder-only Transformers with varying layer architectures validates that these guarantees hold in practice while improving robustness to adversarial inputs. Our results demonstrate that guaranteed, generalizable Transformer repair is achievable through principled constraint-based optimization.", "published": "2026-04-01T14:12:49Z", "authors": ["Hsin-Ling Hsu", "Min-Yu Chen", "Nai-Chia Chen", "Yan-Ru Chen", "Yi-Ling Chang", "Fang Yu"], "abs_url": "https://arxiv.org/abs/2604.00938v1", "pdf_url": "https://arxiv.org/pdf/2604.00938v1", "x": 0.18613438308238983, "y": 12.949790000915527, "similar_indices": [82, 104, 18, 62, 34]}, {"index": 39, "arxiv_id": "2604.00931v1", "title": "PsychAgent: An Experience-Driven Lifelong Learning Agent for Self-Evolving Psychological Counselor", "summary": "Existing methods for AI psychological counselors predominantly rely on supervised fine-tuning using static dialogue datasets. However, this contrasts with human experts, who continuously refine their proficiency through clinical practice and accumulated experience. To bridge this gap, we propose an Experience-Driven Lifelong Learning Agent (\\texttt{PsychAgent}) for psychological counseling. First, we establish a Memory-Augmented Planning Engine tailored for longitudinal multi-session interactions, which ensures therapeutic continuity through persistent memory and strategic planning. Second, to support self-evolution, we design a Skill Evolution Engine that extracts new practice-grounded skills from historical counseling trajectories. Finally, we introduce a Reinforced Internalization Engine that integrates the evolved skills into the model via rejection fine-tuning, aiming to improve performance across diverse scenarios. Comparative analysis shows that our approach achieves higher scores than strong general LLMs (e.g., GPT-5.4, Gemini-3) and domain-specific baselines across all reported evaluation dimensions. These results suggest that lifelong learning can improve the consistency and overall quality of multi-session counseling responses.", "published": "2026-04-01T14:08:49Z", "authors": ["Yutao Yang", "Junsong Li", "Qianjun Pan", "Jie Zhou", "Kai Chen", "Qin Chen", "Jingyuan Zhao", "Ningning Zhou", "Xin Li", "Liang He"], "abs_url": "https://arxiv.org/abs/2604.00931v1", "pdf_url": "https://arxiv.org/pdf/2604.00931v1", "x": -4.207714557647705, "y": -4.594418525695801, "similar_indices": [43, 194, 48, 87, 86]}, {"index": 40, "arxiv_id": "2604.00927v1", "title": "Learning Quantised Structure-Preserving Motion Representations for Dance Fingerprinting", "summary": "We present DANCEMATCH, an end-to-end framework for motion-based dance retrieval, the task of identifying semantically similar choreographies directly from raw video, defined as DANCE FINGERPRINTING. While existing motion analysis and retrieval methods can compare pose sequences, they rely on continuous embeddings that are difficult to index, interpret, or scale. In contrast, DANCEMATCH constructs compact, discrete motion signatures that capture the spatio-temporal structure of dance while enabling efficient large-scale retrieval. Our system integrates Skeleton Motion Quantisation (SMQ) with Spatio-Temporal Transformers (STT) to encode human poses, extracted via Apple CoMotion, into a structured motion vocabulary. We further design DANCE RETRIEVAL ENGINE (DRE), which performs sub-linear retrieval using a histogram-based index followed by re-ranking for refined matching. To facilitate reproducible research, we release DANCETYPESBENCHMARK, a pose-aligned dataset annotated with quantised motion tokens. Experiments demonstrate robust retrieval across diverse dance styles and strong generalisation to unseen choreographies, establishing a foundation for scalable motion fingerprinting and quantitative choreographic analysis.", "published": "2026-04-01T14:06:59Z", "authors": ["Arina Kharlamova", "Bowei He", "Chen Ma", "Xue Liu"], "abs_url": "https://arxiv.org/abs/2604.00927v1", "pdf_url": "https://arxiv.org/pdf/2604.00927v1", "x": 9.29732608795166, "y": 3.24191951751709, "similar_indices": [199, 31, 32, 170, 21]}, {"index": 41, "arxiv_id": "2604.00921v1", "title": "Representation Selection via Cross-Model Agreement using Canonical Correlation Analysis", "summary": "Mod
