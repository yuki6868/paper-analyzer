arameters to improve tracking, then introduce Elo-weighted training to improve decisions while preserving diversity. A 2 x 2 factorial ablation shows that scaling improves tracking, weighting improves decisions, and their combination is superadditive. Linear weighting works best, while overly aggressive weighting harms tracking despite lower validation loss. We also introduce a coverage-decay formula, t* = log(N/kcrit)/log b, as a reliability horizon for intra-game degeneration risk.   Our final 120M-parameter model, without search, reached Lichess bullet 2570 over 253 rated games. On human move prediction it achieves 55.2% Top-1 accuracy, exceeding Maia-2 rapid and Maia-2 blitz. Unlike position-based methods, sequence input naturally encodes full game history, enabling history-dependent decisions that single-position models cannot exhibit.", "published": "2026-03-31T14:01:39Z", "authors": ["Quanhao Li", "Wei Jiang"], "abs_url": "https://arxiv.org/abs/2603.29761v1", "pdf_url": "https://arxiv.org/pdf/2603.29761v1", "x": -7.343257904052734, "y": 0.3623040020465851, "similar_indices": [161, 9, 194, 164, 86]}, {"index": 173, "arxiv_id": "2603.29759v1", "title": "TSHA: A Benchmark for Visual Language Models in Trustworthy Safety Hazard Assessment Scenarios", "summary": "Recent advances in vision-language models (VLMs) have accelerated their application to indoor safety hazards assessment. However, existing benchmarks suffer from three fundamental limitations: (1) heavy reliance on synthetic datasets constructed via simulation software, creating a significant domain gap with real-world environments; (2) oversimplified safety tasks with artificial constraints on hazard and scene types, thereby limiting model generalization; and (3) absence of rigorous evaluation protocols to thoroughly assess model capabilities in complex home safety scenarios. To address these challenges, we introduce TSHA (\\textbf{T}rustworthy \\textbf{S}afety \\textbf{H}azards \\textbf{A}ssessment), a comprehensive benchmark comprising 81,809 carefully curated training samples drawn from four complementary sources: existing indoor datasets, internet images, AIGC images, and newly captured images. This benchmark set also includes a highly challenging test set with 1707 samples, comprising not only a carefully selected subset from the training distribution but also newly added videos and panoramic images containing multiple safety hazards, used to evaluate the model's robustness in complex safety scenarios. Extensive experiments on 23 popular VLMs demonstrate that current VLMs lack robust capabilities for safety hazard assessment. Importantly, models trained on the TSHA training set not only achieve a significant performance improvement of up to +18.3 points on the TSHA test set but also exhibit enhanced generalizability across other benchmarks, underscoring the substantial contribution and importance of the TSHA benchmark.", "published": "2026-03-31T14:00:10Z", "authors": ["Qiucheng Yu", "Ruijie Xu", "Mingang Chen", "Xuequan Lu", "Jianfeng Dong", "Chaochao Lu", "Xin Tan"], "abs_url": "https://arxiv.org/abs/2603.29759v1", "pdf_url": "https://arxiv.org/pdf/2603.29759v1", "x": 4.135044574737549, "y": -1.6612050533294678, "similar_indices": [74, 107, 88, 162, 163]}, {"index": 174, "arxiv_id": "2604.00072v1", "title": "Empirical Validation of the Classification-Verification Dichotomy for AI Safety Gates", "summary": "Can classifier-based safety gates maintain reliable oversight as AI systems improve over hundreds of iterations? We provide comprehensive empirical evidence that they cannot. On a self-improving neural controller (d=240), eighteen classifier configurations -- spanning MLPs, SVMs, random forests, k-NN, Bayesian classifiers, and deep networks -- all fail the dual conditions for safe self-improvement. Three safe RL baselines (CPO, Lyapunov, safety shielding) also fail. Results extend to MuJoCo benchmarks (Reacher-v4 d=496, Swimmer-v4 d=1408, HalfCheetah-v4 d=1824). At controlled distribution separations up to delta_s=2.0, all classifiers still fail -- including the NP-optimal test and MLPs with 100% training accuracy -- demonstrating structural impossibility.   We then show the impossibility is specific to classification, not to safe self-improvement itself. A Lipschitz ball verifier achieves zero false accepts across dimensions d in {84, 240, 768, 2688, 5760, 9984, 17408} using provable analytical bounds (unconditional delta=0). Ball chaining enables unbounded parameter-space traversal: on MuJoCo Reacher-v4, 10 chains yield +4.31 reward improvement with delta=0; on Qwen2.5-7B-Instruct during LoRA fine-tuning, 42 chain transitions traverse 234x the single-ball radius with zero safety violations across 200 steps. A 50-prompt oracle confirms oracle-agnosticity. Compositional per-group verification enables radii up to 37x larger than full-network balls. At d<=17408, delta=0 is unconditional; at LLM scale, conditional on estimated Lipschitz constants.", "published": "2026-03-31T13:54:36Z", "authors": ["Arsenios Scrivens"], "abs_url": "https://arxiv.org/abs/2604.00072v1", "pdf_url": "https://arxiv.org/pdf/2604.00072v1", "x": -6.09753942489624, "y": 1.805448055267334, "similar_indices": [104, 183, 85, 56, 173]}, {"index": 175, "arxiv_id": "2603.29755v1", "title": "CausalPulse: An Industrial-Grade Neurosymbolic Multi-Agent Copilot for Causal Diagnostics in Smart Manufacturing", "summary": "Modern manufacturing environments demand real-time, trustworthy, and interpretable root-cause insights to sustain productivity and quality. Traditional analytics pipelines often treat anomaly detection, causal inference, and root-cause analysis as isolated stages, limiting scalability and explainability. In this work, we present CausalPulse, an industry-grade multi-agent copilot that automates causal diagnostics in smart manufacturing. It unifies anomaly detection, causal discovery, and reasoning through a neurosymbolic architecture built on standardized agentic protocols. CausalPulse is being deployed in a Robert Bosch manufacturing plant, integrating seamlessly with existing monitoring workflows and supporting real-time operation at production scale. Evaluations on both public (Future Factories) and proprietary (Planar Sensor Element) datasets show high reliability, achieving overall success rates of 98.0% and 98.73%. Per-criterion success rates reached 98.75% for planning and tool use, 97.3% for self-reflection, and 99.2% for collaboration. Runtime experiments report end-to-end latency of 50-60s per diagnostic workflow with near-linear scalability (R^2=0.97), confirming real-time readiness. Comparison with existing industrial copilots highlights distinct advantages in modularity, extensibility, and deployment maturity. These results demonstrate how CausalPulse's modular, human-in-the-loop design enables reliable, interpretable, and production-ready automation for next-generation manufacturing.", "published": "2026-03-31T13:54:34Z", "authors": ["Chathurangi Shyalika", "Utkarshani Jaimini", "Cory Henson", "Amit Sheth"], "abs_url": "https://arxiv.org/abs/2603.29755v1", "pdf_url": "https://arxiv.org/pdf/2603.29755v1", "x": 2.02953839302063, "y": -11.088788032531738, "similar_indices": [72, 125, 133, 167, 171]}, {"index": 176, "arxiv_id": "2604.00070v1", "title": "Brain MR Image Synthesis with Multi-contrast Self-attention GAN", "summary": "Accurate and complete multi-modal Magnetic Resonance Imaging (MRI) is essential for neuro-oncological assessment, as each contrast provides complementary anatomical and pathological information. However, acquiring all modalities (e.g., T1c, T1n, T2, T2f) for every patient is often impractical due to time, cost, and patient discomfort, potentially limiting comprehensive tumour evaluation. We propose 3D-MC-SAGAN (3D Multi-Contrast Self-Attention generative adversarial network), a unified 3D multi-contrast synthesis framework that generates high-fidelity missing modalities from a single T2 input while explicitly preserving tumour characteristics. The model employs a multi-scale 3D encoder-decoder generator with residual connections and a novel Memory-Bounded Hybrid Attention (MBHA) block to capture long-range dependencies efficiently, and is trained with a WGAN-GP critic and an auxiliary contrast-conditioning branch to produce T2f, T1n, and T1c volumes within a single unified network. A frozen 3D U-Net-based segmentation module introduces a segmentation-consistency constraint to preserve lesion morphology. The composite objective integrates adversarial, reconstruction, perceptual, structural similarity, contrast-classification, and segmentation-guided losses to align global realism with tumour-preserving structure. Extensive evaluation on 3D brain MRI datasets demonstrates that 3D-MC-SAGAN achieves state-of-the-art quantitative performance and generates visually coherent, anatomically plausible contrasts with improved distribution-level realism. Moreover, it maintains tumour segmentation accuracy comparable to fully acquired multi-modal inputs, highlighting its potential to reduce acquisition burden while preserving clinically meaningful information.", "published": "2026-03-31T13:43:53Z", "authors": ["Zaid A. Abod", "Furqan Aziz"], "abs_url": "https://arxiv.org/abs/2604.00070v1", "pdf_url": "https://arxiv.org/pdf/2604.00070v1", "x": 9.410117149353027, "y": 8.18101692199707, "similar_indices": [79, 97, 150, 109, 157]}, {"index": 177, "arxiv_id": "2603.29741v1", "title": "BotVerse: Real-Time Event-Driven Simulation of Social Agents", "summary": "BotVerse is a scalable, event-driven framework for high-fidelity social simulation using LLM-based agents. It addresses the ethical risks of studying autonomous agents on live networks by isolating interactions within a controlled environment while grounding them in real-time content streams from the Bluesky ecosystem. The system features an asynchronous orchestration API and a simulation engine that emulates human-like temporal patterns and cognitive memory. Through the Synthetic Social Observatory, researchers can deploy customizable personas and observe multimodal interactions at scale. We demonstrate BotVersevia a coordinated disinformation scenario, providing a safe, experimental framework for red-teaming and computational social scientists. A video demonstration of the framework is available at https://youtu.be/eZSzO5Jarqk.", "published": "2026-03-31T13:39:09Z", "authors": ["Edoardo Allegrini", "Edoardo Di Paolo", "Angelo Spognardi", "Marinella Petrocchi"], "abs_url": "https://arxiv.org/abs/2603.29741v1", "pdf_url": "https://arxiv.org/pdf/2603.29741v1", "x": -0.30542394518852234, "y": -6.894252300262451, "similar_indices": [47, 118, 73, 13, 102]}, {"index": 178, "arxiv_id": "2603.29735v1", "title": "Spontaneous Functional Differentiation in Large Language Models: A Brain-Like Intelligence Economy", "summary": "The evolution of intelligence in artificial systems provides a unique opportunity to identify universal computational principles. Here we show that large language models spontaneously develop synergistic cores where information integration exceeds individual parts remarkably similar to the human brain. Using Integrated Information Decomposition across multiple architectures we find that middle layers exhibit synergistic processing while early and late layers rely on redundancy. This organization is dynamic and emerges as a physical phase transition as task difficulty increases. Crucially ablating synergistic components causes catastrophic performance loss confirming their role as the physical entity of abstract reasoning and bridging artificial and biological intelligence.", "published": "2026-03-31T13:36:08Z", "authors": ["Junjie Zhang", "Zhen Shen", "Gang Xiong", "Xisong Dong"], "abs_url": "https://arxiv.org/abs/2603.29735v1", "pdf_url": "https://arxiv.org/pdf/2603.29735v1", "x": -4.8323588371276855, "y": 9.623501777648926, "similar_indices": [194, 198, 90, 6, 12]}, {"index": 179, "arxiv_id": "2604.00069v1", "title": "Perspective: Towards sustainable exploration of chemical spaces with machine learning", "summary": "Artificial intelligence is transforming molecular and materials science, but its growing computational and data demands raise critical sustainability challenges. In this Perspective, we examine resource considerations across the AI-driven discovery pipeline--from quantum-mechanical (QM) data generation and model training to automated, self-driving research workflows--building on discussions from the ``SusML workshop: Towards sustainable exploration of chemical spaces with machine learning'' held in Dresden, Germany. In this context, the availability of large quantum datasets has enabled rigorous benchmarking and rapid methodological progress, while also incurring substantial energy and infrastructure costs. We highlight emerging strategies to enhance efficiency, including general-purpose machine learning (ML) models, multi-fidelity approaches, model distillation, and active learning. Moreover, incorporating physics-based constraints within hierarchical workflows, where fast ML surrogates are applied broadly and high-accuracy QM methods are used selectively, can further optimize resource use without compromising reliability. Equally important is bridging the gap between idealized computational predictions and real-world conditions by accounting for synthesizability and multi-objective design criteria, which is essential for practical impact. Finally, we argue that sustainable progress will rely on open data and models, reusable workflows, and domain-specific AI systems that maximize scientific value per unit of computation, enabling efficient and responsible discovery of technological materials and therapeutics.", "published": "2026-03-31T13:29:20Z", "authors": ["Leonardo Medrano Sandonas", "David Balcells", "Anton Bochkarev", "Jacqueline M. Cole", "Volker L. Deringer", "Werner Dobrautz", "Adrian Ehrenhofer", "Thorben Frank", "Pascal Friederich", "Rico Friedrich", "Janine George", "Luca Ghiringhelli", "Alejandra Hinostroza Caldas", "Veronika Juraskova", "Hannes Kneiding", "Yury Lysogorskiy", "Johannes T. Margraf", "Hanna Türk", "Anatole von Lilienfeld", "Milica Todorović", "Alexandre Tkatchenko", "Mariana Rossi", "Gianaurelio Cuniberti"], "abs_url": "https://arxiv.org/abs/2604.00069v1", "pdf_url": "https://arxiv.org/pdf/2604.00069v1", "x": -7.823037624359131, "y": 7.6381916999816895, "similar_indices": [168, 180, 153, 145, 169]}, {"index": 180, "arxiv_id": "2603.29723v1", "title": "Reinforced Reasoning for End-to-End Retrosynthetic Planning", "summary": "Retrosynthetic planning is a fundamental task in organic chemistry, yet remains challenging due to its combinatorial complexity. To address this, conventional approaches typically rely on hybrid frameworks that combine single-step predictions with external search heuristics, inevitably fracturing the logical coherence between local molecular transformations and global planning objectives. To bridge this gap and embed sophisticated strategic foresight directly into the model's chemical reasoning, we introduce ReTriP, an end-to-end generative framework that reformulates retrosynthesis as a direct Chain-of-Thought reasoning task. We establish a path-coherent molecular representation and employ a progressive training curriculum that transitions from reasoning distillation to reinforcement learning with verifiable rewards, effectively aligning stepwise generation with practical route utility. Empirical evaluation on RetroBench demonstrates that ReTriP achieves state-of-the-art performance, exhibiting superior robustness in long-horizon planning compared to hybrid baselines.", "published": "2026-03-31T13:22:44Z", "authors": ["Chenyang Zuo", "Siqi Fan", "Yizhen Luo", "Zaiqing Nie"], "abs_url": "https://arxiv.org/abs/2603.29723v1", "pdf_url": "https://arxiv.org/pdf/2603.29723v1", "x": -7.144237995147705, "y": 6.6763014793396, "similar_indices": [179, 7, 53, 166, 169]}, {"index": 181, "arxiv_id": "2603.29709v1", "title": "Symphony for Medical Coding: A Next-Generation Agentic System for Scalable and Explainable Medical Coding", "summary": "Medical coding translates free-text clinical documentation into standardized codes drawn from classification systems that contain tens of thousands of entries and are updated annually. It is central to billing, clinical research, and quality reporting, yet remains largely manual, slow, and error-prone. Existing automated approaches learn to predict a fixed set of codes from labeled data, thereby preventing adaptation to new codes or different coding systems without retraining on different data. They also provide no explanation for their predictions, limiting trust in safety-critical settings. We introduce Symphony for Medical Coding, a system that approaches the task the way expert human coders do: by reasoning over the clinical narrative with direct access to the coding guidelines. This design allows Symphony to operate across any coding system and to provide span-level evidence linking each predicted code to the text that supports it. We evaluate on two public benchmarks and three real-world datasets spanning inpatient, outpatient, emergency, and subspecialty settings across the United States and the United Kingdom. Symphony achieves state-of-the-art results across all settings, establishing itself as a flexible, deployment-ready foundation for automated clinical coding.", "published": "2026-03-31T13:11:07Z", "authors": ["Joakim Edin", "Andreas Motzfeldt", "Simon Flachs", "Lars Maaløe"], "abs_url": "https://arxiv.org/abs/2603.29709v1", "pdf_url": "https://arxiv.org/pdf/2603.29709v1", "x": -2.371912717819214, "y": -7.346937656402588, "similar_indices": [137, 69, 83, 0, 42]}, {"index": 182, "arxiv_id": "2603.29694v1", "title": "Exploring the Impact of Skin Color on Skin Lesion Segmentation", "summary": "Skin cancer, particularly melanoma, remains a major cause of morbidity and mortality, making early detection critical. AI-driven dermatology systems often rely on skin lesion segmentation as a preprocessing step to delineate the lesion from surrounding skin and support downstream analysis. While fairness concerns regarding skin tone have been widely studied for lesion classification, the influence of skin tone on the segmentation stage remains under-quantified and is frequently assessed using coarse, discrete skin tone categories. In this work, we evaluate three strong segmentation architectures (UNet, DeepLabV3 with a ResNet50 backbone, and DINOv2) on two public dermoscopic datasets (HAM10000 and ISIC2017) and introduce a continuous pigment or contrast analysis that treats pixel-wise ITA values as distributions. Using Wasserstein distances between within-image distributions for skin-only, lesion-only, and whole-image regions, we quantify lesion skin contrast and relate it to segmentation performance across multiple metrics. Within the range represented in these datasets, global skin tone metrics (Fitzpatrick grouping or mean ITA) show weak association with segmentation quality. In contrast, low lesion-skin contrast is consistently associated with larger segmentation errors in models, indicating that boundary ambiguity and low contrast are key drivers of failure. These findings suggest that fairness improvements in dermoscopic segmentation should prioritize robust handling of low-contrast lesions, and the distribution-based pigment measures provide a more informative audit signal than discrete skin-tone categories.", "published": "2026-03-31T12:49:10Z", "authors": ["Kuniko Paxton", "Medina Kapo", "Amila Akagić", "Koorosh Aslansefat", "Dhavalkumar Thakker", "Yiannis Papadopoulos"], "abs_url": "https://arxiv.org/abs/2603.29694v1", "pdf_url": "https://arxiv.org/pdf/2603.29694v1", "x": 8.134163856506348, "y": 10.0399751663208, "similar_indices": [11, 176, 149, 150, 97]}, {"index": 183, "arxiv_id": "2603.29693v1", "title": "Measuring the metacognition of AI", "summary": "A robust decision-making process must take into account uncertainty, especially when the choice involves inherent risks. Because artificial Intelligence (AI) systems are increasingly integrated into decision-making workflows, managing uncertainty relies more and more on the metacognitive capabilities of these systems; i.e, their ability to assess the reliability of and regulate their own decisions. Hence, it is crucial to employ robust methods to measure the metacognitive abilities of AI. This paper is primarily a methodological contribution arguing for the adoption of the meta-d' framework, or its model-free alternatives, as the gold standard for assessing the metacognitive sensitivity of AIs--the ability to generate confidence ratings that distinguish correct from incorrect responses. Moreover, we propose to leverage signal detection theory (SDT) to measure the ability of AIs to spontaneously regulate their decisions based on uncertainty and risk. To demonstrate the practical utility of these psychophysical frameworks, we conduct two series of experiments on three large language models (LLMs)--GPT-5, DeepSeek-V3.2-Exp, and Mistral-Medium-2508. In the first experiments, LLMs performed a primary judgment followed by a confidence rating. In the second, LLMs only performed the primary judgment, while we manipulated the risk associated with either response. On the one hand, applying the meta-d' framework allows us to conduct comparisons along three axes: comparing an LLM to optimality, comparing different LLMs on a given task, and comparing the same LLM across different tasks. On the other hand, SDT allows us to assess whether LLMs become more conservative when risks are high.", "published": "2026-03-31T12:48:42Z", "authors": ["Richard Servajean", "Philippe Servajean"], "abs_url": "https://arxiv.org/abs/2603.29693v1", "pdf_url": "https://arxiv.org/pdf/2603.29693v1", "x": -8.253569602966309, "y": -8.627943992614746, "similar_indices": [186, 86, 139, 17, 159]}, {"index": 184, "arxiv_id": "2603.29691v1", "title": "A First Step Towards Even More Sparse Encodings of Probability Distributions", "summary": "Real world scenarios can be captured with lifted probability distributions. However, distributions are usually encoded in a table or list, requiring an exponential number of values. Hence, we propose a method for extracting first-order formulas from probability distributions that require significantly less values by reducing the number of values in a distribution and then extracting, for each value, a logical formula to be further minimized. This reduction and minimization allows for increasing the sparsity in the encoding while also generalizing a given distribution. Our evaluation shows that sparsity can increase immensely by extracting a small set of short formulas while preserving core information.", "published": "2026-03-31T12:46:05Z", "authors": ["Florian Andreas Marwitz", "Tanya Braun", "Ralf Möller"], "abs_url": "https://arxiv.org/abs/2603.29691v1", "pdf_url": "https://arxiv.org/pdf/2603.29691v1", "x": -1.981836199760437, "y": 12.332134246826172, "similar_indices": [68, 196, 89, 169, 45]}, {"index": 185, "arxiv_id": "2603.29689v1", "title": "KEditVis: A Visual Analytics System for Knowledge Editing of Large Language Models", "summary": "Large Language Models (LLMs) demonstrate exceptional capabilities in factual question answering, yet they sometimes provide incorrect responses. To address this issue, knowledge editing techniques have emerged as effective methods for correcting factual information in LLMs. However, typical knowledge editing workflows struggle with identifying the optimal set of model layers for editing and rely on summary indicators that provide insufficient guidance. This lack of transparency hinders effective comparison and identification of optimal editing strategies. In this paper, we present KEditVis, a novel visual analytics system designed to assist users in gaining a deeper understanding of knowledge editing through interactive visualizations, improving editing outcomes, and discovering valuable insights for the future development of knowledge editing algorithms. With KEditVis, users can select appropriate layers as the editing target, explore the reasons behind ineffective edits, and perform more targeted and effective edits. Our evaluation, including usage scenarios, expert interviews, and a user study, validates the effectiveness and usability of the system.", "published": "2026-03-31T12:45:46Z", "authors": ["Zhenning Chen", "Hanbei Zhan", "Yanwei Huang", "Xin Wu", "Dazhen Deng", "Di Weng", "Yingcai Wu"], "abs_url": "https://arxiv.org/abs/2603.29689v1", "pdf_url": "https://arxiv.org/pdf/2603.29689v1", "x": 0.7217828035354614, "y": -1.309142827987671, "similar_indices": [163, 192, 26, 115, 189]}, {"index": 186, "arxiv_id": "2603.29681v1", "title": "Beyond the Steeper Curve: AI-Mediated Metacognitive Decoupling and the Limits of the Dunning-Kruger Metaphor", "summary": "The common claim that generative AI simply amplifies the Dunning-Kruger effect is too coarse to capture the available evidence. The clearest findings instead suggest that large language model (LLM) use can improve observable output and short-term task performance while degrading metacognitive accuracy and flattening the classic competence-confidence gradient across skill groups. This paper synthesizes evidence from human-AI interaction, learning research, and model evaluation, and proposes the working model of AI-mediated metacognitive decoupling: a widening gap among produced output, underlying understanding, calibration accuracy, and self-assessed ability. This four-variable account better explains overconfidence, over- and under-reliance, crutch effects, and weak transfer than the simpler metaphor of a uniformly steeper Dunning-Kruger curve. The paper concludes with implications for tool design, assessment, and knowledge work.", "published": "2026-03-31T12:35:58Z", "authors": ["Christopher Koch"], "abs_url": "https://arxiv.org/abs/2603.29681v1", "pdf_url": "https://arxiv.org/pdf/2603.29681v1", "x": -8.538459777832031, "y": -8.650187492370605, "similar_indices": [183, 17, 10, 135, 116]}, {"index": 187, "arxiv_id": "2603.29678v2", "title": "View-oriented Conversation Compiler for Agent Trace Analysis", "summary": "Agent traces carry increasing analytical value in agentic systems and context engineering, yet most prior work treats conversation format as a trivial implementation detail. Modern agent conversations, however, contain deeply structured content, including nested tool calls and results, chain-of-thought reasoning blocks, sub-agent invocations, context-window compaction boundaries, and harness-injected system directives, whose complexity far exceeds that of simple user-assistant exchanges. Feeding such traces to a reflector or other analytical mechanism in plain text, JSON, YAML, or via grep can materially degrade analysis quality. This paper presents VCC (View-oriented Conversation Compiler), a compiler (lex, parse, IR, lower, emit) that transforms raw agent JSONL logs into a family of structured views: a full view (lossless transcript serving as the canonical line-number coordinate system), a user-interface (UI) view (reconstructing the interaction as the user actually perceived it), and an adaptive view (a structure-preserving projection governed by a relevance predicate). In a context-engineering experiment on AppWorld, replacing only the reflector's input format, from raw JSONL to VCC-compiled views, leads to higher pass rates across all three model configurations tested, while cutting reflector token consumption by half to two-thirds and producing more concise learned memory. These results suggest that message format functions as infrastructure for context engineering, not as an incidental implementation choice.", "published": "2026-03-31T12:33:49Z", "authors": ["Lvmin Zhang", "Maneesh Agrawala"], "abs_url": "https://arxiv.org/abs/2603.29678v2", "pdf_url": "https://arxiv.org/pdf/2603.29678v2", "x": 0.18552756309509277, "y": -5.367695331573486, "similar_indices": [102, 73, 118, 115, 171]}, {"index": 188, "arxiv_id": "2603.29677v1", "title": "Mind the Gap: A Framework for Assessing Pitfalls in Multimodal Active Learning", "summary": "Multimodal learning enables neural networks to integrate information from heterogeneous sources, but active learning in this setting faces distinct challenges. These include missing modalities, differences in modality difficulty, and varying interaction structures. These are issues absent in the unimodal case. While the behavior of active learning strategies in unimodal settings is well characterized, their behavior under such multimodal conditions remains poorly understood. We introduce a new framework for benchmarking multimodal active learning that isolates these pitfalls using synthetic datasets, allowing systematic evaluation without confounding noise. Using this framework, we compare unimodal and multimodal query strategies and validate our findings on two real-world datasets. Our results show that models consistently develop imbalanced representations, relying primarily on one modality while neglecting others. Existing query methods do not mitigate this effect, and multimodal strategies do not consistently outperform unimodal ones. These findings highlight limitations of current active learning methods and underline the need for modality-aware query strategies that explicitly address these pitfalls. Code and benchmark resources will be made publicly available.", "published": "2026-03-31T12:33:45Z", "authors": ["Dustin Eisenhardt", "Yunhee Jeong", "Florian Buettner"], "abs_url": "https://arxiv.org/abs/2603.29677v1", "pdf_url": "https://arxiv.org/pdf/2603.29677v1", "x": 3.7611472606658936, "y": 8.130034446716309, "similar_indices": [107, 80, 31, 124, 166]}, {"index": 189, "arxiv_id": "2603.29661v1", "title": "Agenda-based Narrative Extraction: Steering Pathfinding Algorithms with Large Language Models", "summary": "Existing narrative extraction methods face a trade-off between coherence, interactivity, and multi-storyline support. Narrative Maps supports rich interaction and generates multiple storylines as a byproduct of its coverage constraints, though this comes at the cost of individual path coherence. Narrative Trails achieves high coherence through maximum capacity path optimization but provides no mechanism for user guidance or multiple perspectives. We introduce agenda-based narrative extraction, a method that bridges this gap by integrating large language models into the Narrative Trails pathfinding process to steer storyline construction toward user-specified perspectives. Our approach uses an LLM at each step to rank candidate documents based on their alignment with a given agenda while maintaining narrative coherence. Running the algorithm with different agendas yields different storylines through the same corpus. We evaluated our approach on a news article corpus using LLM judges with Claude Opus 4.5 and GPT 5.1, measuring both coherence and agenda alignment across 64 endpoint pairs and 6 agendas. LLM-driven steering achieves 9.9% higher alignment than keyword matching on semantic agendas (p=0.017), with 13.3% improvement on \\textit{Regime Crackdown} specifically (p=0.037), while keyword matching remains competitive on agendas with literal keyword overlap. The coherence cost is minimal: LLM steering reduces coherence by only 2.2% compared to the agenda-agnostic baseline. Counter-agendas that contradict the source material score uniformly low (2.2-2.5) across all methods, confirming that steering cannot fabricate unsupported narratives.", "published": "2026-03-31T12:22:41Z", "authors": ["Brian Felipe Keith-Norambuena", "Carolina Inés Rojas-Córdova", "Claudio Juvenal Meneses-Villegas", "Elizabeth Johanna Lam-Esquenazi", "Angélica María Flores-Bustos", "Ignacio Alejandro Molina-Villablanca", "Joshua Emanuel Leyton-Vallejos"], "abs_url": "https://arxiv.org/abs/2603.29661v1", "pdf_url": "https://arxiv.org/pdf/2603.29661v1", "x": -0.8399805426597595, "y": 9.009369850158691, "similar_indices": [147, 192, 46, 31, 76]}, {"index": 190, "arxiv_id": "2603.29656v1", "title": "6GAgentGym: Tool Use, Data Synthesis, and Agentic Learning for Network Management", "summary": "Autonomous 6G network management requires agents that can execute tools, observe the resulting state changes, and adapt their decisions accordingly. Existing benchmarks based on static questions or scripted episode replay, however, do not support such closed-loop interaction, limiting agents to passive evaluation without the ability to learn from environmental feedback. This paper presents 6GAgentGym to provide closed-loop capability. The framework provides an interactive environment with 42 typed tools whose effect classification distinguishes read-only observation from state-mutating configuration, backed by a learned Experiment Model calibrated on NS-3 simulation data. 6G-Forge bootstraps closed-loop training trajectories from NS-3 seeds via iterative Self-Instruct generation with execution verification against the Experiment Model. Supervised fine-tuning on the resulting corpus followed by reinforcement learning with online closed-loop interaction enables an 8B open-source model to achieve comparable overall success rate to GPT-5 on the accompanying 6GAgentBench, with stronger performance on long-horizon tasks. Together, these components provide a viable path toward autonomous, closed-loop network management.", "published": "2026-03-31T12:21:00Z", "authors": ["Jiao Chen", "Jianhua Tang", "Xiaotong Yang", "Zuohong Lv"], "abs_url": "https://arxiv.org/abs/2603.29656v1", "pdf_url": "https://arxiv.org/pdf/2603.29656v1", "x": -6.024142265319824, "y": -1.7371193170547485, "similar_indices": [48, 161, 91, 30, 133]}, {"index": 191, "arxiv_id": "2603.29654v1", "title": "Concept frustration: Aligning human concepts and machine representations", "summary": "Aligning human-interpretable concepts with the internal representations learned by modern machine learning systems remains a central challenge for interpretable AI. We introduce a geometric framework for comparing supervised human concepts with unsupervised intermediate representations extracted from foundation model embeddings. Motivated by the role of conceptual leaps in scientific discovery, we formalise the notion of concept frustration: a contradiction that arises when an unobserved concept induces relationships between known concepts that cannot be made consistent within an existing ontology. We develop task-aligned similarity measures that detect concept frustration between supervised concept-based models and unsupervised representations derived from foundation models, and show that the phenomenon is detectable in task-aligned geometry while conventional Euclidean comparisons fail. Under a linear-Gaussian generative model we derive a closed-form expression for Bayes-optimal concept-based classifier accuracy, decomposing predictive signal into known-known, known-unknown and unknown-unknown contributions and identifying analytically where frustration affects performance. Experiments on synthetic data and real language and vision tasks demonstrate that frustration can be detected in foundation model representations and that incorporating a frustrating concept into an interpretable model reorganises the geometry of learned concept representations, to better align human and machine reasoning. These results suggest a principled framework for diagnosing incomplete concept ontologies and aligning human and machine conceptual reasoning, with implications for the development and validation of safe interpretable AI for high-risk applications.", "published": "2026-03-31T12:17:21Z", "authors": ["Enrico Parisini", "Christopher J. Soelistyo", "Ahab Isaac", "Alessandro Barp", "Christopher R. S. Banerji"], "abs_url": "https://arxiv.org/abs/2603.29654v1", "pdf_url": "https://arxiv.org/pdf/2603.29654v1", "x": 1.706199049949646, "y": 7.79152774810791, "similar_indices": [49, 139, 80, 113, 83]}, {"index": 192, "arxiv_id": "2603.29651v1", "title": "Semantic Interaction for Narrative Map Sensemaking: An Insight-based Evaluation", "summary": "Semantic interaction (SI) enables analysts to incorporate their cognitive processes into AI models through direct manipulation of visualizations. While SI frameworks for narrative extraction have been proposed, empirical evaluations of their effectiveness remain limited. This paper presents a user study that evaluates SI for narrative map sensemaking, involving 33 participants under three conditions: a timeline baseline, a basic narrative map, and an interactive narrative map with SI capabilities. The results show that the map-based prototypes yielded more insights than the timeline baseline, with the SI-enabled condition reaching statistical significance and the basic map condition trending in the same direction. The SI-enabled condition showed the highest mean performance; differences between the map conditions were not statistically significant but showed large effect sizes (d > 0.8), suggesting that the study was underpowered to detect them. Qualitative analysis identified two distinct SI approaches-corrective and additive-that enable analysts to impose quality judgments and organizational structure on extracted narratives. We also find that SI users achieved comparable exploration breadth with less parameter manipulation, suggesting that SI serves as an alternative pathway for model refinement. This work provides empirical evidence that map-based representations outperform timelines for narrative sensemaking, along with qualitative insights into how analysts use SI for narrative refinement.", "published": "2026-03-31T12:14:05Z", "authors": ["Brian Felipe Keith-Norambuena", "Fausto German", "Eric Krokos", "Sarah Joseph", "Chris North"], "abs_url": "https://arxiv.org/abs/2603.29651v1", "pdf_url": "https://arxiv.org/pdf/2603.29651v1", "x": -1.6722031831741333, "y": 9.074529647827148, "similar_indices": [147, 189, 163, 185, 187]}, {"index": 193, "arxiv_id": "2603.29643v1", "title": "Optimizing Donor Outreach for Blood Collection Sessions: A Scalable Decision Support Framework", "summary": "Blood donation centers face challenges in matching supply with demand while managing donor availability. Although targeted outreach is important, it can cause donor fatigue via over-solicitation. Effective recruitment requires targeting the right donors at the right time, balancing constraints with donor convenience and eligibility. Despite extensive work on blood supply chain optimization and growing interest in algorithmic donor recruitment, the operational problem of assigning donors to sessions across a multi-site network, taking into account eligibility, capacity, blood-type demand targets, geographic convenience, and donor safety, remains unaddressed.   We address this gap with an optimization framework for donor invitation scheduling incorporating donor eligibility, travel convenience, blood-type demand targets, and penalties. We evaluate two strategies: (i) a binary integer linear programming (BILP) formulation and (ii) an efficient greedy heuristic. Evaluation uses the registry from Instituto Português do Sangue e da Transplantação (IPST) for invite planning in the Lisbon operational region using 4-month windows. A prospective pipeline integrates organic attendance forecasting, quantile-based demand targets, and residual capacity estimation for forward-looking invitation plans. Results reveal its key role in closing the supply-demand gap in the Lisbon operational region. A controlled comparison shows that the greedy heuristic achieves results comparable to the BILP, with 188x less peak memory and 115x faster runtime; trade-offs include 3.9 pp lower demand fulfillment (86.1% vs. 90.0%), larger donor-session distance, higher adverse-reaction donor exposure, and greater invitation burden per non-high-frequency donor, reflecting local versus global optimization. Experiments assess how constraint-aware scheduling can close gaps by mobilizing eligible inactive/lapsing donors.", "published": "2026-03-31T12:05:27Z", "authors": ["André Carneiro", "Pedro T. Monteiro", "Rui Henriques"], "abs_url": "https://arxiv.org/abs/2603.29643v1", "pdf_url": "https://arxiv.org/pdf/2603.29643v1", "x": -12.302326202392578, "y": 0.8572077751159668, "similar_indices": [164, 52, 51, 43, 71]}, {"index": 194, "arxiv_id": "2603.29640v1", "title": "ASI-Evolve: AI Accelerates AI", "summary": "Can AI accelerate the development of AI itself? While recent agentic systems have shown strong performance on well-scoped tasks with rapid feedback, it remains unclear whether they can tackle the costly, long-horizon, and weakly supervised research loops that drive real AI progress. We present ASI-Evolve, an agentic framework for AI-for-AI research that closes this loop through a learn-design-experiment-analyze cycle. ASI-Evolve augments standard evolutionary agents with two key components: a cognition base that injects accumulated human priors into each round of exploration, and a dedicated analyzer that distills complex experimental outcomes into reusable insights for future iterations. To our knowledge, ASI-Evolve is the first unified framework to demonstrate AI-driven discovery across three central components of AI development: data, architectures, and learning algorithms. In neural architecture design, it discovered 105 SOTA linear attention architectures, with the best discovered model surpassing DeltaNet by +0.97 points, nearly 3x the gain of recent human-designed improvements. In pretraining data curation, the evolved pipeline improves average benchmark performance by +3.96 points, with gains exceeding 18 points on MMLU. In reinforcement learning algorithm design, discovered algorithms outperform GRPO by up to +12.5 points on AMC32, +11.67 points on AIME24, and +5.04 points on OlympiadBench. We further provide initial evidence that this AI-for-AI paradigm can transfer beyond the AI stack through experiments in mathematics and biomedicine. Together, these results suggest that ASI-Evolve represents a promising step toward enabling AI to accelerate AI across the foundational stages of development, offering early evidence for the feasibility of closed-loop AI research.", "published": "2026-03-31T12:04:17Z", "authors": ["Weixian Xu", "Tiantian Mi", "Yixiu Liu", "Yang Nan", "Zhimeng Zhou", "Lyumanshan Ye", "Lin Zhang", "Yu Qiao", "Pengfei Liu"], "abs_url": "https://arxiv.org/abs/2603.29640v1", "pdf_url": "https://arxiv.org/pdf/2603.29640v1", "x": -3.0644030570983887, "y": -2.231797695159912, "similar_indices": [30, 197, 48, 43, 39]}, {"index": 195, "arxiv_id": "2604.00067v1", "title": "Temporal Memory for Resource-Constrained Agents: Continual Learning via Stochastic Compress-Add-Smooth", "summary": "An agent that operates sequentially must incorporate new experience without forgetting old experience, under a fixed memory budget. We propose a framework in which memory is not a parameter vector but a stochastic process: a Bridge Diffusion on a replay interval $[0,1]$, whose terminal marginal encodes the present and whose intermediate marginals encode the past. New experience is incorporated via a three-step \\emph{Compress--Add--Smooth} (CAS) recursion. We test the framework on the class of models with marginal probability densities modeled via Gaussian mixtures of fixed number of components~$K$ in $d$ dimensions; temporal complexity is controlled by a fixed number~$L$ of piecewise-linear protocol segments whose nodes store Gaussian-mixture states. The entire recursion costs $O(LKd^2)$ flops per day -- no backpropagation, no stored data, no neural networks -- making it viable for controller-light hardware.   Forgetting in this framework arises not from parameter interference but from lossy temporal compression: the re-approximation of a finer protocol by a coarser one under a fixed segment budget. We find that the retention half-life scales linearly as $a_{1/2}\\approx c\\,L$ with a constant $c>1$ that depends on the dynamics but not on the mixture complexity~$K$, the dimension~$d$, or the geometry of the target family. The constant~$c$ admits an information-theoretic interpretation analogous to the Shannon channel capacity. The stochastic process underlying the bridge provides temporally coherent ``movie'' replay -- compressed narratives of the agent's history, demonstrated visually on an MNIST latent-space illustration. The framework provides a fully analytical ``Ising model'' of continual learning in which the mechanism, rate, and form of forgetting can be studied with mathematical precision.", "published": "2026-03-31T12:04:11Z", "authors": ["Michael Chertkov"], "abs_url": "https://arxiv.org/abs/2604.00067v1", "pdf_url": "https://arxiv.org/pdf/2604.00067v1", "x": -3.715765953063965, "y": 0.09031201899051666, "similar_indices": [134, 141, 37, 1, 122]}, {"index": 196, "arxiv_id": "2603.29634v1", "title": "MacTok: Robust Continuous Tokenization for Image Generation", "summary": "Continuous image tokenizers enable efficient visual generation, and those based on variational frameworks can learn smooth, structured latent representations through KL regularization. Yet this often leads to posterior collapse when using fewer tokens, where the encoder fails to encode informative features into the compressed latent space. To address this, we introduce \\textbf{MacTok}, a \\textbf{M}asked \\textbf{A}ugmenting 1D \\textbf{C}ontinuous \\textbf{Tok}enizer that leverages image masking and representation alignment to prevent collapse while learning compact and robust representations. MacTok applies both random masking to regularize latent learning and DINO-guided semantic masking to emphasize informative regions in images, forcing the model to encode robust semantics from incomplete visual evidence. Combined with global and local representation alignment, MacTok preserves rich discriminative information in a highly compressed 1D latent space, requiring only 64 or 128 tokens. On ImageNet, MacTok achieves a competitive gFID of 1.44 at 256$\\times$256 and a state-of-the-art 1.52 at 512$\\times$512 with SiT-XL, while reducing token usage by up to 64$\\times$. These results confirm that masking and semantic guidance together prevent posterior collapse and achieve efficient, high-fidelity tokenization.", "published": "2026-03-31T12:00:11Z", "authors": ["Hengyu Zeng", "Xin Gao", "Guanghao Li", "Yuxiang Yan", "Jiaoyang Ruan", "Junpeng Ma", "Haoyu Albert Wang", "Jian Pu"], "abs_url": "https://arxiv.org/abs/2603.29634v1", "pdf_url": "https://arxiv.org/pdf/2603.29634v1", "x": 6.55928897857666, "y": 6.377339839935303, "similar_indices": [45, 157, 88, 57, 41]}, {"index": 197, "arxiv_id": "2603.29632v1", "title": "An Empirical Study of Multi-Agent Collaboration for Automated Research", "summary": "As AI agents evolve, the community is rapidly shifting from single Large Language Models (LLMs) to Multi-Agent Systems (MAS) to overcome cognitive bottlenecks in automated research. However, the optimal multi-agent coordination framework for these autonomous agents remains largely unexplored. In this paper, we present a systematic empirical study investigating the comparative efficacy of distinct multi-agent structures for automated machine learning optimization. Utilizing a rigorously controlled, execution-based testbed equipped with Git worktree isolation and explicit global memory, we benchmark a single-agent baseline against two multi-agent paradigms: a subagent architecture (parallel exploration with post-hoc consolidation) and an agent team architecture (experts with pre-execution handoffs). By evaluating these systems under strictly fixed computational time budgets, our findings reveal a ruction-specific neural signatures emerging primarily at sentence-final positions, where argument structure becomes fully disambiguated, and most prominently in the alpha band. Pairwise classification showed reliable differentiation, especially between ditransitive and resultative constructions, while other pairs overlapped. Crucially, the temporal emergence and similarity structure of these effects mirror patterns in recurrent and transformer-based language models, where constructional representations arise during integrative processing stages. These findings support the view that linguistic constructions are neurally encoded as distinct form-meaning mappings, in line with Construction Grammar, and suggest convergence between biological and artificial systems on similar representational solutions. More broadly, this convergence is consistent with the idea that learning systems discover stable regions within an underlying representational landscape - recently termed a Platonic representational space - that constrains the emergence of efficient linguistic abstractions.", "published": "2026-03-31T11:37:50Z", "authors": ["Pegah Ramezani", "Thomas Kinfe", "Andreas Maier", "Achim Schilling", "Patrick Krauss"], "abs_url": "https://arxiv.org/abs/2603.29617v1", "pdf_url": "https://arxiv.org/pdf/2603.29617v1", "x": -4.618208408355713, "y": 9.433512687683105, "similar_indices": [178, 6, 90, 46, 152]}, {"index": 199, "arxiv_id": "2603.29570v1", "title": "Generating Key Postures of Bharatanatyam Adavus with Pose Estimation", "summary": "Preserving intangible cultural dances rooted in centuries of tradition and governed by strict structural and symbolic rules presents unique challenges in the digital era. Among these, Bharatanatyam, a classical Indian dance form, stands out for its emphasis on codified adavus and precise key postures. Accurately generating these postures is crucial not only for maintaining anatomical and stylistic integrity, but also for enabling effective docum
