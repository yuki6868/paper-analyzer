"arxiv_id": "2604.00171v1", "title": "Unified Architecture Metamodel of Information Systems Developed by Generative AI", "summary": "The rapid development of AI and LLMs has driven new methods of SDLC, in which a large portion of code, technical, and business documentation is generated automatically. However, since there is no single architectural framework that can provide consistent, repeatable transformations across different representation layers of information systems, such systems remain fragmented in their system representation. This study explores the problem of creating a unified architecture for LLM-oriented applications based on selected architectural frameworks by SMEs. A framework structure is proposed that covers some key types of architectural diagrams and supports a closed cycle of transformations, such as: \"Code to Documentation to Code\". The key architectural diagrams are split equally between main architectural layers: high-layer (business and domain understanding), middle-layer (system architecture), and low-layer (developer-layer architecture). Each architectural layer still contains some abstraction layers, which make it more flexible and better fit the requirements of design principles and architectural patterns. The conducted experiments demonstrated the stable quality of generated documentation and code when using a structured architectural context in the form of architectural diagrams. The results confirm that the proposed unified architecture metamodel can serve as an effective interface between humans and models, improving the accuracy, stability, and repeatability of LLM generation. However, the selected set of architectural diagrams should be optimised to avoid redundancy between some diagrams, and some diagrams should be updated to represent extra contextual orchestration. This work demonstrates measurable improvements for a new generation of intelligent tools that automate the SDLC and enable a comprehensive architecture compatible with AI-driven development.", "published": "2026-03-31T19:22:15Z", "authors": ["Oleg Grynets", "Vasyl Lyashkevych"], "abs_url": "https://arxiv.org/abs/2604.00171v1", "pdf_url": "https://arxiv.org/pdf/2604.00171v1", "x": 0.045358531177043915, "y": -11.298891067504883, "similar_indices": [171, 74, 112, 125, 187]}, {"index": 130, "arxiv_id": "2604.00168v1", "title": "Neural-Assisted in-Motion Self-Heading Alignment", "summary": "Autonomous platforms operating in the oceans require accurate navigation to successfully complete their mission. In this regard, the initial heading estimation accuracy and the time required to achieve it play a critical role. The initial heading is traditionally estimated by model-based approaches employing orientation decomposition. However, methods such as the dual vector decomposition and optimized attitude decomposition achieve satisfactory heading accuracy only after long alignment times. To allow rapid and accurate initial heading estimation, we propose an end-to-end, model-free, neural-assisted framework using the same inputs as the model-based approaches. Our proposed approach was trained and evaluated on real-world dataset captured by an autonomous surface vehicle. Our approach shows a significant accuracy improvement over the model-based approaches achieving an average absolute error improvement of 53%. Additionally, our proposed approach was able to reduce the alignment time by up to 67%. Thus, by employing our proposed approach, the reduction in alignment time and improved accuracy allow for a shorter deployment time of an autonomous platform and increased navigation accuracy during the mission.", "published": "2026-03-31T19:16:56Z", "authors": ["Zeev Yampolsky", "Felipe O. Silva", "Adriano Frutuoso", "Itzik Klein"], "abs_url": "https://arxiv.org/abs/2604.00168v1", "pdf_url": "https://arxiv.org/pdf/2604.00168v1", "x": 6.207858085632324, "y": 0.722926139831543, "similar_indices": [50, 96, 94, 77, 2]}, {"index": 131, "arxiv_id": "2604.00167v1", "title": "A Study on the Impact of Fault localization Granularity for Repository-Scale Code Repair Tasks", "summary": "Automatic program repair can be a challenging task, especially when resolving complex issues at a repository-level, which often involves issue reproduction, fault localization, code repair, testing and validation. Issues of this scale can be commonly found in popular GitHub repositories or datasets that are derived from them.   Some repository-level approaches separate localization and repair into distinct phases. Where this is the case, the fault localization approaches vary in terms of the granularity of localization. Where the impact of granularity is explored to some degree for smaller datasets, not all isolate this issue from the separate question of localization accuracy by testing code repair under the assumption of perfect fault localization. To the best of the authors' knowledge, no repository-scale studies have explicitly investigated granularity under this assumption, nor conducted a systematic empirical comparison of granularity levels in isolation.   We propose a framework for performing such tests by modifying the localization phase of the Agentless framework to retrieve ground-truth localization data and include this as context in the prompt fed to the repair phase. We show that under this configuration and as a generalization over the SWE-Bench-Mini dataset, function-level granularity yields the highest repair rate against line-level and file-level. However, a deeper dive suggests that the ideal granularity may in fact be task dependent.   This study is not intended to improve on the state-of-the-art, nor do we intend for results to be compared against any complete agentic frameworks. Rather, we present a proof of concept for investigating how fault localization may impact automatic code repair in repository-scale scenarios. We present preliminary findings to this end and encourage further research into this relationship between the two phases.", "published": "2026-03-31T19:16:43Z", "authors": ["Joseph Townsend", "Chandresh Pravin", "Kwun Ho Ngan", "Matthieu Parizy"], "abs_url": "https://arxiv.org/abs/2604.00167v1", "pdf_url": "https://arxiv.org/pdf/2604.00167v1", "x": -1.9634647369384766, "y": -10.890547752380371, "similar_indices": [42, 133, 99, 69, 54]}, {"index": 132, "arxiv_id": "2604.00163v1", "title": "Epileptic Seizure Detection in Separate Frequency Bands Using Feature Analysis and Graph Convolutional Neural Network (GCN) from Electroencephalogram (EEG) Signals", "summary": "Epileptic seizures are neurological disorders characterized by abnormal and excessive electrical activity in the brain, resulting in recurrent seizure events. Electroencephalogram (EEG) signals are widely used for seizure diagnosis due to their ability to capture temporal and spatial neural dynamics. While recent deep learning methods have achieved high detection accuracy, they often lack interpretability and neurophysiological relevance. This study presents a frequency-aware framework for epileptic seizure detection based on ictal-phase EEG analysis. The raw EEG signals are decomposed into five frequency bands (delta, theta, alpha, lower beta, and higher beta), and eleven discriminative features are extracted from each band. A graph convolutional neural network (GCN) is then employed to model spatial dependencies among EEG electrodes, represented as graph nodes. Experiments on the CHB-MIT scalp EEG dataset demonstrate high detection performance, achieving accuracies of 97.1%, 97.13%, 99.5%, 99.7%, and 51.4% across the respective frequency bands, with an overall broadband accuracy of 99.01%. The results highlight the strong discriminative capability of mid-frequency bands and reveal frequency-specific seizure patterns. The proposed approach improves interpretability and diagnostic precision compared to conventional broadband EEG-based methods.", "published": "2026-03-31T19:11:16Z", "authors": ["Ferdaus Anam Jibon", "Fazlul Hasan Siddiqui", "F. Deeba", "Gahangir Hossain"], "abs_url": "https://arxiv.org/abs/2604.00163v1", "pdf_url": "https://arxiv.org/pdf/2604.00163v1", "x": 6.398514747619629, "y": 12.781953811645508, "similar_indices": [78, 98, 198, 168, 97]}, {"index": 133, "arxiv_id": "2604.00137v1", "title": "Open, Reliable, and Collective: A Community-Driven Framework for Tool-Using AI Agents", "summary": "Tool-integrated LLMs can retrieve, compute, and take real-world actions via external tools, but reliability remains a key bottleneck. We argue that failures stem from both tool-use accuracy (how well an agent invokes a tool) and intrinsic tool accuracy (the tool's own correctness), while most prior work emphasizes the former. We introduce OpenTools, a community-driven toolbox that standardizes tool schemas, provides lightweight plug-and-play wrappers, and evaluates tools with automated test suites and continuous monitoring. We also release a public web demo where users can run predefined agents and tools and contribute test cases, enabling reliability reports to evolve as tools change. OpenTools includes the core framework, an initial tool set, evaluation pipelines, and a contribution protocol. Experiments and evaluations show improved end-to-end reproducibility and task performance; community-contributed, higher-quality task-specific tools deliver 6%-22% relative gains over an existing toolbox across multiple agent architectures on downstream tasks and benchmarks, highlighting the importance of intrinsic tool accuracy.", "published": "2026-03-31T18:42:36Z", "authors": ["Hy Dang", "Quang Dao", "Meng Jiang"], "abs_url": "https://arxiv.org/abs/2604.00137v1", "pdf_url": "https://arxiv.org/pdf/2604.00137v1", "x": -2.1172425746917725, "y": -9.226836204528809, "similar_indices": [99, 42, 69, 0, 64]}, {"index": 134, "arxiv_id": "2604.00131v1", "title": "Oblivion: Self-Adaptive Agentic Memory Control through Decay-Driven Activation", "summary": "Human memory adapts through selective forgetting: experiences become less accessible over time but can be reactivated by reinforcement or contextual cues. In contrast, memory-augmented LLM agents rely on \"always-on\" retrieval and \"flat\" memory storage, causing high interference and latency as histories grow. We introduce Oblivion, a memory control framework that casts forgetting as decay-driven reductions in accessibility, not explicit deletion. Oblivion decouples memory control into read and write paths. The read path decides when to consult memory, based on agent uncertainty and memory buffer sufficiency, avoiding redundant always-on access. The write path decides what to strengthen, by reinforcing memories contributing to forming the response. Together, this enables hierarchical memory organization that maintains persistent high-level strategies while dynamically loading details as needed. We evaluate on both static and dynamic long-horizon interaction benchmarks. Results show that Oblivion dynamically adapts memory access and reinforcement, balancing learning and forgetting under shifting contexts, highlighting that memory control is essential for effective LLM-agentic reasoning. The source code is available at https://github.com/nec-research/oblivion.", "published": "2026-03-31T18:37:35Z", "authors": ["Ashish Rana", "Chia-Chien Hung", "Qumeng Sun", "Julian Martin Kunkel", "Carolin Lawrence"], "abs_url": "https://arxiv.org/abs/2604.00131v1", "pdf_url": "https://arxiv.org/pdf/2604.00131v1", "x": -3.050091505050659, "y": -0.47598588466644287, "similar_indices": [30, 195, 71, 43, 0]}, {"index": 135, "arxiv_id": "2604.00120v1", "title": "From Domain Understanding to Design Readiness: a playbook for GenAI-supported learning in Software Engineering", "summary": "Software engineering courses often require rapid upskilling in supporting knowledge areas such as domain understanding and modeling methods. We report an experience from a two-week milestone in a master's course where 29 students used a customized ChatGPT (GPT-3.5) tutor grounded in a curated course knowledge base to learn cryptocurrency-finance basics and Domain-Driven Design (DDD). We logged all interactions and evaluated a 34.5% random sample of prompt-answer pairs (60/~174) with a five-dimension rubric (accuracy, relevance, pedagogical value, cognitive load, supportiveness), and we collected pre/post self-efficacy. Responses were consistently accurate and relevant in this setting: accuracy averaged 98.9% with no factual errors and only 2/60 minor inaccuracies, and relevance averaged 92.2%. Pedagogical value was high (89.4%) with generally appropriate cognitive load (82.78%), but supportiveness was low (37.78%). Students reported large pre-post self-efficacy gains for genAI-assisted domain learning and DDD application. From these observations we distill seventeen concrete teaching practices spanning prompt/configuration and course/workflow design (e.g., setting expected granularity, constraining verbosity, curating guardrail examples, adding small credit with a simple quality rubric). Within this single-course context, results suggest that genAI-supported learning can complement instruction in domain understanding and modeling tasks, while leaving room to improve tone and follow-up structure.", "published": "2026-03-31T18:27:42Z", "authors": ["Rafal Wlodarski"], "abs_url": "https://arxiv.org/abs/2604.00120v1", "pdf_url": "https://arxiv.org/pdf/2604.00120v1", "x": -9.63049030303955, "y": -7.671328544616699, "similar_indices": [17, 186, 60, 111, 39]}, {"index": 136, "arxiv_id": "2604.00086v1", "title": "Hierarchical Pre-Training of Vision Encoders with Large Language Models", "summary": "The field of computer vision has experienced significant advancements through scalable vision encoders and multimodal pre-training frameworks. However, existing approaches often treat vision encoders and large language models (LLMs) as independent modules, limiting the integration of hierarchical visual features. In this work, we propose HIVE (Hierarchical Pre-Training of Vision Encoders), a novel framework that enhances vision-language alignment by introducing hierarchical cross-attention between the vision encoder and LLM. Unlike conventional methods that flatten image embeddings, HIVE enables structured feature fusion across multiple layers, improving gradient flow and representation learning. To optimize this interaction, we introduce a three-stage training strategy that progressively aligns the vision encoder with the LLM, ensuring stable optimization and effective multimodal fusion. Empirical evaluations demonstrate that HIVE achieves superior performance not only in image classification but also on various vision-language tasks, outperforming self-attention-based methods in benchmarks such as MME, GQA, OK-VQA, and ScienceQA. Our results highlight the benefits of hierarchical feature integration, paving the way for more efficient and expressive vision-language models.", "published": "2026-03-31T18:00:39Z", "authors": ["Eugene Lee", "Ting-Yu Chang", "Jui-Huang Tsai", "Jiajie Diao", "Chen-Yi Lee"], "abs_url": "https://arxiv.org/abs/2604.00086v1", "pdf_url": "https://arxiv.org/pdf/2604.00086v1", "x": 4.699377536773682, "y": 5.978451728820801, "similar_indices": [57, 41, 88, 16, 80]}, {"index": 137, "arxiv_id": "2604.00085v1", "title": "One Panel Does Not Fit All: Case-Adaptive Multi-Agent Deliberation for Clinical Prediction", "summary": "Large language models applied to clinical prediction exhibit case-level heterogeneity: simple cases yield consistent outputs, while complex cases produce divergent predictions under minor prompt changes. Existing single-agent strategies sample from one role-conditioned distribution, and multi-agent frameworks use fixed roles with flat majority voting, discarding the diagnostic signal in disagreement. We propose CAMP (Case-Adaptive Multi-agent Panel), where an attending-physician agent dynamically assembles a specialist panel tailored to each case's diagnostic uncertainty. Each specialist evaluates candidates via three-valued voting (KEEP/REFUSE/NEUTRAL), enabling principled abstention outside one's expertise. A hybrid router directs each diagnosis through strong consensus, fallback to the attending physician's judgment, or evidence-based arbitration that weighs argument quality over vote counts. On diagnostic prediction and brief hospital course generation from MIMIC-IV across four LLM backbones, CAMP consistently outperforms strong baselines while consuming fewer tokens than most competing multi-agent methods, with voting records and arbitration traces offering transparent decision audits.", "published": "2026-03-31T18:00:34Z", "authors": ["Yuxing Lu", "Yushuhong Lin", "Jason Zhang"], "abs_url": "https://arxiv.org/abs/2604.00085v1", "pdf_url": "https://arxiv.org/pdf/2604.00085v1", "x": -2.3847858905792236, "y": -6.219534873962402, "similar_indices": [118, 86, 181, 71, 108]}, {"index": 138, "arxiv_id": "2603.30040v1", "title": "Automatic Identification of Parallelizable Loops Using Transformer-Based Source Code Representations", "summary": "Automatic parallelization remains a challenging problem in software engineering, particularly in identifying code regions where loops can be safely executed in parallel on modern multi-core architectures. Traditional static analysis techniques, such as dependence analysis and polyhedral models, often struggle with irregular or dynamically structured code. In this work, we propose a Transformer-based approach to classify the parallelization potential of source code, focusing on distinguishing independent (parallelizable) loops from undefined ones. We adopt DistilBERT to process source code sequences using subword tokenization, enabling the model to capture contextual syntactic and semantic patterns without handcrafted features. The approach is evaluated on a balanced dataset combining synthetically generated loops and manually annotated real-world code, using 10-fold cross-validation and multiple performance metrics. Results show consistently high performance, with mean accuracy above 99\\% and low false positive rates, demonstrating robustness and reliability. Compared to prior token-based methods, the proposed approach simplifies preprocessing while improving generalization and maintaining computational efficiency. These findings highlight the potential of lightweight Transformer models for practical identification of parallelization opportunities at the loop level.", "published": "2026-03-31T17:54:27Z", "authors": ["Izavan dos S. Correia", "Henrique C. T. Santos", "Tiago A. E. Ferreira"], "abs_url": "https://arxiv.org/abs/2603.30040v1", "pdf_url": "https://arxiv.org/pdf/2603.30040v1", "x": -2.5482828617095947, "y": -13.130090713500977, "similar_indices": [84, 62, 99, 24, 22]}, {"index": 139, "arxiv_id": "2603.30036v1", "title": "Aligned, Orthogonal or In-conflict: When can we safely optimize Chain-of-Thought?", "summary": "Chain-of-Thought (CoT) monitoring, in which automated systems monitor the CoT of an LLM, is a promising approach for effectively overseeing AI systems. However, the extent to which a model's CoT helps us oversee the model - the monitorability of the CoT - can be affected by training, for instance by the model learning to hide important features of its reasoning. We propose and empirically validate a conceptual framework for predicting when and why this occurs. We model LLM post-training as an RL environment where the reward decomposes into two terms: one term depending on final outputs and another term depending on the CoT. Our framework allows us to classify these two terms as \"aligned\", \"orthogonal\", or \"in-conflict\" before training. We predict that training with in-conflict terms will reduce monitorability, orthogonal terms will not affect it, and aligned terms will improve it. To validate our framework, we use it to classify a set of RL environments, train LLMs within those environments, and evaluate how training affects CoT monitorability. We find that (1) training with \"in-conflict\" reward terms reduces CoT monitorability and (2) optimizing in-conflict reward terms is difficult.", "published": "2026-03-31T17:38:39Z", "authors": ["Max Kaufmann", "David Lindner", "Roland S. Zimmermann", "and Rohin Shah"], "abs_url": "https://arxiv.org/abs/2603.30036v1", "pdf_url": "https://arxiv.org/pdf/2603.30036v1", "x": -6.29034423828125, "y": -3.2833619117736816, "similar_indices": [91, 48, 95, 10, 65]}, {"index": 140, "arxiv_id": "2603.30033v1", "title": "Tucker Attention: A generalization of approximate attention mechanisms", "summary": "The pursuit of reducing the memory footprint of the self-attention mechanism in multi-headed self attention (MHA) spawned a rich portfolio of methods, e.g., group-query attention (GQA) and multi-head latent attention (MLA). The methods leverage specialized low-rank factorizations across embedding dimensions or attention heads. From the point of view of classical low-rank approximation, these methods are unconventional and raise questions of which objects they really approximate and how to interpret the low-rank behavior of the resulting representations. To answer these questions, this work proposes a generalized view on the weight objects in the self-attention layer and a factorization strategy, which allows us to construct a parameter efficient scheme, called Tucker Attention. Tucker Attention requires an order of magnitude fewer parameters for comparable validation metrics, compared to GQA and MLA, as evaluated in LLM and ViT test cases. Additionally, Tucker Attention~encompasses GQA, MLA, MHA as special cases and is fully compatible with flash-attention and rotary position embeddings (RoPE). This generalization strategy yields insights of the actual ranks achieved by MHA, GQA, and MLA, and further enables simplifications for MLA.", "published": "2026-03-31T17:30:51Z", "authors": ["Timon Klein", "Jonas Kusch", "Sebastian Sager", "Stefan Schnake", "Steffen Schotthöfer"], "abs_url": "https://arxiv.org/abs/2603.30033v1", "pdf_url": "https://arxiv.org/pdf/2603.30033v1", "x": 1.8008339405059814, "y": 5.74355936050415, "similar_indices": [57, 9, 124, 69, 70]}, {"index": 141, "arxiv_id": "2603.30031v2", "title": "Cognitive Friction: A Decision-Theoretic Framework for Bounded Deliberation in Tool-Using Agents", "summary": "Autonomous tool-using agents operating in networked environments must decide which information source to query and when to stop querying and act. Without principled bounds on information-acquisition costs, unconstrained agents exhibit systematic failure modes: excessive tool use under congestion, prolonged deliberation under time decay, and brittle behavior under ambiguous evidence. We propose the Triadic Cognitive Architecture (TCA), a unified decision-theoretic framework that formalizes these failure modes through the concept of Cognitive Friction. By synthesizing nonlinear filtering theory, congestion-dependent cost dynamics, and HJB optimal stopping, we model deliberation as a stochastic control problem over a joint belief-congestion state space, where information acquisition is explicitly priced by tool-dependent signal quality and live network load. Rather than relying on arbitrary heuristic stop-tokens or fixed query budgets, TCA derives an HJB-inspired stopping boundary and instantiates a computable rollout-based approximation of belief-dependent value-of-information with a net-utility halting condition. We validate the framework on two controlled simulation environments, the Emergency Medical Diagnostic Grid (EMDG) and the Network Security Triage Grid (NSTG), designed to isolate key decision-theoretic quantities under reproducible conditions. TCA reduces time-to-action while improving resource outcomes without degrading accuracy: over greedy baselines, TCA gains 36 viability points in EMDG and 33 integrity points in NSTG. Ablations confirm joint optimization of selection and stopping is essential; stopping rules alone recover at most 4 viability points. A sensitivity sweep over alpha, beta, lambda_S shows stable accuracy and interpretable tradeoffs; an empirical sweep over eta in {0, 0.1, 0.3, 0.5} confirms eta=0 is optimal on EMDG trajectories under high temporal urgency.", "published": "2026-03-31T17:30:25Z", "authors": ["Davide Di Gioia"], "abs_url": "https://arxiv.org/abs/2603.30031v2", "pdf_url": "https://arxiv.org/pdf/2603.30031v2", "x": -4.380683898925781, "y": -0.40680021047592163, "similar_indices": [105, 195, 95, 102, 61]}, {"index": 142, "arxiv_id": "2604.00081v1", "title": "Beyond Symbolic Control: Societal Consequences of AI-Driven Workforce Displacement and the Imperative for Genuine Human Oversight Architectures", "summary": "The accelerating displacement of human labor by artificial intelligence (AI) and robotic systems represents a structural transformation whose societal consequences extend far beyond conventional labor market analysis. This paper presents a systematic multi-domain examination of the likely effects on economic structure, psychological well-being, political stability, education, healthcare, and geopolitical order. We identify a critical and underexamined dimension of this transition: the governance gap between nominal human oversight of AI systems -- where humans occupy positions of formal authority over AI decisions -- and genuine human oversight, where those humans possess the cognitive access, technical capability, and institutional authority to meaningfully understand, evaluate, and override AI outputs. We argue that this distinction, largely absent from current governance frameworks including the EU AI Act and NIST AI Risk Management Framework 1.0, represents the primary architectural failure mode in deployed AI governance. The societal consequences of labor displacement intensify this problem by concentrating consequential AI decision-making among an increasingly narrow class of technical and capital actors. We propose five architectural requirements for genuine human oversight systems and characterize the governance window -- estimated at 10-15 years -- before current deployment trajectories risk path-dependent social, economic, and institutional lock-in.", "published": "2026-03-31T17:25:44Z", "authors": ["Richard J. Mitchell"], "abs_url": "https://arxiv.org/abs/2604.00081v1", "pdf_url": "https://arxiv.org/pdf/2604.00081v1", "x": 2.5955188274383545, "y": -13.076892852783203, "similar_indices": [154, 127, 54, 72, 183]}, {"index": 143, "arxiv_id": "2603.30022v1", "title": "Hybrid Framework for Robotic Manipulation: Integrating Reinforcement Learning and Large Language Models", "summary": "This paper introduces a new hybrid framework that combines Reinforcement Learning (RL) and Large Language Models (LLMs) to improve robotic manipulation tasks. By utilizing RL for accurate low-level control and LLMs for high level task planning and understanding of natural language, the proposed framework effectively connects low-level execution with high-level reasoning in robotic systems. This integration allows robots to understand and carry out complex, human-like instructions while adapting to changing environments in real time. The framework is tested in a PyBullet-based simulation environment using the Franka Emika Panda robotic arm, with various manipulation scenarios as benchmarks. The results show a 33.5% decrease in task completion time and enhancements of 18.1% and 36.4% in accuracy and adaptability, respectively, when compared to systems that use only RL. These results underscore the potential of LLM-enhanced robotic systems for practical applications, making them more efficient, adaptable, and capable of interacting with humans. Future research will aim to explore sim-to-real transfer, scalability, and multi-robot systems to further broaden the framework's applicability.", "published": "2026-03-31T17:19:34Z", "authors": ["Md Saad", "Sajjad Hussain", "Mohd Suhaib"], "abs_url": "https://arxiv.org/abs/2603.30022v1", "pdf_url": "https://arxiv.org/pdf/2603.30022v1", "x": -8.247520446777344, "y": -1.6463894844055176, "similar_indices": [166, 161, 37, 91, 53]}, {"index": 144, "arxiv_id": "2603.30016v1", "title": "Architecting Secure AI Agents: Perspectives on System-Level Defenses Against Indirect Prompt Injection Attacks", "summary": "AI agents, predominantly powered by large language models (LLMs), are vulnerable to indirect prompt injection, in which malicious instructions embedded in untrusted data can trigger dangerous agent actions. This position paper discusses our vision for system-level defenses against indirect prompt injection attacks. We articulate three positions: (1) dynamic replanning and security policy updates are often necessary for dynamic tasks and realistic environments; (2) certain context-dependent security decisions would still require LLMs (or other learned models), but should only be made within system designs that strictly constrain what the model can observe and decide; (3) in inherently ambiguous cases, personalization and human interaction should be treated as core design considerations. In addition to our main positions, we discuss limitations of existing benchmarks that can create a false sense of utility and security. We also highlight the value of system-level defenses, which serve as the skeleton of agentic systems by structuring and controlling agent behaviors, integrating rule-based and model-based security checks, and enabling more targeted research on model robustness and human interaction.", "published": "2026-03-31T17:15:46Z", "authors": ["Chong Xiang", "Drew Zagieboylo", "Shaona Ghosh", "Sanjay Kariyappa", "Kai Greshake", "Hanshen Xiao", "Chaowei Xiao", "G. Edward Suh"], "abs_url": "https://arxiv.org/abs/2603.30016v1", "pdf_url": "https://arxiv.org/pdf/2603.30016v1", "x": 3.262265205383301, "y": -6.658827781677246, "similar_indices": [24, 64, 85, 107, 56]}, {"index": 145, "arxiv_id": "2603.30014v1", "title": "Scalable AI-assisted Workflow Management for Detector Design Optimization Using Distributed Computing", "summary": "The Production and Distributed Analysis (PanDA) system, originally developed for the ATLAS experiment at the CERN Large Hadron Collider (LHC), has evolved into a robust platform for orchestrating large-scale workflows across distributed computing resources. Coupled with its intelligent Distributed Dispatch and Scheduling (iDDS) component, PanDA supports AI/ML-driven workflows through a scalable and flexible workflow engine.   We present an AI-assisted framework for detector design optimization that integrates multi-objective Bayesian optimization with the PanDA--iDDS workflow engine to coordinate iterative simulations across heterogeneous resources. The framework addresses the challenge of exploring high-dimensional parameter spaces inherent in modern detector design.   We demonstrate the framework using benchmark problems and realistic studies of the ePIC and dRICH detectors for the Electron-Ion Collider (EIC). Results show improved automation, scalability, and efficiency in multi-objective optimization. This work establishes a flexible and extensible paradigm for AI-driven detector design and other computationally intensive scientific applications.", "published": "2026-03-31T17:11:16Z", "authors": ["Derek Anderson", "Amit Bashyal", "Markus Diefenthaler", "Cristiano Fanelli", "Wen Guan", "Tanja Horn", "Alex Jentsch Meifeng Lin", "Tadashi Maeno", "Kei Nagai", "Hemalata Nayak", "Connor Pecar", "Karthik Suresh", "Fang-Ying Tsai", "Anselm Vossen", "Tianle Wang", "Torre Wenaus"], "abs_url": "https://arxiv.org/abs/2603.30014v1", "pdf_url": "https://arxiv.org/pdf/2603.30014v1", "x": -8.655989646911621, "y": 4.748768329620361, "similar_indices": [73, 179, 146, 55, 91]}, {"index": 146, "arxiv_id": "2603.29999v1", "title": "Phyelds: A Pythonic Framework for Aggregate Computing", "summary": "Aggregate programming is a field-based coordination paradigm with over a decade of exploration and successful applications across domains including sensor networks, robotics, and IoT, with implementations in various programming languages, such as Protelis, ScaFi (Scala), and FCPP (C++). A recent research direction integrates machine learning with aggregate computing, aiming to support large-scale distributed learning and provide new abstractions for implementing learning algorithms. However, existing implementations do not target data science practitioners, who predominantly work in Python--the de facto language for data science and machine learning, with a rich and mature ecosystem. Python also offers advantages for other use cases, such as education and robotics (e.g., via ROS). To address this gap, we present Phyelds, a Python library for aggregate programming. Phyelds offers a fully featured yet lightweight implementation of the field calculus model of computation, featuring a Pythonic API and an architecture designed for seamless integration with Python's machine learning ecosystem. We describe the design and implementation of Phyelds and illustrate its versatility across domains, from well-known aggregate computing patterns to federated learning coordination and integration with a widely used multi-agent reinforcement learning simulator.", "published": "2026-03-31T16:57:32Z", "authors": ["Gianluca Aguzzi", "Davide Domini", "Nicolas Farabegoli", "Mirko Viroli"], "abs_url": "https://arxiv.org/abs/2603.29999v1", "pdf_url": "https://arxiv.org/pdf/2603.29999v1", "x": -7.66096830368042, "y": 3.52553129196167, "similar_indices": [68, 91, 73, 143, 7]}, {"index": 147, "arxiv_id": "2603.29997v1", "title": "Enhancing Structural Mapping with LLM-derived Abstractions for Analogical Reasoning in Narratives", "summary": "Analogical reasoning is a key driver of human generalization in problem-solving and argumentation. Yet, analogies between narrative structures remain challenging for machines. Cognitive engines for structural mapping are not directly applicable, as they assume pre-extracted entities, whereas LLMs' performance is sensitive to prompt format and the degree of surface similarity between narratives. This gap motivates a key question: What is the impact of enhancing structural mapping with LLM-derived abstractions on their analogical reasoning ability in narratives? To that end, we propose a modular framework named YARN (Yielding Abstractions for Reasoning in Narratives), which uses LLMs to decompose narratives into units, abstract these units, and then passes them to a mapping component that aligns elements across stories to perform analogical reasoning. We define and operationalize four levels of abstraction that capture both the general meaning of units and their roles in the story, grounded in prior work on framing. Our experiments reveal that abstractions consistently improve model performance, resulting in competitive or better performance than end-to-end LLM baselines. Closer error analysis reveals the remaining challenges in abstraction at the right level, in incorporating implicit causality, and an emerging categorization of analogical patterns in narratives. YARN enables systematic variation of experimental settings to analyze component contributions, and to support future work, we make the code for YARN openly available.", "published": "2026-03-31T16:57:11Z", "authors": ["Mohammadhossein Khojasteh", "Yifan Jiang", "Stefano De Giorgis", "Frank van Harmelen", "Filip Ilievski"], "abs_url": "https://arxiv.org/abs/2603.29997v1", "pdf_url": "https://arxiv.org/pdf/2603.29997v1", "x": -1.6865941286087036, "y": 8.972681999206543, "similar_indices": [192, 189, 44, 6, 163]}, {"index": 148, "arxiv_id": "2603.29993v1", "title": "Extending MONA in Camera Dropbox: Reproduction, Learned Approval, and Design Implications for Reward-Hacking Mitigation", "summary": "Myopic Optimization with Non-myopic Approval (MONA) mitigates multi-step reward hacking by restricting the agent's planning horizon while supplying far-sighted approval as a training signal~\\cite{farquhar2025mona}. The original paper identifies a critical open question: how the method of constructing approval -- particularly the degree to which approval depends on achieved outcomes -- affects whether MONA's safety guarantees hold. We present a reproduction-first extension of the public MONA Camera Dropbox environment that (i)~repackages the released codebase as a standard Python project with scripted PPO training, (ii)~confirms the published contrast between ordinary RL (91.5\\% reward-hacking rate) and oracle MONA (0.0\\% hacking rate) using the released reference arrays, and (iii)~introduces a modular learned-approval suite spanning oracle, noisy, misspecified, learned, and calibrated approval mechanisms. In reduced-budget pilot sweeps across approval methods, horizons, dataset sizes, and calibration strategies, the best calibrated learned-overseer run achieves zero observed reward hacking but substantially lower intended-behavior rates than oracle MONA (11.9\\% vs.\\ 99.9\\%), consistent with under-optimization rather than re-emergent hacking. These results operationalize the MONA paper's approval-spectrum conjecture as a runnable experimental object and suggest that the central engineering challenge shifts from proving MONA's concept to building learned approval models that preserve sufficient foresight without reopening reward-hacking channels. Code, configurations, and reproduction commands are publicly available. https://github.com/codernate92/mona-camera-dropbox-repro", "published": "2026-03-31T16:56:10Z", "authors": ["Nathan Heath"], "abs_url": "https://arxiv.org/abs/2603.29993v1", "pdf_url": "https://arxiv.org/pdf/2603.29993v1", "x": -5.773502826690674, "y": 0.07584033906459808, "similar_indices": [91, 85, 10, 24, 22]}, {"index": 149, "arxiv_id": "2603.29977v1", "title": "Quantifying Cross-Modal Interactions in Multimodal Glioma Survival Prediction via InterSHAP: Evidence for Additive Signal Integration", "summary": "Multimodal deep learning for cancer prognosis is commonly assumed to benefit from synergistic cross-modal interactions, yet this assumption has not been directly tested in survival prediction settings. This work adapts InterSHAP, a Shapley interaction index-based metric, from classification to Cox proportional hazards models and applies it to quantify cross-modal interactions in glioma survival prediction. Using TCGA-GBM and TCGA-LGG data (n=575), we evaluate four fusion architectures combining whole-slide image (WSI) and RNA-seq features. Our central finding is an inverse relationship between predictive performance and measured interaction: architectures achieving superior discrimination (C-index 0.64$\\to$0.82) exhibit equivalent or lower cross-modal interaction (4.8\\%$\\to$3.0\\%). Variance decomposition reveals stable additive contributions across all architectures (WSI${\\approx}$40\\%, RNA${\\approx}$55\\%, Interaction${\\approx}$4\\%), indicating that performance gains arise from complementary signal aggregation rather than learned synergy. These findings provide a practical model auditing tool for comparing fusion strategies, reframe the role of architectural complexity in multimodal fusion, and have implications for privacy-preserving federated deployment.", "published": "2026-03-31T16:39:56Z", "authors": ["Iain Swift", "JingHua Ye", "Ruairi O'Reilly"], "abs_url": "https://arxiv.org/abs/2603.29977v1", "pdf_url": "https://arxiv.org/pdf/2603.29977v1", "x": 9.462425231933594, "y": 10.850968360900879, "similar_indices": [150, 58, 188, 74, 136]}, {"index": 150, "arxiv_id": "2603.29968v1", "title": "Trimodal Deep Learning for Glioma Survival Prediction: A Feasibility Study Integrating Histopathology, Gene Expression, and MRI", "summary": "Multimodal deep learning has improved prognostic accuracy for brain tumours by integrating histopathology and genomic data, yet the contribution of volumetric MRI within unified survival frameworks remains unexplored. This pilot study extends a bimodal framework by incorporating Fluid Attenuated Inversion Recovery (FLAIR) MRI from BraTS2021 as a third modality. Using the TCGA-GBMLGG cohort (664 patients), we evaluate three unimodal models, nine bimodal configurations, and three trimodal configurations across early, late, and joint fusion strategies. In this small cohort setting, trimodal early fusion achieves an exploratory Composite Score (CS = 0.854), with a controlled $Δ$CS of +0.011 over the bimodal baseline on identical patients, though this difference is not statistically significant (p = 0.250, permutation test). MRI achieves reasonable unimodal discrimination (CS = 0.755) but does not substantially improve bimodal pairs, while providing measurable uplift in the three-way combination. All MRI containing experiments are constrained to 19 test patients, yielding wide bootstrap confidence intervals (e.g. [0.400,1.000]) that preclude definitive conclusions. These findings provide preliminary evidence that a third imaging modality may add prognostic value even with limited sample sizes, and that additional modalities require sufficient multimodal context to contribute effectively.", "published": "2026-03-31T16:32:22Z", "authors": ["Iain Swift", "JingHua Ye"], "abs_url": "https://arxiv.org/abs/2603.29968v1", "pdf_url": "https://arxiv.org/pdf/2603.29968v1", "x": 9.558603286743164, "y": 10.663722038269043, "similar_indices": [149, 176, 97, 58, 109]}, {"index": 151, "arxiv_id": "2603.29953v1", "title": "Structured Intent as a Protocol-Like Communication Layer: Cross-Model Robustness, Framework Comparison, and the Weak-Model Compensation Effect", "summary": "How reliably can structured intent representations preserve user goals across different AI models, languages, and prompting frameworks? Prior work showed that PPS (Prompt Protocol Specification), a 5W3H-based structured intent framework, improves goal alignment in Chinese and generalizes to English and Japanese. This paper extends that line of inquiry in three directions: cross-model robustness across Claude, GPT-4o, and Gemini 2.5 Pro; controlled comparison with CO-STAR and RISEN; and a user study (N=50) of AI-assisted intent expansion in ecologically valid settings. Across 3,240 model outputs (3 languages x 6 conditions x 3 models x 3 domains x 20 tasks), evaluated by an independent judge (DeepSeek-V3), we find that structured prompting substantially reduces cross-language score variance relative to unstructured baselines. The strongest structured conditions reduce cross-language sigma from 0.470 to about 0.020. We also observe a weak-model compensation pattern: the lowest-baseline model (Gemini) shows a much larger D-A gain (+1.006) than the strongest model (Claude, +0.217). Under the current evaluation resolution, 5W3H, CO-STAR, and RISEN achieve similarly high goal-alignment scores, suggesting that dimensional decomposition itself is an important active ingredient. In the user study, AI-expanded 5W3H prompts reduce interaction rounds by 60 percent and increase user satisfaction from 3.16 to 4.04. These findings support the practical value of structured intent representation as a robust, protocol-like communication layer for human-AI interaction.", "published": "2026-03-31T16:20:28Z", "authors": ["Peng Gang"], "abs_url": "https://arxiv.org/abs/2603.29953v1", "pdf_url": "https://arxiv.org/pdf/2603.29953v1", "x": -6.595769882202148, "y": -9.204300880432129, "similar_indices": [166, 6, 116, 69, 183]}, {"index": 152, "arxiv_id": "2603.29950v1", "title": "Physiological and Semantic Patterns in Medical Teams Using an Intelligent Tutoring System", "summary": "Effective collaboration requires teams to manage complex cognitive and emotional states through Socially Shared Regulation of Learning (SSRL). Physiological synchrony (i.e., longitudinal alignment in physiological signals) can indicate these states, but is hard to interpret on its own. We investigate the physiological and conversational dynamics of four medical dyads diagnosing a virtual patient case using an intelligent tutoring system. Semantic shifts in dialogue were correlated with transient physiological synchrony peaks. We also coded utterance segments for SSRL and derived cosine similarity using sentence embeddings. The results showed that activating prior knowledge featured significantly lower semantic similarity than simpler task execution. High physiological synchrony was associated with lower semantic similarity, suggesting that such moments involve exploratory and varied language use. Qualitative analysis triangulated these synchrony peaks as ``pivotal moments'': successful teams synchronized during shared discovery, while unsuccessful teams peaked during shared uncertainty. This research advances human-centered AI by demonstrating how biological signals can be fused with dialogues to understand critical moments in problem solving.", "published": "2026-03-31T16:18:57Z", "authors": ["Xiaoshan Huang", "Conrad Borchers", "Jiayi Zhang", "Susanne P. Lajoie"], "abs_url": "https://arxiv.org/abs/2603.29950v1", "pdf_url": "https://arxiv.org/pdf/2603.29950v1", "x": -3.7663071155548096, "y": -5.20504903793335, "similar_indices": [39, 118, 181, 178, 0]}, {"index": 153, "arxiv_id": "2603.29944v1", "title": "Four Generations of Quantum Biomedical Sensors", "summary": "Quantum sensing technologies offer transformative potential for ultra-sensitive biomedical sensing, yet their clinical translation remains constrained by classical noise limits and a reliance on macroscopic ensembles. We propose a unifying generational framework to organize the evolving landscape of quantum biosensors based on their utilization of quantum resources. First-generation devices utilize discrete energy levels for signal transduction but follow classical scaling laws. Second-generation sensors exploit quantum coherence to reach the standard quantum limit, while third-generation architectures leverage entanglement and spin squeezing to approach Heisenberg-limited precision. We further define an emerging fourth generation characterized by the end-to-end integration of quantum sensing with quantum learning and variational circuits, enabling adaptive inference directly within the quantum domain. By analyzing critical parameters such as bandwidth matching and sensor-tissue proximity, we identify key technological bottlenecks and propose a roadmap for transitioning from measuring physical observables to extracting structured biological information with quantum-enhanced intelligence.", "published": "2026-03-31T16:16:27Z", "authors": ["Xin Jin", "Priyam Srivastava", "Ronghe Wang", "Yuqing Li", "Jonathan Beaumariage", "Tom Purdy", "M. V. Gurudev Dutt", "Kang Kim", "Kaushik Seshadreesan", "Junyu Liu"], "abs_url": "https://arxiv.org/abs/2603.29944v1", "pdf_url": "https://arxiv.org/pdf/2603.29944v1", "x": -8.196263313293457, "y": 8.527372360229492, "similar_indices": [179, 168, 79, 58, 78]}, {"index": 154, "arxiv_id": "2603.29935v1", "title": "Rethinking AI Literacy Education in Higher Education: Bridging Risk Perception and Responsible Adoption", "summary": "As AI becomes increasingly embedded across societal domains, understanding how future AI practitioners, particularly technology students, perceive its risks is essential for responsible development and adoption. This study analyzed responses from 139 students in Computer Science, Data Science/Data Analytics, and other disciplines using both explicit AI risk ratings and scenario-based assessments of risk and adoption willingness. Four key findings emerged: (1) Students expressed substantially higher concern for concrete, explicitly stated risks than for abstract or scenario-embedded risks; (2) Perceived risk and willingness to adopt AI demonstrated a clear inverse relationship; (3) Although technical education narrowed gender differences in risk awareness, male students reported higher adoption willingness; and (4) A form of \"risk underappreciation\" was observed, wherein students in AI-related specializations showed both elevated explicit risk awareness and higher willingness to adopt AI, despite lower recognition of risks in applied scenarios. These findings underscore the need for differentiated AI literacy strategies that bridge the gap between awareness and responsible adoption and offer valuable insights for educators, policymakers, industry leaders, and academic institutions aiming to cultivate ethically informed and socially responsible AI practitioners.", "published": "2026-03-31T16:08:16Z", "authors": ["Shasha Yu", "Fiona Carroll", "Barry L. Bentley"], "abs_url": "https://arxiv.org/abs/2603.29935v1", "pdf_url": "https://arxiv.org/pdf/2603.29935v1", "x": 2.1950647830963135, "y": -13.902873039245605, "similar_indices": [17, 142, 183, 127, 111]}, {"index": 155, "arxiv_id": "2603.29932v1", "title": "Bethe Ansatz with a Large Language Model", "summary": "We explore the capability of a Large Language Model (LLM) to perform specific computations in mathematical physics: the task is to compute the coordinate Bethe Ansatz solution of selected integrable spin chain models. We select three integrable Hamiltonians for which the solutions were unpublished; two of the Hamiltonians are actually new. We observed that the LLM semi-autonomously solved the task in all cases, with a few mistakes along the way. These were corrected after the human researchers spotted them. The results of the LLM were checked against exact diagonalization (performed by separate programs), and the derivations were also checked by the authors. The Bethe Ansatz solutions are interesting in themselves. Our second model manifestly breaks left-right invariance, but it is PT-symmetric, therefore its solution could be interesting for applications in Generalized Hydrodynamics. And our third model is solved by a special form of the nested Bethe Ansatz, where the model is interacting, but the nesting level has a free fermionic structure lacking $U(1)$-invariance. This structure appears to be unique and it was found by the LLM. We used ChatGPT 5.2 Pro and 5.4 Pro by OpenAI.", "published": "2026-03-31T16:06:19Z", "authors": ["Balázs Pozsgay", "István Vona"], "abs_url": "https://arxiv.org/abs/2603.29932v1", "pdf_url": "https://arxiv.org/pdf/2603.29932v1", "x": -5.01881742477417, "y": 5.202058792114258, "similar_indices": [44, 62, 114, 55, 10]}, {"index": 156, "arxiv_id": "2603.29928v1", "title": "ScoringBench: A Benchmark for Evaluating Tabular Foundation Models with Proper Scoring Rules", "summary": "Tabular foundation models such as TabPFN and TabICL already produce full predictive distributions yet prevailing regression benchmarks evaluate them almost exclusively via point estimate metrics RMSE R2 These aggregate measures often obscure model performance in the tails of the distribution a critical deficit for high stakes decision making in domains like finance and clinical research where asymmetric risk profiles are the norm We introduce ScoringBench an open benchmark that computes a comprehensive suite of proper scoring rules like CRPS CRLS Interval Score Energy Score weighted CRPS and Brier Score alongside standard point metrics providing a richer picture of probabilistic forecast quality We evaluate realTabPFNv2.5 fine tuned with different scoring rule objectives and TabICL relative to untuned realTabPFNv2.5 across a suite of regression benchmarks Our results confirm that model rankings depend on the chosen scoring rule and that no single pretraining objective is universally optimal This demonstrates that for applications sensitive to extreme events the choice of evaluation metric is as much a domain specific requirement as the data itself ScoringBench is available at https://github.com/jonaslandsgesell/ScoringBench A live preview of the current leaderboard is available at https://scoringbench.bolt.host The leaderboard is maintained via git pull requests to ensure transparency traceability agility and reproducibility", "published": "2026-03-31T16:01:56Z", "authors": ["Jonas Landsgesell", "Pascal Knoll"], "abs_url": "https://arxiv.org/abs/2603.29928v1", "pdf_url": "https://arxiv.org/pdf/2603.29928v1", "x": -4.632933616638184, "y": -11.089631080627441, "similar_indices": [99, 10, 69, 181, 27]}, {"index": 157, "arxiv_id": "2603.29927v1", "title": "End-to-End Image Compression with Segmentation Guided Dual Coding for Wind Turbines", "summary": "Transferring large volumes of high-resolution images during wind turbine inspections introduces a bottleneck in assessing and detecting severe defects. Efficient coding must preserve high fidelity in blade regions while aggressively compressing the background. In this work, we propose an end-to-end deep learning framework that jointly performs segmentation and dual-mode (lossy and lossless) compression. The segmentation module accurately identifies the blade region, after which our region-of-interest (ROI) compressor encodes it at superior quality compared to the rest of the image. Unlike conventional ROI schemes that merely allocate more bits to salient areas, our framework integrates: (i) a robust segmentation network (BU-Netv2+P) with a CRF-regularized loss for precise blade localization, (ii) a hyperprior-based autoencoder optimized for lossy compression, and (iii) an extended bits-back coder with hierarchical models for fully lossless blade reconstruction. Furthermore, our ROI framework removes the sequential dependency in bits-back coding by reusing background-coded bits, enabling parallelized and efficient dual-mode compression. To the best of our knowledge, this is the first fully integrated learning-based ROI codec combining segmentation, lossy, and lossless compression, ensuring that subsequent defect detection is not compromised. Experiments on a large-scale wind turbine dataset demonstrate superior compression performance and efficiency, offering a practical solution for automated inspections.", "published": "2026-03-31T16:01:23Z", "authors": ["Raül Pérez-Gonzalo", "Andreas Espersen", "Søren Forchhammer", "Antonio Agudo"], "abs_url": "https://arxiv.org/abs/2603.29927v1", "pdf_url": "https://arxiv.org/pdf/2603.29927v1", "x": 7.2806077003479, "y": 6.526118278503418, "similar_indices": [196, 106, 16, 45, 79]}, {"index": 158, "arxiv_id": "2603.29922v1", "title": "Training deep learning based dynamic MR image reconstruction using synthetic fractals", "summary": "Purpose: To investigate whether synthetically generated fractal data can be used to train deep learning (DL) models for dynamic MRI reconstruction, thereby avoiding the privacy, licensing, and availability limitations associated with cardiac MR training datasets. Methods: A training dataset was generated using quaternion Julia fractals to produce 2D+time images. Multi-coil MRI acquisition was simulated to generate paired fully sampled and radially undersampled k-space data. A 3D UNet deep artefact suppression model was trained using these fractal data (F-DL) and compared with an identical model trained on cardiac MRI data (CMR-DL). Both models were evaluated on prospectively acquired radial real-time cardiac MRI from 10 patients. Reconstructions were compared against compressed sensing(CS) and low-rank deep image prior (LR-DIP). All reconstrctuions were ranked for image quality, while ventricular volumes and ejection fraction were compared with reference breath-hold cine MRI. Results: There was no significant difference in qualitative ranking between F-DL and CMR-DL (p=0.9), while both outperformed CS and LR-DIP (p<0.001). Ventricular volumes and function derived from F-DL were similar to CMR-DL, showing no significant bias and accptable limits of agreement compared to reference cine imaging. However, LR-DIP had a signifcant bias (p=0.016) and wider lmits of agreement. Conclusion: DL models trained using synthetic fractal data can reconstruct real-time cardiac MRI with image quality and clinical measurements comparable to models trained on true cardiac MRI data. Fractal training data provide an open, scalable alternative to clinical datasets and may enable development of more generalisable DL reconstruction models for dynamic MRI.", "published": "2026-03-31T15:59:40Z", "authors": ["Anirudh Raman", "Olivier Jaubert", "Mark Wrobel", "Tina Yao", "Ruaraidh Campbell", "Rebecca Baker", "Ruta Virsinskaite", "Daniel Knight", "Michael Quail", "Jennifer Steeden", "Vivek Muthurangu"], "abs_url": "https://arxiv.org/abs/2603.29922v1", "pdf_url": "https://arxiv.org/pdf/2603.29922v1", "x": 10.58598804473877, "y": 9.087706565856934, "similar_indices": [79, 150, 109, 176, 11]}, {"index": 159, "arxiv_id": "2603.29915v1", "title": "Uncertainty Gating for Cost-Aware Explainable Artificial Intelligence", "summary": "Post-hoc explanation methods are widely used to interpret black-box predictions, but their generation is often computationally expensive and their reliability is not guaranteed. We propose epistemic uncertainty as a low-cost proxy for explanation reliability: high epistemic uncertainty identifies regions where the decision boundary is poorly defined and where explanations become unstable and unfaithful. This insight enables two complementary use cases: `improving worst-case explanations' (routing samples to cheap or expensive XAI methods based on expected explanation reliability), and `recalling high-quality explanations' (deferring explanation generation for uncertain samples under constrained budget). Across four tabular datasets, five diverse architectures, and four XAI methods, we observe a strong negative correlation between epistemic uncertainty and explanation stability. Further analysis shows that epistemic uncertainty distinguishes not only stable from unstable explanations, but also faithful from unfaithful ones. Experiments on image classification confirm that our findings generalize beyond tabular data.", "published": "2026-03-31T15:56:10Z", "authors": ["Georgii Mikriukov", "Grégoire Montavon", "Marina M. -C. Höhne"], "abs_url": "https://arxiv.org/abs/2603.29915v1", "pdf_url": "https://arxiv.org/pdf/2603.29915v1", "x": 1.3822219371795654, "y": -2.8666574954986572, "similar_indices": [126, 83, 183, 2, 3]}, {"index": 160, "arxiv_id": "2603.29913v1", "title": "SISA: A Scale-In Systolic Array for GEMM Acceleration", "summary": "The currently dominant AI/ML workloads, such as Large Language Models (LLMs), rely on the efficient execution of General Matrix-Matrix Multiplication (GEMM) operations. Thus, most systems are equipped with dedicated matrix hardware accelerators based on square Systolic Arrays (SAs) of Processing Elements (PEs). While this organization was effective for traditional Deep Neural Networks (DNNs), LLMs introduce input-dependent and highly skewed matrices, leading to underutilized SA resources. To address this challenge, we propose SISA (Scale-In Systolic Array), a novel SA architecture that partitions the traditional square array into horizontal rectangular slabs. With minimal overhead, SISA exposes parallelism through independently scheduled slabs for efficient execution of small or skewed matrix shapes, while retaining full-array operation for large GEMMs. SISA achieves up to 8.52x speedup and 93% energy-delay-product (EDP) reduction for representative LLMs compared to a state-of-the-art monolithic SA with the same number of PEs.", "published": "2026-03-31T15:55:31Z", "authors": ["Luigi Altamura", "Alessio Cicero", "Mateo Vázquez Maceiras", "Mohammad Ali Maleki", "Pedro Trancoso"], "abs_url": "https://arxiv.org/abs/2603.29913v1", "pdf_url": "https://arxiv.org/pdf/2603.29913v1", "x": -3.0863351821899414, "y": 6.645969867706299, "similar_indices": [55, 59, 12, 136, 45]}, {"index": 161, "arxiv_id": "2604.00076v1", "title": "Learning to Play Blackjack: A Curriculum Learning Perspective", "summary": "Reinforcement Learning (RL) agents often struggle with efficiency and performance in complex environments. We propose a novel framework that uses a Large Language Model (LLM) to dynamically generate a curriculum over available actions, enabling the agent to incorporate each action individually. We apply this framework to the game of Blackjack, where the LLM creates a multi-stage training path that progressively introduces complex actions to a Tabular Q-Learning and a Deep Q-Network (DQN) agent. Our evaluation in a realistic 8-deck simulation over 10 independent runs demonstrates significant performance gains over standard training methods. The curriculum-based approach increases the DQN agent's average win rate from 43.97% to 47.41%, reduces the average bust rate from 32.9% to 28.0%, and accelerates the overall workflow by over 74%, with the agent's full training completing faster than the baseline's evaluation phase alone. These results validate that LLM-guided curricula can build more effective, robust, and efficient RL agents.", "published": "2026-03-31T15:54:39Z", "authors": ["Amirreza Alasti", "Efe Erdal", "Yücel Celik", "Theresa Eimer"], "abs_url": "https://arxiv.org/abs/2604.00076v1", "pdf_url": "https://arxiv.org/pdf/2604.00076v1", "x": -6.888524055480957, "y": -0.9153187870979309, "similar_indices": [190, 48, 53, 166, 108]}, {"index": 162, "arxiv_id": "2603.29908v1", "title": "C-TRAIL: A Commonsense World Framework for Trajectory Planning in Autonomous Driving", "summary": "Trajectory planning for autonomous driving increasingly leverages large language models (LLMs) for commonsense reasoning, yet LLM outputs are inherently unreliable, posing risks in safety-critical applications. We propose C-TRAIL, a framework built on a Commonsense World that couples LLM-derived commonsense with a trust mechanism to guide trajectory planning. C-TRAIL operates through a closed-loop Recall, Plan, and Update cycle: the Recall module queries an LLM for semantic relations and quantifies their reliability via a dual-trust mechanism; the Plan module injects trust-weighted commonsense into Monte Carlo Tree Search (MCTS) through a Dirichlet trust policy; and the Update module adaptively refines trust scores and policy parameters from environmental feedback. Experiments on four simulated scenarios in Highway-env and two real-world levelXData datasets (highD, rounD) show that C-TRAIL consistently outperforms state-of-the-art baselines, reducing ADE by 40.2%, FDE by 51.7%, and improving SR by 16.9 percentage points on average. The source code is available at https://github.com/ZhihongCui/CTRAIL.", "published": "2026-03-31T15:53:29Z", "authors": ["Zhihong Cui", "Haoran Tang", "Tianyi Li", "Yushuai Li", "Peiyuan Guan", "Amir Taherkordi", "Tor Skeie"], "abs_url": "https://arxiv.org/abs/2603.29908v1", "pdf_url": "https://arxiv.org/pdf/2603.29908v1", "x": 3.77740216255188, "y": 0.8389516472816467, "similar_indices": [96, 50, 7, 10, 166]}, {"index": 163, "arxiv_id": "2603.29902v1", "title": "ATP-Bench: Towards Agentic Tool Planning for MLLM Interleaved Generation", "summary": "Interleaved text-and-image generation represents a significant frontier for Multimodal Large Language Models (MLLMs), offering a more intuitive way to convey complex information. Current paradigms rely on either image generation or retrieval augmentation, yet they typically treat the two as mutually exclusive paths, failing to unify factuality with creativity. We argue that the next milestone in this field is Agentic Tool Planning, where the model serves as a central controller that autonomously determines when, where, and which tools to invoke to produce interleaved responses for visual-critical queries. To systematically evaluate this paradigm, we introduce ATP-Bench, a novel benchmark comprising 7,702 QA pairs (including 1,592 VQA pairs) across eight categories and 25 visual-critical intents, featuring human-verified queries and ground truths. Furthermore, to evaluate agentic planning independent of end-to-end execution and changing tool backends, we propose a Multi-Agent MLLM-as-a-Judge (MAM) system. MAM evaluates tool-call precision, identifies missed opportunities for tool use, and assesses overall response quality without requiring ground-truth references. Our extensive experiments on 10 state-of-the-art MLLMs reveal that models struggle with coherent interleaved planning and exhibit significant variations in tool-use behavior, highlighting substantial room for improvement and providing actionable guidance for advancing interleaved generation. Dataset and code are available at https://github.com/Qwen-Applications/ATP-Bench.", "published": "2026-03-31T15:47:59Z", "authors": ["Yinuo Liu", "Zi Qian", "Heng Zhou", "Jiahao Zhang", "Yajie Zhang", "Zhihang Li", "Mengyu Zhou", "Erchao Zhao", "Xiaoxi Jiang", "Guanjun Jiang"], "abs_url": "https://arxiv.org/abs/2603.29902v1", "pdf_url": "https://arxiv.org/pdf/2603.29902v1", "x": -0.32845860719680786, "y": -1.5363662242889404, "similar_indices": [0, 115, 69, 30, 7]}, {"index": 164, "arxiv_id": "2603.29871v1", "title": "ShapE-GRPO: Shapley-Enhanced Reward Allocation for Multi-Candidate LLM Training", "summary": "In user-agent interaction scenarios such as recommendation, brainstorming, and code suggestion, Large Language Models (LLMs) often generate sets of candidate recommendations where the objective is to maximize the collective utility of the entire set rather than individual candidates independently. However, existing reinforcement learning post-training paradigms, such as Group Relative Policy Optimization (GRPO), typically assign the same set-level scalar reward to every candidate in the set. This leads to noisy training signals where poor candidates free-ride on the high reward produced by a single strong peer, resulting in suboptimal exploration. To address this, we propose Shapley-Enhanced GRPO (ShapE-GRPO). By leveraging the permutation-invariant nature of set-level utility, we derive a Shapley-enhanced formulation from cooperative game theory to decompose set-level rewards into granular, candidate-specific signals. We show that our formulation preserves the fundamental axioms of the Shapley value while remaining computationally efficient with polynomial-time complexity. Empirically, ShapE-GRPO consistently outperforms standard GRPO across diverse datasets with accelerated convergence during training.", "published": "2026-03-31T15:24:15Z", "authors": ["Rui Ai", "Yu Pan", "David Simchi-Levi", "Chonghuan Wang"], "abs_url": "https://arxiv.org/abs/2603.29871v1", "pdf_url": "https://arxiv.org/pdf/2603.29871v1", "x": -10.180048942565918, "y": 0.1998676359653473, "similar_indices": [65, 61, 7, 91, 43]}, {"index": 165, "arxiv_id": "2603.29861v1", "title": "Towards Empowering Consumers through Sentence-level Readability Scoring in German ESG Reports", "summary": "With the ever-growing urgency of sustainability in the economy and society, and the massive stream of information that comes with it, consumers need reliable access to that information. To address this need, companies began publishing so called Environmental, Social, and Governance (ESG) reports, both voluntarily and forced by law. To serve the public, these reports must be addressed not only to financial experts but also to non-expert audiences. But are they written clearly enough? In this work, we extend an existing sentence-level dataset of German ESG reports with crowdsourced readability annotations. We find that, in general, native speakers perceive sentences in ESG reports as easy to read, but also that readability is subjective. We apply various readability scoring methods and evaluate them regarding their prediction error and correlation with human rankings. Our analysis shows that, while LLM prompting has potential for distinguishing clear from hard-to-read sentences, a small finetuned transformer predicts human readability with the lowest error. Averaging predictions of multiple models can slightly improve the performance at the cost of slower inference.", "published": "2026-03-31T15:19:02Z", "authors": ["Benjamin Josef Schüßler", "Jakob Prange"], "abs_url": "https://arxiv.org/abs/2603.29861v1", "pdf_url": "https://arxiv.org/pdf/2603.29861v1", "x": -7.373025417327881, "y": -11.118340492248535, "similar_indices": [116, 76, 89, 189, 126]}, {"index": 166, "arxiv_id": "2603.29844v1", "title": "DIAL: Decoupling Intent and Action via Latent World Modeling for End-to-End VLA", "summary": "The development of Vision-Language-Action (VLA) models has been significantly accelerated by pre-trained Vision-Language Models (VLMs). However, most existing end-to-end VLAs treat the VLM primarily as a multimodal encoder, directly mapping vision-language features to low-level actions. This paradigm underutilizes the VLM's potential in high-level decision making and introduces training instability, frequently degrading its rich semantic representations. To address these limitations, we introduce DIAL, a framework bridging high-level decision making and low-level motor execution through a differentiable latent intent bottleneck. Specifically, a VLM-based System-2 performs latent world modeling by synthesizing latent visual foresight within the VLM's native feature space; this foresight explicitly encodes intent and serves as the structural bottleneck. A lightweight System-1 policy then decodes this predicted intent together with the current observation into precise robot actions via latent inverse dynamics. To ensure optimization stability, we employ a two-stage training paradigm: a decoupled warmup phase where System-2 learns to predict latent futures while System-1 learns motor control under ground-truth future guidance within a unified feature space, followed by seamless end-to-end joint optimization. This enables action-aware gradients to refine the VLM backbone in a controlled manner, preserving pre-trained knowledge. Extensive experiments on the RoboCasa GR1 Tabletop benchmark show that DIAL establishes a new state-of-the-art, achieving superior performance with 10x fewer demonstrations than prior methods. Furthermore, by leveraging heterogeneous human demonstrations, DIAL learns physically grounded manipulation priors and exhibits robust zero-shot generalization to unseen objects and novel configurations during real-world deployment on a humanoid robot.", "published": "2026-03-31T15:02:27Z", "authors": ["Yi Chen", "Yuying Ge", "Hui Zhou", "Mingyu Ding", "Yixiao Ge", "Xihui Liu"], "abs_url": "https://arxiv.org/abs/2603.29844v1", "pdf_url": "https://arxiv.org/pdf/2603.29844v1", "x": 4.436769485473633, "y": 3.711480140686035, "similar_indices": [50, 88, 163, 136, 16]}, {"index": 167, "arxiv_id": "2603.29828v1", "title": "Owl-AuraID 1.0: An Intelligent System for Autonomous Scientific Instrumentation and Scientific Data Analysis", "summary": "Scientific discovery increasingly depends on high-throughput characterization, yet automation is hindered by proprietary GUIs and the limited generalizability of existing API-based systems. We present Owl-AuraID, a software-hardware collaborative embodied agent system that adopts a GUI-native paradigm to operate instruments through the same interfaces as human experts. Its skill-centric framework integrates Type-1 (GUI operation) and Type-2 (data analysis) skills into end-to-end workflows, connecting physical sample handling with scientific interpretation. Owl-AuraID demonstrates broad coverage across ten categories of precision instruments and diverse workflows, including multimodal spectral analysis, microscopic imaging, and crystallographic analysis, supporting modalities such as FTIR, NMR, AFM, and TGA. Overall, Owl-AuraID provides a practical, extensible foundation for autonomous laboratories and illustrates a path toward evolving laboratory intelligence through reusable operational and analytical skills. The code are available at https://github.com/OpenOwlab/AuraID.", "published": "2026-03-31T14:49:23Z", "authors": ["Han Deng", "Anqi Zou", "Hanling Zhang", "Ben Fei", "Chengyu Zhang", "Haobo Wang", "Xinru Guo", "Zhenyu Li", "Xuzhu Wang", "Peng Yang", "Fujian Zhang", "Weiyu Guo", "Xiaohong Shao", "Zhaoyang Liu", "Shixiang Tang", "Zhihui Wang", "Wanli Ouyang"], "abs_url": "https://arxiv.org/abs/2603.29828v1", "pdf_url": "https://arxiv.org/pdf/2603.29828v1", "x": 0.7527883052825928, "y": -8.282753944396973, "similar_indices": [73, 133, 74, 175, 171]}, {"index": 168, "arxiv_id": "2603.29805v2", "title": "From Density Matrices to Phase Transitions in Deep Learning: Spectral Early Warnings and Interpretability", "summary": "A key problem in the modern study of AI is predicting and understanding emergent capabilities in models during training. Inspired by methods for studying reactions in quantum chemistry, we present the ``2-datapoint reduced density matrix\". We show that this object provides a computationally efficient, unified observable of phase transitions during training. By tracking the eigenvalue statistics of the 2RDM over a sliding window, we derive two complementary signals: the spectral heat capacity, which we prove provides early warning of second-order phase transitions via critical slowing down, and the participation ratio, which reveals the dimensionality of the underlying reorganization. Remarkably, the top eigenvectors of the 2RDM are directly interpretable making it straightforward to study the nature of the transitions. We validate across four distinct settings: deep linear networks, induction head formation, grokking, and emergent misalignment. We then discuss directions for future work using the 2RDM.", "published": "2026-03-31T14:34:01Z", "authors": ["Max Hennick", "Guillaume Corlouer"], "abs_url": "https://arxiv.org/abs/2603.29805v2", "pdf_url": "https://arxiv.org/pdf/2603.29805v2", "x": -7.631519794464111, "y": 7.9188690185546875, "similar_indices": [179, 153, 194, 98, 180]}, {"index": 169, "arxiv_id": "2603.29791v1", "title": "Reasoning-Driven Synthetic Data Generation and Evaluation", "summary": "Although many AI applications of interest require specialized multi-modal models, relevant data to train such models is inherently scarce or inaccessible. Filling these gaps with human annotators is prohibitively expensive, error-prone, and time-consuming, leading model builders to increasingly consider synthetic data as a scalable alternative. However, existing synthetic data generation methods often rely on manual prompts, evolutionary algorithms, or extensive seed data from the target distribution - limiting their scalability, explainability, and control. In this paper, we introduce Simula: a novel reasoning-driven framework for data generation and evaluation. It employs a seedless, agentic approach to generate synthetic datasets at scale, allowing users to define desired dataset characteristics through an explainable and controllable process that enables fine-grained resource allocation. We show the efficacy of our approach on a variety of datasets, rigorously testing both intrinsic and downstream properties. Our work (1) offers guidelines for synthetic data mechanism design, (2) provides insights into generating and evaluating synthetic data at scale, and (3) unlocks new opportunities for developing and deploying AI in domains where data scarcity or privacy concerns are paramount.", "published": "2026-03-31T14:26:33Z", "authors": ["Tim R. Davidson", "Benoit Seguin", "Enrico Bacis", "Cesar Ilharco", "Hamza Harkous"], "abs_url": "https://arxiv.org/abs/2603.29791v1", "pdf_url": "https://arxiv.org/pdf/2603.29791v1", "x": -0.7175006866455078, "y": 0.7755930423736572, "similar_indices": [7, 76, 194, 163, 10]}, {"index": 170, "arxiv_id": "2603.29777v1", "title": "From Skeletons to Semantics: Design and Deployment of a Hybrid Edge-Based Action Detection System for Public Safety", "summary": "Public spaces such as transport hubs, city centres, and event venues require timely and reliable detection of potentially violent behaviour to support public safety. While automated video analysis has made significant progress, practical deployment remains constrained by latency, privacy, and resource limitations, particularly under edge-computing conditions. This paper presents the design and demonstrator-based deployment of a hybrid edge-based action detection system that combines skeleton-based motion analysis with vision-language models for semantic scene interpretation. Skeleton-based processing enables continuous, privacy-aware monitoring with low computational overhead, while vision-language models provide contextual understanding and zero-shot reasoning capabilities for complex and previously unseen situations. Rather than proposing new recognition models, the contribution focuses on a system-level comparison of both paradigms under realistic edge constraints. The system is implemented on a GPU-enabled edge device and evaluated with respect to latency, resource usage, and operational trade-offs using a demonstrator-based setup. The results highlight the complementary strengths and limitations of motioncentric and semantic approaches and motivate a hybrid architecture that selectively augments fast skeletonbased detection with higher-level semantic reasoning. The presented system provides a practical foundation for privacy-aware, real-time video analysis in public safety applications.", "published": "2026-03-31T14:16:16Z", "authors": ["Ganen Sethupathy", "Lalit Dumka", "Jan Schagen"], "abs_url": "https://arxiv.org/abs/2603.29777v1", "pdf_url": "https://arxiv.org/pdf/2603.29777v1", "x": 7.305421829223633, "y": 2.570383071899414, "similar_indices": [77, 50, 32, 74, 8]}, {"index": 171, "arxiv_id": "2604.00073v1", "title": "Terminal Agents Suffice for Enterprise Automation", "summary": "There has been growing interest in building agents that can interact with digital platforms to execute meaningful enterprise tasks autonomously. Among the approaches explored are tool-augmented agents built on abstractions such as Model Context Protocol (MCP) and web agents that operate through graphical interfaces. Yet, it remains unclear whether such complex agentic systems are necessary given their cost and operational overhead. We argue that a coding agent equipped only with a terminal and a filesystem can solve many enterprise tasks more effectively by interacting directly with platform APIs. We evaluate this hypothesis across diverse real-world systems and show that these low-level terminal agents match or outperform more complex agent architectures. Our findings suggest that simple programmatic interfaces, combined with strong foundation models, are sufficient for practical enterprise automation.", "published": "2026-03-31T14:14:47Z", "authors": ["Patrice Bechard", "Orlando Marquez Ayala", "Emily Chen", "Jordan Skelton", "Sagar Davasam", "Srinivas Sunkara", "Vikas Yadav", "Sai Rajeswar"], "abs_url": "https://arxiv.org/abs/2604.00073v1", "pdf_url": "https://arxiv.org/pdf/2604.00073v1", "x": 0.8236644864082336, "y": -10.072530746459961, "similar_indices": [125, 47, 133, 29, 73]}, {"index": 172, "arxiv_id": "2603.29761v1", "title": "Tracking vs. Deciding: The Dual-Capability Bottleneck in Searchless Chess Transformers", "summary": "A human-like chess engine should mimic the style, errors, and consistency of a strong human player rather than maximize playing strength. We show that training from move sequences alone forces a model to learn two capabilities: state tracking, which reconstructs the board from move history, and decision quality, which selects good moves from that reconstructed state. These impose contradictory data requirements: low-rated games provide the diversity needed for tracking, while high-rated games provide the quality signal for decision learning. Removing low-rated data degrades performance.   We formalize this tension as a dual-capability bottleneck, P <= min(T,Q), where overall performance is limited by the weaker capability. Guided by this view, we scale the model from 28M to 120M p
