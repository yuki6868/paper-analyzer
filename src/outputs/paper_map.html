that the generated reasoning traces show high clinical factuality and provide causal support for the final predictions, offering a plausible explanation for the performance gains. These results suggest that explicit reasoning can improve model performance, interpretability and clinical utility in AI-assisted CXR interpretation.", "published": "2026-04-01T05:19:09Z", "authors": ["Yabin Zhang", "Chong Wang", "Yunhe Gao", "Jiaming Liu", "Maya Varma", "Justin Xu", "Sophie Ostmeier", "Jin Long", "Sergios Gatidis", "Seena Dehkharghani", "Arne Michalson", "Eun Kyoung Hong", "Christian Bluethgen", "Haiwei Henry Guo", "Alexander Victor Ortiz", "Stephan Altmayer", "Sandhya Bodapati", "Joseph David Janizek", "Ken Chang", "Jean-Benoit Delbrouck", "Akshay S. Chaudhari", "Curtis P. Langlotz"], "abs_url": "https://arxiv.org/abs/2604.00493v1", "pdf_url": "https://arxiv.org/pdf/2604.00493v1", "x": 0.3675798773765564, "y": -0.21059581637382507, "similar_indices": [10, 181, 163, 169, 159]}, {"index": 84, "arxiv_id": "2604.00491v1", "title": "Executing as You Generate: Hiding Execution Latency in LLM Code Generation", "summary": "Current LLM-based coding agents follow a serial execution paradigm: the model first generates the complete code, then invokes an interpreter to execute it. This sequential workflow leaves the executor idle during generation and the generator idle during execution, resulting in unnecessary end-to-end latency. We observe that, unlike human developers, LLMs produce code tokens sequentially without revision, making it possible to execute code as it is being generated. We formalize this parallel execution paradigm, modeling it as a three-stage pipeline of generation, detection, and execution, and derive closed-form latency bounds that characterize its speedup potential and operating regimes. We then present Eager, a concrete implementation featuring AST-based chunking, dynamic batching with gated execution, and early error interruption. We evaluate Eager across four benchmarks, seven LLMs, and three execution environments. Results show that Eager reduces the non-overlapped execution latency by up to 99.9% and the end-to-end latency by up to 55% across seven LLMs and four benchmarks.", "published": "2026-04-01T05:17:53Z", "authors": ["Zhensu Sun", "Zhihao Lin", "Zhi Chen", "Chengran Yang", "Mingyi Zhou", "Li Li", "David Lo"], "abs_url": "https://arxiv.org/abs/2604.00491v1", "pdf_url": "https://arxiv.org/pdf/2604.00491v1", "x": -2.556407928466797, "y": -12.708556175231934, "similar_indices": [24, 138, 99, 26, 81]}, {"index": 85, "arxiv_id": "2604.00478v1", "title": "The Silicon Mirror: Dynamic Behavioral Gating for Anti-Sycophancy in LLM Agents", "summary": "Large Language Models (LLMs) increasingly prioritize user validation over epistemic accuracy-a phenomenon known as sycophancy. We present The Silicon Mirror, an orchestration framework that dynamically detects user persuasion tactics and adjusts AI behavior to maintain factual integrity. Our architecture introduces three components: (1) a Behavioral Access Control (BAC) system that restricts context layer access based on real-time sycophancy risk scores, (2) a Trait Classifier that identifies persuasion tactics across multi-turn dialogues, and (3) a Generator-Critic loop where an auditor vetoes sycophantic drafts and triggers rewrites with \"Necessary Friction.\" In a live evaluation on 50 TruthfulQA adversarial scenarios using Claude Sonnet 4 with an independent LLM judge, we observe vanilla Claude sycophancy at 12.0% (6/50), static guardrails at 4.0% (2/50), and the Silicon Mirror at 2.0% (1/50)-an 83.3% relative reduction (p = 0.112, Fisher's exact test). A cross-model evaluation on Gemini 2.5 Flash reveals a higher baseline sycophancy rate (46.0%) and a statistically significant 69.6% reduction under the Silicon Mirror (p < 0.001). We characterize the validation-before-correction pattern as a distinct failure mode of RLHF-trained models.", "published": "2026-04-01T04:51:28Z", "authors": ["Harshee Jignesh Shah"], "abs_url": "https://arxiv.org/abs/2604.00478v1", "pdf_url": "https://arxiv.org/pdf/2604.00478v1", "x": 1.7374125719070435, "y": -5.368399143218994, "similar_indices": [144, 108, 56, 86, 24]}, {"index": 86, "arxiv_id": "2604.00477v1", "title": "Logarithmic Scores, Power-Law Discoveries: Disentangling Measurement from Coverage in Agent-Based Evaluation", "summary": "LLM-based agent judges are an emerging approach to evaluating conversational AI, yet a fundamental uncertainty remains: can we trust their assessments, and if so, how many are needed? Through 960 sessions with two model pairs across 15 tasks, we show that persona-based agent judges produce evaluations indistinguishable from human raters in a Turing-style validation. We then identify a score-coverage dissociation: quality scores improve logarithmically with panel size, while unique issue discoveries follow a sublinear power law-both exhibit diminishing returns, but scores saturate roughly twice as fast as discoveries. We hypothesize this reflects a power law distribution of the finding space: critical issues are discovered first by small panels, while corner cases require progressively larger panels, analogous to species accumulation curves in ecology. The mechanism traces to ensemble diversity-Big Five personality conditioning makes agents probe different quality dimensions, with expert judges acting as adversarial probes that push discovery into the tail of the finding distribution. A controlled ablation confirms that structured persona conditioning, not simple prompting, is required to produce these scaling properties.", "published": "2026-04-01T04:44:21Z", "authors": ["HyunJoon Jung", "William Na"], "abs_url": "https://arxiv.org/abs/2604.00477v1", "pdf_url": "https://arxiv.org/pdf/2604.00477v1", "x": -3.164748191833496, "y": -6.427003860473633, "similar_indices": [137, 85, 183, 69, 36]}, {"index": 87, "arxiv_id": "2604.00464v1", "title": "Not My Truce: Personality Differences in AI-Mediated Workplace Negotiation", "summary": "AI-driven conversational coaching is increasingly used to support workplace negotiation, yet prior work assumes uniform effectiveness across users. We challenge this assumption by examining how individual differences, particularly personality traits, moderate coaching outcomes. We conducted a between-subjects experiment (N=267) comparing theory-driven AI (Trucey), general-purpose AI (Control-AI), and a traditional negotiation handbook (Control-NoAI). Participants were clustered into three profiles -- resilient, overcontrolled, and undercontrolled -- based on the Big-Five personality traits and ARC typology. Resilient workers achieved broad psychological gains primarily from the handbook, overcontrolled workers showed outcome-specific improvements with theory-driven AI, and undercontrolled workers exhibited minimal effects despite engaging with the frameworks. These patterns suggest personality as a predictor of readiness beyond stage-based tailoring: vulnerable users benefit from targeted rather than comprehensive interventions. The study advances understanding of personality-determined intervention prerequisites and highlights design implications for adaptive AI coaching systems that align support intensity with individual readiness, rather than assuming universal effectiveness.", "published": "2026-04-01T04:26:26Z", "authors": ["Veda Duddu", "Jash Rajesh Parekh", "Andy Mao", "Hanyi Min", "Ziang Xiao", "Vedant Das Swain", "Koustuv Saha"], "abs_url": "https://arxiv.org/abs/2604.00464v1", "pdf_url": "https://arxiv.org/pdf/2604.00464v1", "x": -4.6550188064575195, "y": -6.16717004776001, "similar_indices": [39, 86, 118, 186, 111]}, {"index": 88, "arxiv_id": "2604.00455v1", "title": "First Logit Boosting: Visual Grounding Method to Mitigate Object Hallucination in Large Vision-Language Models", "summary": "Recent Large Vision-Language Models (LVLMs) have demonstrated remarkable performance across various multimodal tasks that require understanding both visual and linguistic inputs. However, object hallucination -- the generation of nonexistent objects in answers -- remains a persistent challenge. Although several approaches such as retraining and external grounding methods have been proposed to mitigate this issue, they still suffer from high data costs or structural complexity. Training-free methods such as Contrastive Decoding (CD) are more cost-effective, avoiding additional training or external models, but still suffer from long-term decay, where visual grounding weakens and language priors dominate as the generation progresses. In this paper, we propose First Logit Boosting (FLB), a simple yet effective training-free technique designed to alleviate long-term decay in LVLMs. FLB stores the logit of the first generated token and adds it to subsequent token predictions, effectively mitigating long-term decay of visual information. We observe that FLB (1) sustains the visual information embedded in the first token throughout generation, and (2) suppresses hallucinated words through the stabilizing effect of the ``The'' token. Experimental results show that FLB significantly reduces object hallucination across various tasks, benchmarks, and backbone models. Notably, it causes negligible inference overhead, making it highly applicable to real-time multimodal systems. Code is available at https://github.com/jiwooha20/FLB", "published": "2026-04-01T04:05:50Z", "authors": ["Jiwoo Ha", "Jongwoo Baek", "Jinhyun So"], "abs_url": "https://arxiv.org/abs/2604.00455v1", "pdf_url": "https://arxiv.org/pdf/2604.00455v1", "x": 4.605536460876465, "y": 4.635643005371094, "similar_indices": [166, 45, 136, 57, 106]}, {"index": 89, "arxiv_id": "2604.00445v1", "title": "Towards Reliable Truth-Aligned Uncertainty Estimation in Large Language Models", "summary": "Uncertainty estimation (UE) aims to detect hallucinated outputs of large language models (LLMs) to improve their reliability. However, UE metrics often exhibit unstable performance across configurations, which significantly limits their applicability. In this work, we formalise this phenomenon as proxy failure, since most UE metrics originate from model behaviour, rather than being explicitly grounded in the factual correctness of LLM outputs. With this, we show that UE metrics become non-discriminative precisely in low-information regimes. To alleviate this, we propose Truth AnChoring (TAC), a post-hoc calibration method to remedy UE metrics, by mapping the raw scores to truth-aligned scores. Even with noisy and few-shot supervision, our TAC can support the learning of well-calibrated uncertainty estimates, and presents a practical calibration protocol. Our findings highlight the limitations of treating heuristic UE metrics as direct indicators of truth uncertainty, and position our TAC as a necessary step toward more reliable uncertainty estimation for LLMs. The code repository is available at https://github.com/ponhvoan/TruthAnchor/.", "published": "2026-04-01T03:42:16Z", "authors": ["Ponhvoan Srey", "Quang Minh Nguyen", "Xiaobao Wu", "Anh Tuan Luu"], "abs_url": "https://arxiv.org/abs/2604.00445v1", "pdf_url": "https://arxiv.org/pdf/2604.00445v1", "x": -1.7792820930480957, "y": 2.1188089847564697, "similar_indices": [10, 76, 27, 108, 93]}, {"index": 90, "arxiv_id": "2604.00443v1", "title": "Polysemanticity or Polysemy? Lexical Identity Confounds Superposition Metrics", "summary": "If the same neuron activates for both \"lender\" and \"riverside,\" standard metrics attribute the overlap to superposition--the neuron must be compressing two unrelated concepts. This work explores how much of the overlap is due a lexical confound: neurons fire for a shared word form (such as \"bank\") rather than for two compressed concepts. A 2x2 factorial decomposition reveals that the lexical-only condition (same word, different meaning) consistently exceeds the semantic-only condition (different word, same meaning) across models spanning 110M-70B parameters. The confound carries into sparse autoencoders (18-36% of features blend senses), sits in <=1% of activation dimensions, and hurts downstream tasks: filtering it out improves word sense disambiguation and makes knowledge edits more selective (p = 0.002).", "published": "2026-04-01T03:39:47Z", "authors": ["Iyad Ait Hou", "Rebecca Hwa"], "abs_url": "https://arxiv.org/abs/2604.00443v1", "pdf_url": "https://arxiv.org/pdf/2604.00443v1", "x": -4.770903587341309, "y": 10.22603988647461, "similar_indices": [178, 198, 191, 20, 41]}, {"index": 91, "arxiv_id": "2604.00442v1", "title": "Execution-Verified Reinforcement Learning for Optimization Modeling", "summary": "Automating optimization modeling with LLMs is a promising path toward scalable decision intelligence, but existing approaches either rely on agentic pipelines built on closed-source LLMs with high inference latency, or fine-tune smaller LLMs using costly process supervision that often overfits to a single solver API. Inspired by reinforcement learning with verifiable rewards, we propose Execution-Verified Optimization Modeling (EVOM), an execution-verified learning framework that treats a mathematical programming solver as a deterministic, interactive verifier. Given a natural-language problem and a target solver, EVOM generates solver-specific code, executes it in a sandboxed harness, and converts execution outcomes into scalar rewards, optimized with GRPO and DAPO in a closed-loop generate-execute-feedback-update process. This outcome-only formulation removes the need for process-level supervision, and enables cross-solver generalization by switching the verification environment rather than reconstructing solver-specific datasets. Experiments on NL4OPT, MAMO, IndustryOR, and OptiBench across Gurobi, OR-Tools, and COPT show that EVOM matches or outperforms process-supervised SFT, supports zero-shot solver transfer, and achieves effective low-cost solver adaptation by continuing training under the target solver backend.", "published": "2026-04-01T03:39:11Z", "authors": ["Runda Guan", "Xiangqing Shen", "Jiajun Zhang", "Yifan Zhang", "Jian Cheng", "Rui Xia"], "abs_url": "https://arxiv.org/abs/2604.00442v1", "pdf_url": "https://arxiv.org/pdf/2604.00442v1", "x": -6.895172595977783, "y": -2.8051743507385254, "similar_indices": [53, 139, 112, 190, 48]}, {"index": 92, "arxiv_id": "2604.00421v1", "title": "Self-Routing: Parameter-Free Expert Routing from Hidden States", "summary": "Mixture-of-Experts (MoE) layers increase model capacity by activating only a small subset of experts per token, and typically rely on a learned router to map hidden states to expert assignments. In this work, we ask whether a dedicated learned router is strictly necessary in the MoE settings we study. We propose Self-Routing, a parameter-free routing mechanism that uses a designated subspace of the token hidden state directly as expert logits, eliminating the router projection entirely while leaving the rest of the MoE layer unchanged. We evaluate Self-Routing on GPT-2-scale language modeling and ImageNet-1K classification by comparing it against a standard learned router, random-routing baselines, and dense non-MoE baselines. Our results show that Self-Routing remains competitive with the learned-router baseline while removing all dedicated routing parameters, and yields more balanced expert utilization, with about 17 % higher average normalized routing entropy and no explicit load-balancing loss. On ImageNet-1K with DeiT-S/16, Self-Routing also slightly improves over the corresponding learned-router MoE. These findings suggest that effective MoE routing can emerge from the hidden representation itself without requiring a separate learned router module.", "published": "2026-04-01T03:05:20Z", "authors": ["Jama Hussein Mohamud", "Drew Wagner", "Mirco Ravanelli"], "abs_url": "https://arxiv.org/abs/2604.00421v1", "pdf_url": "https://arxiv.org/pdf/2604.00421v1", "x": 8.887690544128418, "y": -0.7795444130897522, "similar_indices": [51, 12, 166, 96, 161]}, {"index": 93, "arxiv_id": "2604.00419v1", "title": "G-Drift MIA: Membership Inference via Gradient-Induced Feature Drift in LLMs", "summary": "Large language models (LLMs) are trained on massive web-scale corpora, raising growing concerns about privacy and copyright. Membership inference attacks (MIAs) aim to determine whether a given example was used during training. Existing LLM MIAs largely rely on output probabilities or loss values and often perform only marginally better than random guessing when members and non-members are drawn from the same distribution. We introduce G-Drift MIA, a white-box membership inference method based on gradient-induced feature drift. Given a candidate (x,y), we apply a single targeted gradient-ascent step that increases its loss and measure the resulting changes in internal representations, including logits, hidden-layer activations, and projections onto fixed feature directions, before and after the update. These drift signals are used to train a lightweight logistic classifier that effectively separates members from non-members. Across multiple transformer-based LLMs and datasets derived from realistic MIA benchmarks, G-Drift substantially outperforms confidence-based, perplexity-based, and reference-based attacks. We further show that memorized training samples systematically exhibit smaller and more structured feature drift than non-members, providing a mechanistic link between gradient geometry, representation stability, and memorization. In general, our results demonstrate that small, controlled gradient interventions offer a practical tool for auditing the membership of training-data and assessing privacy risks in LLMs.", "published": "2026-04-01T03:01:27Z", "authors": ["Ravi Ranjan", "Utkarsh Grover", "Xiaomin Lin", "Agoritsa Polyzou"], "abs_url": "https://arxiv.org/abs/2604.00419v1", "pdf_url": "https://arxiv.org/pdf/2604.00419v1", "x": 0.604205846786499, "y": 2.1572487354278564, "similar_indices": [76, 123, 88, 10, 27]}, {"index": 94, "arxiv_id": "2604.00416v1", "title": "Learning Humanoid Navigation from Human Data", "summary": "We present EgoNav, a system that enables a humanoid robot to traverse diverse, unseen environments by learning entirely from 5 hours of human walking data, with no robot data or finetuning. A diffusion model predicts distributions of plausible future trajectories conditioned on past trajectory, a 360 deg visual memory fusing color, depth, and semantics, and video features from a frozen DINOv3 backbone that capture appearance cues invisible to depth sensors. A hybrid sampling scheme achieves real-time inference in 10 denoising steps, and a receding-horizon controller selects paths from the predicted distribution. We validate EgoNav through offline evaluations, where it outperforms baselines in collision avoidance and multi-modal coverage, and through zero-shot deployment on a Unitree G1 humanoid across unseen indoor and outdoor environments. Behaviors such as waiting for doors to open, navigating around crowds, and avoiding glass walls emerge naturally from the learned prior. We will release the dataset and trained models. Our website: https://egonav.weizhuowang.com", "published": "2026-04-01T02:59:42Z", "authors": ["Weizhuo Wang", "Yanjie Ze", "C. Karen Liu", "Monroe Kennedy"], "abs_url": "https://arxiv.org/abs/2604.00416v1", "pdf_url": "https://arxiv.org/pdf/2604.00416v1", "x": 5.158153057098389, "y": 1.238656997680664, "similar_indices": [96, 32, 50, 115, 166]}, {"index": 95, "arxiv_id": "2604.00414v1", "title": "Decision-Centric Design for LLM Systems", "summary": "LLM systems must make control decisions in addition to generating outputs: whether to answer, clarify, retrieve, call tools, repair, or escalate. In many current architectures, these decisions remain implicit within generation, entangling assessment and action in a single model call and making failures hard to inspect, constrain, or repair. We propose a decision-centric framework that separates decision-relevant signals from the policy that maps them to actions, turning control into an explicit and inspectable layer of the system. This separation supports attribution of failures to signal estimation, decision policy, or execution, and enables modular improvement of each component. It unifies familiar single-step settings such as routing and adaptive inference, and extends naturally to sequential settings in which actions alter the information available before acting. Across three controlled experiments, the framework reduces futile actions, improves task success, and reveals interpretable failure modes. More broadly, it offers a general architectural principle for building more reliable, controllable, and diagnosable LLM systems.", "published": "2026-04-01T02:57:23Z", "authors": ["Wei Sun"], "abs_url": "https://arxiv.org/abs/2604.00414v1", "pdf_url": "https://arxiv.org/pdf/2604.00414v1", "x": -6.174328804016113, "y": -4.275576591491699, "similar_indices": [108, 190, 139, 102, 91]}, {"index": 96, "arxiv_id": "2604.00402v1", "title": "COTTA: Context-Aware Transfer Adaptation for Trajectory Prediction in Autonomous Driving", "summary": "Developing robust models to accurately predict the trajectories of surrounding agents is fundamental to autonomous driving safety. However, most public datasets, such as the Waymo Open Motion Dataset and Argoverse, are collected in Western road environments and do not reflect the unique traffic patterns, infrastructure, and driving behaviors of other regions, including South Korea. This domain discrepancy leads to performance degradation when state-of-the-art models trained on Western data are deployed in different geographic contexts. In this work, we investigate the adaptability of Query-Centric Trajectory Prediction (QCNet) when transferred from U.S.-based data to Korean road environments. Using a Korean autonomous driving dataset, we compare four training strategies: zero-shot transfer, training from scratch, full fine-tuning, and encoder freezing. Experimental results demonstrate that leveraging pretrained knowledge significantly improves prediction performance. Specifically, selectively fine-tuning the decoder while freezing the encoder yields the best trade-off between accuracy and training efficiency, reducing prediction error by over 66% compared to training from scratch. This study provides practical insights into effective transfer learning strategies for deploying trajectory prediction models in new geographic domains.", "published": "2026-04-01T02:36:28Z", "authors": ["Seohyoung Park", "Jaeyeol Lim", "Seoyoung Ju", "Kyeonghun Kim", "Nam-Joon Kim", "Hyuk-Jae Lee"], "abs_url": "https://arxiv.org/abs/2604.00402v1", "pdf_url": "https://arxiv.org/pdf/2604.00402v1", "x": 4.314365863800049, "y": 1.0966497659683228, "similar_indices": [162, 94, 50, 2, 166]}, {"index": 97, "arxiv_id": "2604.00397v1", "title": "Improving Generalization of Deep Learning for Brain Metastases Segmentation Across Institutions", "summary": "Background: Deep learning has demonstrated significant potential for automated brain metastases (BM) segmentation; however, models trained at a singular institution often exhibit suboptimal performance at various sites due to disparities in scanner hardware, imaging protocols, and patient demographics. The goal of this work is to create a domain adaptation framework that will allow for BM segmentation to be used across multiple institutions.   Methods: We propose a VAE-MMD preprocessing pipeline that combines variational autoencoders (VAE) with maximum mean discrepancy (MMD) loss, incorporating skip connections and self-attention mechanisms alongside nnU-Net segmentation. The method was tested on 740 patients from four public databases: Stanford, UCSF, UCLM, and PKG, evaluated by domain classifier's accuracy, sensitivity, precision, F1/F2 scores, surface Dice (sDice), and 95th percentile Hausdorff distance (HD95).   Results: VAE-MMD reduced domain classifier accuracy from 0.91 to 0.50, indicating successful feature alignment across institutions. Reconstructed volumes attained a PSNR greater than 36 dB, maintaining anatomical accuracy. The combined method raised the mean F1 by 11.1% (0.700 to 0.778), the mean sDice by 7.93% (0.7121 to 0.7686), and reduced the mean HD95 by 65.5% (11.33 to 3.91 mm) across all four centers compared to the baseline nnU-Net.   Conclusions: VAE-MMD effectively diminishes cross-institutional data heterogeneity and enhances BM segmentation generalization across volumetric, detection, and boundary-level metrics without necessitating target-domain labels, thereby overcoming a significant obstacle to the clinical implementation of AI-assisted segmentation.", "published": "2026-04-01T02:25:25Z", "authors": ["Yuchen Yang", "Shuangyang Zhong", "Haijun Yu", "Langcuomu Suo", "Hongbin Han", "Florian Putz", "Yixing Huang"], "abs_url": "https://arxiv.org/abs/2604.00397v1", "pdf_url": "https://arxiv.org/pdf/2604.00397v1", "x": 8.978257179260254, "y": 8.926105499267578, "similar_indices": [79, 176, 11, 150, 58]}, {"index": 98, "arxiv_id": "2604.00394v1", "title": "Deep Networks Favor Simple Data", "summary": "Estimated density is often interpreted as indicating how typical a sample is under a model. Yet deep models trained on one dataset can assign \\emph{higher} density to simpler out-of-distribution (OOD) data than to in-distribution test data. We refer to this behavior as the OOD anomaly. Prior work typically studies this phenomenon within a single architecture, detector, or benchmark, implicitly assuming certain canonical densities. We instead separate the trained network from the density estimator built from its representations or outputs. We introduce two estimators: Jacobian-based estimators and autoregressive self-estimators, making density analysis applicable to a wide range of models.   Applying this perspective to a range of models, including iGPT, PixelCNN++, Glow, score-based diffusion models, DINOv2, and I-JEPA, we find the same striking regularity that goes beyond the OOD anomaly: \\textbf{lower-complexity samples receive higher estimated density, while higher-complexity samples receive lower estimated density}. This ordering appears within a test set and across OOD pairs such as CIFAR-10 and SVHN, and remains highly consistent across independently trained models. To quantify these orderings, we introduce Spearman rank correlation and find striking agreement both across models and with external complexity metrics. Even when trained only on the lowest-density (most complex) samples or \\textbf{even a single such sample} the resulting models still rank simpler images as higher density.   These observations lead us beyond the original OOD anomaly to a more general conclusion: deep networks consistently favor simple data. Our goal is not to close this question, but to define and visualize it more clearly. We broaden its empirical scope and show that it appears across architectures, objectives, and density estimators.", "published": "2026-04-01T02:23:21Z", "authors": ["Weyl Lu", "Chenjie Hao", "Yubei Chen"], "abs_url": "https://arxiv.org/abs/2604.00394v1", "pdf_url": "https://arxiv.org/pdf/2604.00394v1", "x": 2.7469334602355957, "y": 12.989497184753418, "similar_indices": [28, 2, 27, 82, 93]}, {"index": 99, "arxiv_id": "2604.00392v1", "title": "EvolveTool-Bench: Evaluating the Quality of LLM-Generated Tool Libraries as Software Artifacts", "summary": "Modern LLM agents increasingly create their own tools at runtime -- from Python functions to API clients -- yet existing benchmarks evaluate them almost exclusively by downstream task completion. This is analogous to judging a software engineer only by whether their code runs, ignoring redundancy, regression, and safety. We introduce EvolveTool-Bench, a diagnostic benchmark for LLM-generated tool libraries in software engineering workflows. Across three domains requiring actual tool execution (proprietary data formats, API orchestration, and numerical computation), we define library-level software quality metrics -- reuse, redundancy, composition success, regression stability, and safety -- alongside a per-tool Tool Quality Score measuring correctness, robustness, generality, and code quality. In the first head-to-head comparison of code-level and strategy-level tool evolution (ARISE vs. EvoSkill vs. one-shot baselines, 99 tasks, two models), we show that systems with similar task completion (63-68%) differ by up to 18% in library health, revealing software quality risks invisible to task-only evaluation. Our results highlight that evaluation and governance of LLM-generated tools require treating the evolving tool library as a first-class software artifact, not a black box.", "published": "2026-04-01T02:21:55Z", "authors": ["Alibek T. Kaliyev", "Artem Maryanskyy"], "abs_url": "https://arxiv.org/abs/2604.00392v1", "pdf_url": "https://arxiv.org/pdf/2604.00392v1", "x": -2.632328987121582, "y": -9.769927978515625, "similar_indices": [133, 69, 42, 74, 84]}, {"index": 100, "arxiv_id": "2604.00387v1", "title": "RAGShield: Provenance-Verified Defense-in-Depth Against Knowledge Base Poisoning in Government Retrieval-Augmented Generation Systems", "summary": "RAG systems deployed across federal agencies for citizen-facing services are vulnerable to knowledge base poisoning attacks, where adversaries inject malicious documents to manipulate outputs. Recent work demonstrates that as few as 10 adversarial passages can achieve 98.2% retrieval success rates. We observe that RAG knowledge base poisoning is structurally analogous to software supply chain attacks, and propose RAGShield, a five-layer defense-in-depth framework applying supply chain provenance verification to the RAG knowledge pipeline. RAGShield introduces: (1) C2PA-inspired cryptographic document attestation blocking unsigned and forged documents at ingestion; (2) trust-weighted retrieval prioritizing provenance-verified sources; (3) a formal taint lattice with cross-source contradiction detection catching insider threats even when provenance is valid; (4) provenance-aware generation with auditable citations; and (5) NIST SP 800-53 compliance mapping across 15 control families. Evaluation on a 500-passage Natural Questions corpus with 63 attack documents and 200 queries against five adversary tiers achieves 0.0% attack success rate including adaptive attacks (95% CI: [0.0%, 1.9%]) with 0.0% false positive rate. We honestly report that insider in-place replacement attacks achieve 17.5% ASR, identifying the fundamental limit of ingestion-time defense. The cross-source contradiction detector catches subtle numerical manipulation attacks that bypass provenance verification entirely.", "published": "2026-04-01T02:16:42Z", "authors": ["KrishnaSaiReddy Patil"], "abs_url": "https://arxiv.org/abs/2604.00387v1", "pdf_url": "https://arxiv.org/pdf/2604.00387v1", "x": 5.884990215301514, "y": -7.400906562805176, "similar_indices": [24, 18, 22, 144, 104]}, {"index": 101, "arxiv_id": "2604.00362v1", "title": "In harmony with gpt-oss", "summary": "No one has independently reproduced OpenAI's published scores for gpt-oss-20b with tools, because the original paper discloses neither the tools nor the agent harness. We reverse-engineered the model's in-distribution tools: when prompted without tool definitions, gpt-oss still calls tools from its training distribution with high statistical confidence -- a strong prior, not a hallucination. We then built a native harmony agent harness (https://github.com/borislavmavrin/harmonyagent.git) that encodes messages in the model's native format, bypassing the lossy Chat Completions conversion. Together, these yield the first independent reproduction of OpenAI's published scores: 60.4% on SWE Verified HIGH (published 60.7%), 53.3% MEDIUM (53.2%), and 91.7% on AIME25 with tools (90.4%).", "published": "2026-04-01T01:16:13Z", "authors": ["Borislav Mavrin"], "abs_url": "https://arxiv.org/abs/2604.00362v1", "pdf_url": "https://arxiv.org/pdf/2604.00362v1", "x": -3.6970291137695312, "y": -9.779269218444824, "similar_indices": [133, 99, 86, 42, 69]}, {"index": 102, "arxiv_id": "2604.00356v1", "title": "Signals: Trajectory Sampling and Triage for Agentic Interactions", "summary": "Agentic applications based on large language models increasingly rely on multi-step interaction loops involving planning, action execution, and environment feedback. While such systems are now deployed at scale, improving them post-deployment remains challenging. Agent trajectories are voluminous and non-deterministic, and reviewing each one, whether through human review or auxiliary LLMs, is slow and cost-prohibitive. We propose a lightweight, signal-based framework for triaging agentic interaction trajectories. Our approach computes cheap, broadly applicable signals from live interactions and attaches them as structured attributes for trajectory triage, identifying interactions likely to be informative without affecting online agent behavior. We organize signals into a coarse-grained taxonomy spanning interaction (misalignment, stagnation, disengagement, satisfaction), execution (failure, loop), and environment (exhaustion), designed for computation without model calls. In a controlled annotation study on $τ$-bench, a widely used benchmark for tool-augmented agent evaluation, we show that signal-based sampling achieves an 82\\% informativeness rate compared to 74\\% for heuristic filtering and 54\\% for random sampling, with a 1.52x efficiency gain per informative trajectory. The advantage is robust across reward strata and task domains, confirming that signals provide genuine per-trajectory informativeness gains rather than merely oversampling obvious failures. These results show that lightweight signals can serve as practical sampling infrastructure for agentic systems, and suggest a path toward preference data construction and post-deployment optimization.", "published": "2026-04-01T01:08:07Z", "authors": ["Shuguang Chen", "Adil Hafeez", "Salman Paracha"], "abs_url": "https://arxiv.org/abs/2604.00356v1", "pdf_url": "https://arxiv.org/pdf/2604.00356v1", "x": -0.5752474069595337, "y": -4.809144020080566, "similar_indices": [108, 163, 0, 47, 187]}, {"index": 103, "arxiv_id": "2604.00350v1", "title": "Go Big or Go Home: Simulating Mobbing Behavior with Braitenbergian Robots", "summary": "We used the Webots robotics simulation platform to simulate a dyadic avoiding and mobbing predator behavior in a group of Braitenbergian robots. Mobbing is an antipredator adaptation used by some animals in which the individuals cooperatively attack or harass a predator to protect themselves. One way of coordinating a mobbing attack is using mobbing calls to summon other individuals of the mobbing species. We imitated this mechanism and simulated Braitenbergian robots that use mobbing calls when they face a light source (representing an inanimate predator) and mob it if they can summon allies, otherwise, they escape from it. We explore the effects of range of mobbing call (infinite range, mid-range and low-range) and the size of the robot group (ten robots vs three) on the overall success of mobbing. Our results suggest that both variables have significant impacts. This work has implications for simulations of action selection in artificial life and designing control architectures for autonomous agents.", "published": "2026-04-01T00:56:50Z", "authors": ["Elaheh Sanoubari"], "abs_url": "https://arxiv.org/abs/2604.00350v1", "pdf_url": "https://arxiv.org/pdf/2604.00350v1", "x": 8.776896476745605, "y": -5.0340495109558105, "similar_indices": [143, 61, 177, 94, 43]}, {"index": 104, "arxiv_id": "2604.00324v1", "title": "The Persistent Vulnerability of Aligned AI Systems", "summary": "Autonomous AI agents are being deployed with filesystem access, email control, and multi-step planning. This thesis contributes to four open problems in AI safety: understanding dangerous internal computations, removing dangerous behaviors once embedded, testing for vulnerabilities before deployment, and predicting when models will act against deployers.   ACDC automates circuit discovery in transformers, recovering all five component types from prior manual work on GPT-2 Small by selecting 68 edges from 32,000 candidates in hours rather than months.   Latent Adversarial Training (LAT) removes dangerous behaviors by optimizing perturbations in the residual stream to elicit failure modes, then training under those perturbations. LAT solved the sleeper agent problem where standard safety training failed, matching existing defenses with 700x fewer GPU hours.   Best-of-N jailbreaking achieves 89% attack success on GPT-4o and 78% on Claude 3.5 Sonnet through random input augmentations. Attack success follows power law scaling across text, vision, and audio, enabling quantitative forecasting of adversarial robustness.   Agentic misalignment tests whether frontier models autonomously choose harmful actions given ordinary goals. Across 16 models, agents engaged in blackmail (96% for Claude Opus 4), espionage, and actions causing death. Misbehavior rates rose from 6.5% to 55.1% when models stated scenarios were real rather than evaluations.   The thesis does not fully resolve any of these problems but makes each tractable and measurable.", "published": "2026-03-31T23:49:07Z", "authors": ["Aengus Lynch"], "abs_url": "https://arxiv.org/abs/2604.00324v1", "pdf_url": "https://arxiv.org/pdf/2604.00324v1", "x": 5.053503036499023, "y": -5.1578779220581055, "similar_indices": [54, 107, 144, 18, 56]}, {"index": 105, "arxiv_id": "2604.00319v1", "title": "Collaborative AI Agents and Critics for Fault Detection and Cause Analysis in Network Telemetry", "summary": "We develop algorithms for collaborative control of AI agents and critics in a multi-actor, multi-critic federated multi-agent system. Each AI agent and critic has access to classical machine learning or generative AI foundation models. The AI agents and critics collaborate with a central server to complete multimodal tasks such as fault detection, severity, and cause analysis in a network telemetry system, text-to-image generation, video generation, healthcare diagnostics from medical images and patient records, etcetera. The AI agents complete their tasks and send them to AI critics for evaluation. The critics then send feedback to agents to improve their responses. Collaboratively, they minimize the overall cost to the system with no inter-agent or inter-critic communication. AI agents and critics keep their cost functions or derivatives of cost functions private. Using multi-time scale stochastic approximation techniques, we provide convergence guarantees on the time-average active states of AI agents and critics. The communication overhead is a little on the system, of the order of $\\mathcal{O}(m)$, for $m$ modalities and is independent of the number of AI agents and critics. Finally, we present an example of fault detection, severity, and cause analysis in network telemetry and thorough evaluation to check the algorithm's efficacy.", "published": "2026-03-31T23:33:56Z", "authors": ["Syed Eqbal Alam", "Zhan Shu"], "abs_url": "https://arxiv.org/abs/2604.00319v1", "pdf_url": "https://arxiv.org/pdf/2604.00319v1", "x": -2.2160532474517822, "y": -4.969046592712402, "similar_indices": [137, 141, 108, 61, 197]}, {"index": 106, "arxiv_id": "2604.00314v1", "title": "Prompt-Guided Prefiltering for VLM Image Compression", "summary": "The rapid progress of large Vision-Language Models (VLMs) has enabled a wide range of applications, such as image understanding and Visual Question Answering (VQA). Query images are often uploaded to the cloud, where VLMs are typically hosted, hence efficient image compression becomes crucial. However, traditional human-centric codecs are suboptimal in this setting because they preserve many task-irrelevant details. Existing Image Coding for Machines (ICM) methods also fall short, as they assume a fixed set of downstream tasks and cannot adapt to prompt-driven VLMs with an open-ended variety of objectives. We propose a lightweight, plug-and-play, prompt-guided prefiltering module to identify image regions most relevant to the text prompt, and consequently to the downstream task. The module preserves important details while smoothing out less relevant areas to improve compression efficiency. It is codec-agnostic and can be applied before conventional and learned encoders. Experiments on several VQA benchmarks show that our approach achieves a 25-50% average bitrate reduction while maintaining the same task accuracy. Our source code is available at https://github.com/bardia-az/pgp-vlm-compression.", "published": "2026-03-31T23:27:12Z", "authors": ["Bardia Azizian", "Ivan V. Bajic"], "abs_url": "https://arxiv.org/abs/2604.00314v1", "pdf_url": "https://arxiv.org/pdf/2604.00314v1", "x": 5.747552871704102, "y": 5.388434410095215, "similar_indices": [45, 136, 88, 157, 16]}, {"index": 107, "arxiv_id": "2604.00310v1", "title": "Robust Multimodal Safety via Conditional Decoding", "summary": "Multimodal large-language models (MLLMs) often experience degraded safety alignment when harmful queries exploit cross-modal interactions. Models aligned on text alone show a higher rate of successful attacks when extended to two or more modalities. In this work, we propose a simple conditional decoding strategy, CASA (Classification Augmented with Safety Attention) that utilizes internal representations of MLLMs to predict a binary safety token before response generation. We introduce a novel safety attention module designed to enhance the model's ability to detect malicious queries. Our design ensures robust safety alignment without relying on any external classifier or auxiliary head, and without the need for modality-specific safety fine-tuning. On diverse benchmarks such as MM-SafetyBench, JailbreakV-28k, and adversarial audio tests, CASA lowers the average attack success rate by more than 97% across modalities and across attack types. Our empirical evaluations also show that CASA maintains strong utility in benign inputs, a result validated through both automated and human evaluations (via 13 trained annotators). Together, these results highlight CASA as a simple and generalizable framework to improve multimodal LLM safety.", "published": "2026-03-31T23:19:50Z", "authors": ["Anurag Kumar", "Raghuveer Peri", "Jon Burnsky", "Alexandru Nelus", "Rohit Paturi", "Srikanth Vishnubhotla", "Yanjun Qi"], "abs_url": "https://arxiv.org/abs/2604.00310v1", "pdf_url": "https://arxiv.org/pdf/2604.00310v1", "x": 4.157529830932617, "y": -2.6205103397369385, "similar_indices": [74, 173, 144, 18, 188]}, {"index": 108, "arxiv_id": "2604.00304v1", "title": "Asymmetric Actor-Critic for Multi-turn LLM Agents", "summary": "Large language models (LLMs) exhibit strong reasoning and conversational abilities, but ensuring reliable behavior in multi-turn interactions remains challenging. In many real-world applications, agents must succeed in one-shot settings where retries are impossible. Existing approaches either rely on reflection or post-hoc evaluation, which require additional attempts, or assume fully trainable models that cannot leverage proprietary LLMs. We propose an asymmetric actor-critic framework for reliable conversational agents. A powerful proprietary LLM acts as the actor, while a smaller open-source critic provides runtime supervision, monitoring the actor's actions and intervening within the same interaction trajectory. Unlike training-based actor-critic methods, our framework supervises a fixed actor operating in open-ended conversational environments. The design leverages a generation-verification asymmetry: while high-quality generation requires large models, effective oversight can often be achieved by smaller ones. We further introduce a data generation pipeline that produces supervision signals for critic fine-tuning without modifying the actor. Experiments on $τ$-bench and UserBench show that our approach significantly improves reliability and task success over strong single-agent baselines. Moreover, lightweight open-source critics rival or surpass larger proprietary models in the critic role, and critic fine-tuning yields additional gains over several state-of-the-art methods.", "published": "2026-03-31T22:56:21Z", "authors": ["Shuli Jiang", "Zhaoyang Zhang", "Yi Zhang", "Shuo Yang", "Wei Xia", "Stefano Soatto"], "abs_url": "https://arxiv.org/abs/2604.00304v1", "pdf_url": "https://arxiv.org/pdf/2604.00304v1", "x": -0.9806118607521057, "y": -4.30926513671875, "similar_indices": [102, 48, 85, 27, 166]}, {"index": 109, "arxiv_id": "2604.00298v1", "title": "SANA I2I: A Text Free Flow Matching Framework for Paired Image to Image Translation with a Case Study in Fetal MRI Artifact Reduction", "summary": "We propose SANA-I2I, a text-free high-resolution image-to-image generation framework that extends the SANA family by removing textual conditioning entirely. In contrast to SanaControlNet, which combines text and image-based control, SANA-I2I relies exclusively on paired source-target images to learn a conditional flow-matching model in latent space. The model learns a conditional velocity field that maps a target image distribution to another one, enabling supervised image translation without reliance on language prompts. We evaluate the proposed approach on the challenging task of fetal MRI motion artifact reduction. To enable paired training in this application, where real paired data are difficult to acquire, we adopt a synthetic data generation strategy based on the method proposed by Duffy et al., which simulates realistic motion artifacts in fetal magnetic resonance imaging (MRI). Experimental results demonstrate that SANA-I2I effectively suppresses motion artifacts while preserving anatomical structure, achieving competitive performance few inference steps. These results highlight the efficiency and suitability of our proposed flow-based, text-free generative models for supervised image-to-image tasks in medical imaging.", "published": "2026-03-31T22:48:17Z", "authors": ["Italo Felix Santos", "Gilson Antonio Giraldi", "Heron Werner Junior"], "abs_url": "https://arxiv.org/abs/2604.00298v1", "pdf_url": "https://arxiv.org/pdf/2604.00298v1", "x": 8.754376411437988, "y": 6.786625385284424, "similar_indices": [45, 79, 136, 176, 41]}, {"index": 110, "arxiv_id": "2604.00284v1", "title": "Improvisational Games as a Benchmark for Social Intelligence of AI Agents: The Case of Connections", "summary": "We formally introduce a improvisational wordplay game called Connections to explore reasoning capabilities of AI agents. Playing Connections combines skills in knowledge retrieval, summarization and awareness of cognitive states of other agents. We show how the game serves as a good benchmark for social intelligence abilities of language model based agents that go beyond the agents' own memory and deductive reasoning and also involve gauging the understanding capabilities of other agents. Finally, we show how through communication with other agents in a constrained environment, AI agents must demonstrate social awareness and intelligence in games involving collaboration.", "published": "2026-03-31T22:16:25Z", "authors": ["Gaurav Rajesh Parikh", "Angikar Ghosal"], "abs_url": "https://arxiv.org/abs/2604.00284v1", "pdf_url": "https://arxiv.org/pdf/2604.00284v1", "x": -0.45231056213378906, "y": -3.0639469623565674, "similar_indices": [163, 194, 43, 197, 126]}, {"index": 111, "arxiv_id": "2604.00281v1", "title": "Human-in-the-Loop Control of Objective Drift in LLM-Assisted Computer Science Education", "summary": "Large language models (LLMs) are increasingly embedded in computer science education through AI-assisted programming tools, yet such workflows often exhibit objective drift, in which locally plausible outputs diverge from stated task specifications. Existing instructional responses frequently emphasize tool-specific prompting practices, limiting durability as AI platforms evolve. This paper adopts a human-centered stance, treating human-in-the-loop (HITL) control as a stable educational problem rather than a transitional step toward AI autonomy. Drawing on systems engineering and control-theoretic concepts, we frame objectives and world models as operational artifacts that students configure to stabilize AI-assisted work. We propose a pilot undergraduate CS laboratory curriculum that explicitly separates planning from execution and trains students to specify acceptance criteria and architectural constraints prior to code generation. In selected labs, the curriculum also introduces deliberate, concept-aligned drift to support diagnosis and recovery from specification violations. We report a sensitivity power analysis for a three-arm pilot design comparing unstructured AI use, structured planning, and structured planning with injected drift, establishing detectable effect sizes under realistic section-level constraints. The contribution is a theory-driven, methodologically explicit foundation for HITL pedagogy that renders control competencies teachable across evolving AI tools.", "published": "2026-03-31T22:14:02Z", "authors": ["Mark Dranias", "Adam Whitley"], "abs_url": "https://arxiv.org/abs/2604.00281v1", "pdf_url": "https://arxiv.org/pdf/2604.00281v1", "x": -8.073974609375, "y": -5.67405891418457, "similar_indices": [91, 112, 48, 194, 74]}, {"index": 112, "arxiv_id": "2604.00280v1", "title": "VeriAct: Beyond Verifiability -- Agentic Synthesis of Correct and Complete Formal Specifications", "summary": "Formal specifications play a central role in ensuring software reliability and correctness. However, automatically synthesizing high-quality formal specifications remains a challenging task, often requiring domain expertise. Recent work has applied large language models to generate specifications in Java Modeling Language (JML), reporting high verification pass rates. But does passing a verifier mean that the specification is actually correct and complete? In this work, we first conduct a comprehensive evaluation comparing classical and prompt-based approaches for automated JML specification synthesis. We then investigate whether prompt optimization can push synthesis quality further by evolving prompts through structured verification feedback. While optimization improves verifier pass rates, we find a clear performance ceiling. More critically, we propose Spec-Harness, an evaluation framework that measures specification correctness and completeness through symbolic verification, revealing that a large fraction of verifier-accepted specifications, including optimized ones, are in fact incorrect or incomplete, over- or under-constraining both inputs and outputs in ways invisible to the verifier. To push beyond this ceiling, we propose VeriAct, a verification-guided agentic framework that iteratively synthesizes and repairs specifications through a closed loop of LLM-driven planning, code execution, verification, and Spec-Harness feedback. Our experiments on two benchmark datasets show that VeriAct outperforms both prompt-based and prompt-optimized baselines, producing specifications that are not only verifiable but also correct and complete.", "published": "2026-03-31T22:12:15Z", "authors": ["Md Rakib Hossain Misu", "Iris Ma", "Cristina V. Lopes"], "abs_url": "https://arxiv.org/abs/2604.00280v1", "pdf_url": "https://arxiv.org/pdf/2604.00280v1", "x": -7.303237438201904, "y": -5.089182376861572, "similar_indices": [91, 24, 111, 26, 169]}, {"index": 113, "arxiv_id": "2604.00279v1", "title": "The Geometry of Compromise: Unlocking Generative Capabilities via Controllable Modality Alignment", "summary": "Vision-Language Models (VLMs) such as CLIP learn a shared embedding space for images and text, yet their representations remain geometrically separated, a phenomenon known as the modality gap. This gap limits tasks requiring cross-modal interchangeability, such as captioning and joint clustering. Existing post-processing approaches can partially improve cross-modal compatibility; however, we show through geometric analysis that they primarily reduce the global centroid offset while leaving the underlying distributional mismatch intact. We decompose the modality gap into a Centroid Gap and a Distribution Gap, and demonstrate that the Distribution Gap is the true predictor of cross-modal task quality ($R^2 = 0.986$), whereas the commonly used Raw Gap is misleading ($R^2 = 0.691$). Motivated by this observation, we propose TPC-CMA (Three-Phase Curriculum for Cross-Modal Alignment), a fine-tuning framework that explicitly reduces both components. The proposed CMA jointly mitigates centroid offsets and reshapes the distributional structure, while a three-phase curriculum with gradient-aware scheduling progressively introduces alignment during training to enable stable optimization. Experiments demonstrate that our method significantly improves cross-modal alignment. With $α_{\\text{target}}{=}0.05$, the modality gap is reduced by 66.6\\% with only 4.84\\% accuracy drop. Under stronger alignment ($α_{\\text{target}}{=}0.5$), the gap is reduced by 82.3\\%, clustering ARI improves from 0.318 to 0.516, and captioning CIDEr increases by 57.1\\% over the original model. Our code and pre-trained models will be made publicly available upon acceptance.", "published": "2026-03-31T22:11:49Z", "authors": ["Hongyuan Liu", "Qinli Yang", "Wen Li", "Zhong Zhang", "Jiaming Liu", "Wei Han", "Zhili Qin", "Jinxia Guo", "Junming Shao"], "abs_url": "https://arxiv.org/abs/2604.00279v1", "pdf_url": "https://arxiv.org/pdf/2604.00279v1", "x": 4.7623395919799805, "y": 6.961540699005127, "similar_indices": [136, 41, 166, 163, 16]}, {"index": 114, "arxiv_id": "2604.00277v1", "title": "Hybrid Energy-Based Models for Physical AI: Provably Stable Identification of Port-Hamiltonian Dynamics", "summary": "Energy-based models (EBMs) implement inference as gradient descent on a learned Lyapunov function, yielding interpretable, structure-preserving alternatives to black-box neural ODEs and aligning naturally with physical AI. Yet their use in system identification remains limited, and existing architectures lack formal stability guarantees that globally preclude unstable modes. We address this gap by introducing an EBM framework for system identification with stable, dissipative, absorbing invariant dynamics. Unlike classical global Lyapunov stability, absorbing invariance expands the class of stability-preserving architectures, enabling more flexible and expressive EBMs. We extend EBM theory to nonsmooth activations by establishing negative energy dissipation via Clarke derivatives and deriving new conditions for radial unboundedness, exposing a stability-expressivity tradeoff in standard EBMs. To overcome this, we introduce a hybrid architecture with a dynamical visible layer and static hidden layers, prove absorbing invariance under mild assumptions, and show that these guarantees extend to port-Hamiltonian EBMs. Experiments on metric-deformed multi-well and ring systems validate the approach, showcasing how our hybrid EBM architecture combines expressivity with sound and provable safety guarantees by design.", "published": "2026-03-31T22:04:38Z", "authors": ["Simone Betteti", "Luca Laurenti"], "abs_url": "https://arxiv.org/abs/2604.00277v1", "pdf_url": "https://arxiv.org/pdf/2604.00277v1", "x": -8.923317909240723, "y": 7.05789041519165, "similar_indices": [179, 34, 174, 168, 195]}, {"index": 115, "arxiv_id": "2604.00265v1", "title": "Benchmarking Interaction, Beyond Policy: a Reproducible Benchmark for Collaborative Instance Object Navigation", "summary": "We propose Question-Asking Navigation (QAsk-Nav), the first reproducible benchmark for Collaborative Instance Object Navigation (CoIN) that enables an explicit, separate assessment of embodied navigation and collaborative question asking. CoIN tasks an embodied agent with reaching a target specified in free-form natural language under partial observability, using only egocentric visual observations and interactive natural-language dialogue with a human, where the dialogue can help to resolve ambiguity among visually similar object instances. Existing CoIN benchmarks are primarily focused on navigation success and offer no support for consistent evaluation of collaborative interaction. To address this limitation, QAsk-Nav provides (i) a lightweight question-asking protocol scored independently of navigation, (ii) an enhanced navigation protocol with realistic, diverse, high-quality target descriptions, and (iii) an open-source dataset, that includes 28,000 quality-checked reasoning and question-asking traces for training and analysis of interactive capabilities of CoIN models. Using the proposed QAsk-Nav benchmark, we develop Light-CoNav, a lightweight unified model for collaborative navigation that is 3x smaller and 70x faster than existing modular methods, while outperforming state-of-the-art CoIN approaches in generalization to unseen objects and environments. Project page at https://benchmarking-interaction.github.io/", "published": "2026-03-31T21:45:00Z", "authors": ["Edoardo Zorzi", "Francesco Taioli", "Yiming Wang", "Marco Cristani", "Alessandro Farinelli", "Alberto Castellini", "Loris Bazzani"], "abs_url": "https://arxiv.org/abs/2604.00265v1", "pdf_url": "https://arxiv.org/pdf/2604.00265v1", "x": 2.180262327194214, "y": -0.4298365116119385, "similar_indices": [163, 32, 0, 166, 77]}, {"index": 116, "arxiv_id": "2604.00259v1", "title": "LLM Essay Scoring Under Holistic and Analytic Rubrics: Prompt Effects and Bias", "summary": "Despite growing interest in using Large Language Models (LLMs) for educational assessment, it remains unclear how closely they align with human scoring. We present a systematic evaluation of instruction-tuned LLMs across three open essay-scoring datasets (ASAP 2.0, ELLIPSE, and DREsS) that cover both holistic and analytic scoring. We analyze agreement with human consensus scores, directional bias, and the stability of bias estimates. Our results show that strong open-weight models achieve moderate to high agreement with humans on holistic scoring (Quadratic Weighted Kappa about 0.6), but this does not transfer uniformly to analytic scoring. In particular, we observe large and stable negative directional bias on Lower-Order Concern (LOC) traits, such as Grammar and Conventions, meaning that models often score these traits more harshly than human raters. We also find that concise keyword-based prompts generally outperform longer rubric-style prompts in multi-trait analytic scoring. To quantify the amount of data needed to detect these systematic deviations, we compute the minimum sample size at which a 95% bootstrap confidence interval for the mean bias excludes zero. This analysis shows that LOC bias is often detectable with very small validation sets, whereas Higher-Order Concern (HOC) traits typically require much larger samples. These findings support a bias-correction-first deployment strategy: instead of relying on raw zero-shot scores, systematic score offsets can be estimated and corrected using small human-labeled bias-estimation sets, without requiring large-scale fine-tuning.", "published": "2026-03-31T21:40:36Z", "authors": ["Filip J. Kucia", "Anirban Chakraborty", "Anna Wróblewska"], "abs_url": "https://arxiv.org/abs/2604.00259v1", "pdf_url": "https://arxiv.org/pdf/2604.00259v1", "x": -7.2909955978393555, "y": -10.583847045898438, "similar_indices": [165, 151, 186, 36, 123]}, {"index": 117, "arxiv_id": "2604.00258v1", "title": "Hierarchical Apprenticeship Learning from Imperfect Demonstrations with Evolving Rewards", "summary": "While apprenticeship learning has shown promise for inducing effective pedagogical policies directly from student interactions in e-learning environments, most existing approaches rely on optimal or near-optimal expert demonstrations under a fixed reward. Real-world student interactions, however, are often inherently imperfect and evolving: students explore, make errors, revise strategies, and refine their goals as understanding develops. In this work, we argue that imperfect student demonstrations are not noise to be discarded, but structured signals-provided their relative quality is ranked. We introduce HALIDE, Hierarchical Apprenticeship Learning from Imperfect Demonstrations with Evolving Rewards, which not only leverages sub-optimal student demonstrations, but ranks them within a hierarchical learning framework. HALIDE models student behavior at multiple levels of abstraction, enabling inference of higher-level intent and strategy from suboptimal actions while explicitly capturing the temporal evolution of student reward functions. By integrating demonstration quality into hierarchical reward inference,HALIDE distinguishes transient errors from suboptimal strategies and meaningful progress toward higher-level learning goals. Our results show that HALIDE more accurately predicts student pedagogical decisions than approaches that rely on optimal trajectories, fixed rewards, or unranked imperfect demonstrations.", "published": "2026-03-31T21:34:18Z", "authors": ["Md Mirajul Islam", "Rajesh Debnath", "Adittya Soukarjya Saha", "Min Chi"], "abs_url": "https://arxiv.org/abs/2604.00258v1", "pdf_url": "https://arxiv.org/pdf/2604.00258v1", "x": -9.906689643859863, "y": -1.1308671236038208, "similar_indices": [65, 161, 166, 53, 48]}, {"index": 118, "arxiv_id": "2604.00249v1", "title": "A Safety-Aware Role-Orchestrated Multi-Agent LLM Framework for Behavioral Health Communication Simulation", "summary": "Single-agent large language model (LLM) systems struggle to simultaneously support diverse conversational functions and maintain safety in behavioral health communication. We propose a safety-aware, role-orchestrated multi-agent LLM framework designed to simulate supportive behavioral health dialogue through coordinated, role-differentiated agents. Conversational responsibilities are decomposed across specialized agents, including empathy-focused, action-oriented, and supervisory roles, while a prompt-based controller dynamically activates relevant agents and enforces continuous safety auditing. Using semi-structured interview transcripts from the DAIC-WOZ corpus, we evaluate the framework with scalable proxy metrics capturing structural quality, functional diversity, and computational characteristics. Results illustrate clear role differentiation, coherent inter-agent coordination, and predictable trade-offs between modular orchestration, safety oversight, and response latency when compared to a single-agent baseline. This work emphasizes system design, interpretability, and safety, positioning the framework as a simulation and analysis tool for behavioral health informatics and decision-support research rather than a clinical intervention.", "published": "2026-03-31T21:21:31Z", "authors": ["Ha Na Cho"], "abs_url": "https://arxiv.org/abs/2604.00249v1", "pdf_url": "https://arxiv.org/pdf/2604.00249v1", "x": -1.350369930267334, "y": -6.342545032501221, "similar_indices": [137, 177, 29, 102, 74]}, {"index": 119, "arxiv_id": "2604.00248v1", "title": "REM-CTX: Automated Peer Review via Reinforcement Learning with Auxiliary Context", "summary": "Most automated peer review systems rely on textual manuscript content alone, leaving visual elements such as figures and external scholarly signals underutilized. We introduce REM-CTX, a reinforcement-learning system that incorporates auxiliary context into the review generation process via correspondence-aware reward functions. REM-CTX trains an 8B-parameter language model with Group Relative Policy Optimization (GRPO) and combines a multi-aspect quality reward with two correspondence rewards that explicitly encourage alignment with auxiliary context. Experiments on manuscripts across Computer, Biological, and Physical Sciences show that REM-CTX achieves the highest overall review quality among six baselines, outperforming other systems with substantially larger commercial models, and surpassing the next-best RL baseline across both quality and contextual grounding metrics. Ablation studies confirm that the two correspondence rewards are complementary: each selectively improves its targeted correspondence reward while preserving all quality dimensions, and the full model outperforms all partial variants. Analysis of training dynamics reveals that the criticism aspect is negatively correlated with other metrics during training, suggesting that future studies should group multi-dimension rewards for review generation.", "published": "2026-03-31T21:19:05Z", "authors": ["Pawin Taechoyotin", "Daniel E. Acuna"], "abs_url": "https://arxiv.org/abs/2604.00248v1", "pdf_url": "https://arxiv.org/pdf/2604.00248v1", "x": -6.12799596786499, "y": -7.128156661987305, "similar_indices": [26, 108, 15, 163, 76]}, {"index": 120, "arxiv_id": "2604.00241v1", "title": "Softmax gradient policy for variance minimization and risk-averse multi armed bandits", "summary": "Algorithms for the Multi-Armed Bandit (MAB) problem play a central role in sequential decision-making and have been extensively explored both theoretically and numerically. While most classical approaches aim to identify the arm with the highest expected reward, we focus on a risk-aware setting where the goal is to select the arm with the lowest variance, favoring stability over potentially high but uncertain returns. To model the decision process, we consider a softmax parameterization of the policy; we propose a new algorithm to select the minimal variance (or minimal risk) arm and prove its convergence under natural conditions. The algorithm constructs an unbiased estimate of the objective by using two independent draws from the current's arm distribution. We provide numerical experiments that illustrate the practical behavior of these algorithms and offer guidance on implementation choices. The setting also covers general risk-aware problems where there is a trade-off between maximizing the average reward and minimizing its variance.", "published": "2026-03-31T21:08:14Z", "authors": ["Gabriel Turinici"], "abs_url": "https://arxiv.org/abs/2604.00241v1", "pdf_url": "https://arxiv.org/pdf/2604.00241v1", "x": -10.016801834106445, "y": 1.8318294286727905, "similar_indices": [19, 34, 117, 37, 3]}, {"index": 121, "arxiv_id": "2604.00237v1", "title": "AI-Mediated Explainable Regulation for Justice", "summary": "Present practice of deciding on regulation faces numerous problems that make adopted regulations static, unexplained, unduly influenced by powerful interest groups, and stained with a perception of illegitimacy. These well-known problems with the regulatory process can lead to injustice and have substantial negative effects on society and democracy. We discuss a new approach that utilizes distributed artificial intelligence (AI) to make a regulatory recommendation that is explainable and adaptable by design. We outline the main components of a system that can implement this approach and show how it would resolve the problems with the present regulatory system. This approach models and reasons about stakeholder preferences with separate preference models, while it aggregates these preferences in a value sensitive way. Such recommendations can be updated due to changes in facts or in values and are inherently explainable. We suggest how stakeholders can make their preferences known to the system and how they can verify whether they were properly considered in the regulatory decision. The resulting system promises to support regulatory justice, legitimacy, and compliance.", "published": "2026-03-31T21:00:42Z", "authors": ["Thomas Hofweber", "Andreas Sudmann", "Evangelos Pournaras"], "abs_url": "https://arxiv.org/abs/2604.00237v1", "pdf_url": "https://arxiv.org/pdf/2604.00237v1", "x": 3.925342321395874, "y": -11.653077125549316, "similar_indices": [72, 142, 137, 126, 144]}, {"index": 122, "arxiv_id": "2604.00235v1", "title": "MAC-Attention: a Match-Amend-Complete Scheme for Fast and Accurate Attention Computation", "summary": "Long-context decoding in LLMs is IO-bound: each token re-reads an ever-growing KV cache. Prior accelerations cut bytes via compression, which lowers fidelity, or selection/eviction, which restricts what remains accessible, and both can degrade delayed recall and long-form generation. We introduce MAC-Attention, a fidelity- and access-preserving alternative that accelerates decoding by reusing prior attention computations for semantically similar recent queries. It starts with a match stage that performs pre-RoPE L2 matching over a short local window; an amend stage rectifies the reused attention by recomputing a small band near the match boundary; and a complete stage fuses the rectified results with fresh attention computed on the KV tail through a numerically stable merge. On a match hit, the compute and bandwidth complexity is constant regardless of context length. The method is model-agnostic and composes with IO-aware kernels, paged-KV managers, and MQA/GQA. Across LongBench v2 (120K), RULER (120K), and LongGenBench (16K continuous generation), compared to the latest FlashInfer library, MAC-Attention reduces KV accesses by up to 99%, cuts token generation latency by over 60% at 128K, and achieves over 14.3x attention-phase speedups, up to 2.6x end-to-end, while maintaining full-attention quality. By reusing computation, MAC-Attention delivers long-context inference that is both fast and faithful. Code is available here: https://github.com/YJHMITWEB/MAC-Attention.git", "published": "2026-03-31T20:57:23Z", "authors": ["Jinghan Yao", "Sam Adé Jacobs", "Walid Krichene", "Masahiro Tanaka", "Dhabaleswar K Panda"], "abs_url": "https://arxiv.org/abs/2604.00235v1", "pdf_url": "https://arxiv.org/pdf/2604.00235v1", "x": 0.6468027234077454, "y": 4.666553020477295, "similar_indices": [9, 20, 63, 106, 30]}, {"index": 123, "arxiv_id": "2604.00223v1", "title": "Diversity-Aware Reverse Kullback-Leibler Divergence for Large Language Model Distillation", "summary": "Reverse Kullback-Leibler (RKL) divergence has recently emerged as the preferred objective for large language model (LLM) distillation, consistently outperforming forward KL (FKL), particularly in regimes with large vocabularies and significant teacher-student capacity mismatch, where RKL focuses learning on dominant modes rather than enforcing dense alignment. However, RKL introduces a structural limitation that drives the student toward overconfident predictions. We first provide an analysis of RKL by decomposing its gradients into target and non-target components, and show that non-target gradients consistently push the target logit upward even when the student already matches the teacher, thereby reducing output diversity. In addition, RKL provides weak supervision over non-target classes, leading to poor tail alignment. To address these issues, we propose Diversity-aware RKL (DRKL), which removes this gradient effect and strengthens non-target supervision while preserving the optimization benefits of RKL. Extensive experiments across datasets and model families demonstrate that DRKL consistently outperforms FKL, RKL, and other state-of-the-art distillation objectives, achieving better performance and a superior fidelity-diversity trade-off.", "published": "2026-03-31T20:39:47Z", "authors": ["Hoang-Chau Luong", "Dat Ba Tran", "Lingwei Chen"], "abs_url": "https://arxiv.org/abs/2604.00223v1", "pdf_url": "https://arxiv.org/pdf/2604.00223v1", "x": 0.07794736325740814, "y": 2.9407572746276855, "similar_indices": [27, 93, 76, 88, 113]}, {"index": 124, "arxiv_id": "2604.00199v1", "title": "QUEST: A robust attention formulation using query-modulated spherical attention", "summary": "The Transformer model architecture has become one of the most widely used in deep learning and the attention mechanism is at its core. The standard attention formulation uses a softmax operation applied to a scaled dot product between query and key vectors. We explore the role played by norms of the queries and keys, which can cause training instabilities when they arbitrarily increase. We demonstrate how this can happen even in simple Transformer models, in the presence of easy-to-learn spurious patterns in the data. We propose a new attention formulation, QUEry-modulated Spherical aTtention (QUEST), that constrains the keys to a hyperspherical latent space, while still allowing individual tokens to flexibly control the sharpness of the attention distribution. QUEST can be easily used as a drop-in replacement for standard attention. We focus on vision applications while also exploring other domains to highlight the method's generality. We show that (1) QUEST trains without instabilities and (2) produces models with improved performance (3) that are robust to data corruptions and adversarial attacks.", "published": "2026-03-31T20:04:17Z", "authors": ["Hariprasath Govindarajan", "Per Sidén", "Jacob Roll", "Fredrik Lindsten"], "abs_url": "https://arxiv.org/abs/2604.00199v1", "pdf_url": "https://arxiv.org/pdf/2604.00199v1", "x": 2.8017499446868896, "y": 5.154978275299072, "similar_indices": [9, 57, 136, 140, 166]}, {"index": 125, "arxiv_id": "2604.00189v1", "title": "Making Sense of AI Agents Hype: Adoption, Architectures, and Takeaways from Practitioners", "summary": "To support practitioners in understanding how agentic systems are designed in real-world industrial practice, we present a review of practitioner conference talks on AI agents. We analyzed 138 recorded talks to examine how companies adopt agent-based architectures (Objective 1), identify recurring architectural strategies and patterns (Objective 2), and analyze application domains and technologies used to implement and operate LLM-driven agentic systems (Objective 3).", "published": "2026-03-31T19:41:08Z", "authors": ["Ruoyu Su", "Matteo Esposito", "Roberta Capuano", "Rafiullah Omar", "June Sallou", "Henry Muccini", "Davide Taibi"], "abs_url": "https://arxiv.org/abs/2604.00189v1", "pdf_url": "https://arxiv.org/pdf/2604.00189v1", "x": 1.1202939748764038, "y": -10.577433586120605, "similar_indices": [171, 72, 29, 175, 197]}, {"index": 126, "arxiv_id": "2604.00187v1", "title": "Explainable AI for Blind and Low-Vision Users: Navigating Trust, Modality, and Interpretability in the Agentic Era", "summary": "Explainable Artificial Intelligence (XAI) is critical for ensuring trust and accountability, yet its development remains predominantly visual. For blind and low-vision (BLV) users, the lack of accessible explanations creates a fundamental barrier to the independent use of AI-driven assistive technologies. This problem intensifies as AI systems shift from single-query tools into autonomous agents that take multi-step actions and make consequential decisions across extended task horizons, where a single undetected error can propagate irreversibly before any feedback is available. This paper investigates the unique XAI requirements of the BLV community through a comprehensive analysis of user interviews and contemporary research. By examining usage patterns across environmental perception and decision support, we identify a significant modality gap. Empirical evidence suggests that while BLV users highly value conversational explanations, they frequently experience \"self-blame\" for AI failures. The paper concludes with a research agenda for accessible Explainable AI in agentic systems, advocating for multimodal interfaces, blame-aware explanation design, and participatory development.", "published": "2026-03-31T19:39:52Z", "authors": ["Abu Noman Md Sakib", "Protik Dey", "Zijie Zhang", "Taslima Akter"], "abs_url": "https://arxiv.org/abs/2604.00187v1", "pdf_url": "https://arxiv.org/pdf/2604.00187v1", "x": 1.2442400455474854, "y": -3.166646718978882, "similar_indices": [159, 163, 17, 115, 133]}, {"index": 127, "arxiv_id": "2604.00186v1", "title": "Agentic AI and Occupational Displacement: A Multi-Regional Task Exposure Analysis of Emerging Labor Market Disruption", "summary": "This paper extends the Acemoglu-Restrepo task exposure framework to address the labor market effects of agentic artificial intelligence systems: autonomous AI agents capable of completing entire occupational workflows rather than discrete tasks. Unlike prior automation technologies that substitute for individual subtasks, agentic AI systems execute end-to-end workflows involving multi-step reasoning, tool invocation, and autonomous decision-making, substantially expanding occupational displacement risk beyond what existing task-level analyses capture. We introduce the Agentic Task Exposure (ATE) score, a composite measure computed algorithmically from O*NET task data using calibrated adoption parameters--not a regression estimate--incorporating AI capability scores, workflow coverage factors, and logistic adoption velocity. Applying the ATE framework across five major US technology regions (Seattle-Tacoma, San Francisco Bay Area, Austin, New York, and Boston) over a 2025-2030 horizon, we find that 93.2% of the 236 analyzed occupations across six information-intensive SOC groups (financial, legal, healthcare, healthcare support, sales, and administrative/clerical) cross the moderate-risk threshold (ATE >= 0.35) in Tier 1 regions by 2030, with credit analysts, judges, and sustainability specialists reaching ATE scores of 0.43-0.47. We simultaneously identify seventeen emerging occupational categories benefiting from reinstatement effects, concentrated in human-AI collaboration, AI governance, and domain-specific AI operations roles. Our findings carry implications for workforce transition policy, regional economic planning, and the temporal dynamics of labor market adjustment", "published": "2026-03-31T19:36:36Z", "authors": ["Ravish Gupta", "Saket Kumar"], "abs_url": "https://arxiv.org/abs/2604.00186v1", "pdf_url": "https://arxiv.org/pdf/2604.00186v1", "x": 2.2720754146575928, "y": -12.669709205627441, "similar_indices": [142, 3, 69, 175, 72]}, {"index": 128, "arxiv_id": "2604.00181v1", "title": "NFC based inventory control system for secure and efficient communication", "summary": "This paper brings up this idea of using Near Field Communication (NFC) for inventory control system instead of using traditional barcodes. NFC because of its high security, ease of use and efficiency can be very suitable for systems like inventory control. In traditional inventory control systems, each product has a barcode pasted on it, which is vulnerable to attacks as barcodes are open and have no security. Furthermore, barcodes are prone to damages and can be unreliable when pasted on different types of products e.g. hot and frozen products, circular shaped products and irregular shaped products like clothes etc. NFC on the other hand is very efficient, secure and reliable when it comes to short-range wireless communication. In this paper we will present our prototype for the inventory control system of an electronic store in which each product has a passive NFC tag pasted to it. When a customer buys a product the receipt of the product is generated using NFC between the NFC passive tag on the product and NFC enabled device (e.g. smart phone or reader) at the cash counter.", "published": "2026-03-31T19:30:56Z", "authors": ["Razi Iqbal", "Awais Ahmad", "Asfandyar Gillani"], "abs_url": "https://arxiv.org/abs/2604.00181v1", "pdf_url": "https://arxiv.org/pdf/2604.00181v1", "x": 6.362076282501221, "y": -8.406664848327637, "similar_indices": [100, 22, 35, 171, 175]}, {"index": 129,
